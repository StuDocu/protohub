er-radius:9999px;background:#3092fa;color:#fff;font-size:15px;font-weight:700\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 448 512\" fill=\"currentColor\"><path d=\"M256 64c0-17.7-14.3-32-32-32s-32 14.3-32 32l0 160-160 0c-17.7 0-32 14.3-32 32s14.3 32 32 32l160 0 0 160c0 17.7 14.3 32 32 32s32-14.3 32-32l0-160 160 0c17.7 0 32-14.3 32-32s-14.3-32-32-32l-160 0 0-160z\"><\u002Fpath><\u002Fsvg>Add<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"margin-top:14px;font-size:13px;color:#7a838c\">“My documents” shows a neutral <span style=\"background:#eef1f4;color:#4c5966;font-size:11px;font-weight:700;padding:2px 8px;border-radius:9999px\">Added by you<\u002Fspan> marker — still community-visible.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- BEHAVIOR -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Behavior rules<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">\n          <sc-for list=\"{{ docsBehavior }}\" as=\"b\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:12px;padding:14px 16px\"><div style=\"font-size:14px;font-weight:700;color:#2f3e4e\">{{ b.t }}<\u002Fdiv><div style=\"font-size:13px;color:#7a838c;line-height:1.55;margin-top:4px\">{{ b.d }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- MEASUREMENTS -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Measurements &amp; tokens<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:200px 1fr\">\n          <sc-for list=\"{{ docsMeasure }}\" as=\"r\" hint-placeholder-count=\"6\">\n            <div style=\"padding:11px 16px;font-size:13px;font-weight:600;color:#2f3e4e;border-bottom:1px solid #f4f5f8\">{{ r.k }}<\u002Fdiv>\n            <div style=\"padding:11px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12px;color:#4c5966;border-bottom:1px solid #f4f5f8\">{{ r.v }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- PROPS + CODE -->\n      <div style=\"display:grid;grid-template-columns:1fr 1.1fr;gap:20px;align-items:start\">\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Props<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 16px\">\n            <sc-for list=\"{{ docsProps }}\" as=\"p\" hint-placeholder-count=\"4\">\n              <div style=\"padding:11px 0;border-bottom:1px solid #f4f5f8\"><div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;font-weight:600;color:#2f3e4e\">{{ p.name }} <span style=\"color:#1168c3;font-weight:400;font-size:11px\">{{ p.type }}<\u002Fspan><\u002Fdiv><div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:3px\">{{ p.desc }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Usage<\u002Fdiv>\n          <pre style=\"margin:0;background:#0f1722;color:#d7e2f0;border-radius:12px;padding:16px 18px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;line-height:1.7;overflow-x:auto\">&lt;SegmentedToggle\n  value={scope}\n  options={['course', 'mine']}\n  onChange={setScope}\n/&gt;\n&lt;Button variant=\"primary\" onClick={openAdd}&gt;\n  + Add\n&lt;/Button&gt;<\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== ADD = CREATE ===== -->\n  <sc-if value=\"{{ isCreateP }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:28px\">\n      <p style=\"margin:0;font-size:15px;color:#4c5966;line-height:1.55;max-width:700px\">Uploading is also a <b style=\"color:#2f3e4e\">creation entry point<\u002Fb>. The page owns the entry point, the library and the study layer; the heavy generation is framed as <b style=\"color:#2f3e4e\">Study AI<\u002Fb> (a handoff). The flow runs in six moments:<\u002Fp>\n\n      <!-- STEPS -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">The flow<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <sc-for list=\"{{ createSteps }}\" as=\"s\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex;gap:14px;background:#fff;border:1px solid #e6ebef;border-radius:12px;padding:14px 16px\">\n              <span style=\"width:28px;height:28px;border-radius:9999px;background:#e2effd;color:#1168c3;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none\">{{ s.n }}<\u002Fspan>\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\"><span style=\"font-size:15px;font-weight:700;color:#0a0a0a\">{{ s.t }}<\u002Fspan><span style=\"font-size:11px;font-weight:700;color:#4c5966;background:#f6f7fb;border:1px solid #e6ebef;padding:2px 8px;border-radius:9999px\">{{ s.comp }}<\u002Fspan><\u002Fdiv>\n                <div style=\"font-size:13.5px;color:#7a838c;line-height:1.55;margin-top:4px\">{{ s.d }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- GUARDRAIL -->\n      <div style=\"background:#fdf4e2;border:1px solid #fcedce;border-radius:12px;padding:16px 18px\">\n        <div style=\"font-size:13px;font-weight:700;color:#8b5f04;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px\">Guardrail<\u002Fdiv>\n        <div style=\"font-size:14px;color:#6b4a03;line-height:1.55\">Generation is <b>Study AI’s<\u002Fb> job (handoff). The course page owns the <b>entry point<\u002Fb>, the <b>library<\u002Fb> and the <b>study layer<\u002Fb> — never the heavy generation model. Keep the “created with Study AI” framing on results.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- MEASUREMENTS -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Measurements &amp; tokens<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:200px 1fr\">\n          <sc-for list=\"{{ createMeasure }}\" as=\"r\" hint-placeholder-count=\"6\">\n            <div style=\"padding:11px 16px;font-size:13px;font-weight:600;color:#2f3e4e;border-bottom:1px solid #f4f5f8\">{{ r.k }}<\u002Fdiv>\n            <div style=\"padding:11px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12px;color:#4c5966;border-bottom:1px solid #f4f5f8\">{{ r.v }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- PROPS -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Props · CreateFlow<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n          <sc-for list=\"{{ createProps }}\" as=\"p\" hint-placeholder-count=\"5\">\n            <div style=\"padding:11px 0;border-bottom:1px solid #f4f5f8\"><div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;font-weight:600;color:#2f3e4e\">{{ p.name }} <span style=\"color:#1168c3;font-weight:400;font-size:11px\">{{ p.type }}<\u002Fspan> <span style=\"color:#9ea9b5;font-weight:400;font-size:11px\">= {{ p.def }}<\u002Fspan><\u002Fdiv><div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:3px\">{{ p.desc }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== EMPTY & EDGE STATES ===== -->\n  <sc-if value=\"{{ isEmptyP }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:24px\">\n      <p style=\"margin:0;font-size:15px;color:#4c5966;line-height:1.55;max-width:700px\">Every surface has a defined empty, loading and error state. Each maps to a SLICE status family — the treatment column lists the exact container / border / foreground tokens to use.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n        <sc-for list=\"{{ emptyStates }}\" as=\"e\" hint-placeholder-count=\"8\">\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:flex;flex-direction:column\">\n            <div style=\"padding:16px 18px;background:{{ e.bg }};border-bottom:1px solid {{ e.bd }}\">\n              <div style=\"display:flex;align-items:center;gap:8px\">\n                <span style=\"width:10px;height:10px;border-radius:9999px;background:{{ e.fg }};flex:none\"><\u002Fspan>\n                <span style=\"font-size:14px;font-weight:700;color:#0a0a0a\">{{ e.t }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-size:13.5px;font-style:italic;color:{{ e.fg }};margin-top:8px\">{{ e.copy }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:12px 18px 16px;display:flex;flex-direction:column;gap:8px\">\n              <div><span style=\"font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5\">When<\u002Fspan><div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:2px\">{{ e.when }}<\u002Fdiv><\u002Fdiv>\n              <div><span style=\"font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5\">Treatment<\u002Fspan><div style=\"font-size:13px;color:#4c5966;line-height:1.5;margin-top:2px\">{{ e.treat }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== DATA MODEL ===== -->\n  <sc-if value=\"{{ isData }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto\">\n      <p style=\"margin:0 0 22px;font-size:15px;color:#4c5966;line-height:1.55;max-width:680px\">Entities behind the course experience. Coverage and labels are <b>derived<\u002Fb>, not stored. Field types are indicative — confirm exact column types with the backend team.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:16px\">\n        <sc-for list=\"{{ dataEntities }}\" as=\"e\" hint-placeholder-count=\"6\">\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden\">\n            <div style=\"padding:14px 16px 12px;border-bottom:1px solid #f1f3f6\">\n              <div style=\"font-size:15px;font-weight:700;color:#0a0a0a;font-family:'SFMono-Regular',Menlo,monospace\">{{ e.name }}<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#7a838c;margin-top:3px\">{{ e.desc }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <sc-for list=\"{{ e.fields }}\" as=\"f\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex;align-items:baseline;gap:10px;padding:8px 16px;border-bottom:1px solid #f6f7fa\">\n                  <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;font-weight:600;color:#2f3e4e;width:96px;flex:none\">{{ f.f }}<\u002Fspan>\n                  <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:11.5px;color:#1168c3;flex:1;min-width:0\">{{ f.t }}<\u002Fspan>\n                  <span style=\"font-size:11px;color:#9ea9b5;flex:none\">{{ f.note }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== API ===== -->\n  <sc-if value=\"{{ isApi }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto\">\n      <p style=\"margin:0 0 22px;font-size:15px;color:#4c5966;line-height:1.55;max-width:680px\">Indicative REST surface for the screen. Paths and shapes are a starting point for the backend contract — names and pagination to be finalised together.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:12px\">\n        <sc-for list=\"{{ apiEndpoints }}\" as=\"ep\" hint-placeholder-count=\"6\">\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:15px 18px\">\n            <div style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap\">\n              <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:11px;font-weight:700;color:#fff;background:{{ ep.c }};padding:3px 9px;border-radius:6px;letter-spacing:.03em;flex:none\">{{ ep.m }}<\u002Fspan>\n              <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:14px;font-weight:600;color:#0a0a0a\">{{ ep.path }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:13.5px;color:#4c5966;line-height:1.5;margin-top:9px\">{{ ep.desc }}<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;margin-top:9px\"><span style=\"font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#9ea9b5\">Returns<\u002Fspan><span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12px;color:#1168c3;background:#f1f7fe;padding:2px 8px;border-radius:6px\">{{ ep.res }}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== STATE MACHINE ===== -->\n  <sc-if value=\"{{ isStates }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:28px\">\n      <p style=\"margin:0;font-size:15px;color:#4c5966;line-height:1.55;max-width:680px\">Every topic carries one state per user, stored on <code style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;background:#f6f7fb;padding:2px 6px;border-radius:5px\">TopicProgress.state<\u002Fcode>. The UI surfaces drive transitions; an overnight job re-queues due topics.<\u002Fp>\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">States<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px\">\n          <sc-for list=\"{{ stateNodes }}\" as=\"n\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:16px\">\n              <span style=\"display:inline-flex;align-items:center;height:24px;padding:0 11px;border-radius:9999px;background:{{ n.bg }};color:{{ n.fg }};font-size:12px;font-weight:700;font-family:'SFMono-Regular',Menlo,monospace\">{{ n.label }}<\u002Fspan>\n              <div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:10px\">{{ n.desc }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Transitions<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:1fr 1.4fr 1fr\">\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">From<\u002Fdiv>\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Event<\u002Fdiv>\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">To<\u002Fdiv>\n          <sc-for list=\"{{ stateTransitions }}\" as=\"t\" hint-placeholder-count=\"6\">\n            <div style=\"padding:11px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;color:#2f3e4e;border-bottom:1px solid #f4f5f8\">{{ t.from }}<\u002Fdiv>\n            <div style=\"padding:11px 16px;font-size:13px;color:#4c5966;border-bottom:1px solid #f4f5f8\">{{ t.evt }}<\u002Fdiv>\n            <div style=\"padding:11px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;color:#1168c3;border-bottom:1px solid #f4f5f8\">{{ t.to }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Coverage &amp; scheduling rules<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n          <sc-for list=\"{{ schedRules }}\" as=\"s\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex;gap:11px;padding:11px 0;border-bottom:1px solid #f4f5f8\"><span style=\"width:6px;height:6px;border-radius:50%;background:#3092fa;flex:none;margin-top:7px\"><\u002Fspan><span style=\"font-size:13.5px;color:#4c5966;line-height:1.5\">{{ s }}<\u002Fspan><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== TODAY'S REVIEW RANKING ===== -->\n  <sc-if value=\"{{ isRank }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:28px\">\n      <p style=\"margin:0;font-size:15px;color:#4c5966;line-height:1.55;max-width:720px\"><b>Today's Review<\u002Fb> is the one place we cap content — students have little time, so we surface only what matters most for the minutes they have. Every other tab shows its full list. This page is the complete selection algorithm; implement it server-side and return an ordered, pre-trimmed session.<\u002Fp>\n\n      <!-- 1. time budget -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">1 · Session time budget<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:18px 20px\">\n          <p style=\"margin:0 0 12px;font-size:14px;color:#4c5966;line-height:1.55\">A session-length control sets how long the student has; we fill the session to that budget by descending priority — <b>time, not a topic count<\u002Fb>, is the unit of prioritisation. Default <b>10 min<\u002Fb>. <span style=\"color:#7a838c\">(The “I have X min” slider shows on Today's Review when the <b>Session-length control<\u002Fb> feature flag is on; otherwise sessions are a fixed 10 min.)<\u002Fspan><\u002Fp>\n          <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap\">\n            <span style=\"font-size:12px;color:#7a838c;margin-right:4px\">Slider stops (min):<\u002Fspan>\n            <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:13px;font-weight:600;color:#0a0a0a;background:#f1f7fe;border:1px solid #d8e9fc;padding:3px 10px;border-radius:7px\">5<\u002Fspan>\n            <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:13px;font-weight:700;color:#1168c3;background:#e2effd;border:1px solid #aad2ff;padding:3px 10px;border-radius:7px\">10 · default<\u002Fspan>\n            <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:13px;font-weight:600;color:#0a0a0a;background:#f1f7fe;border:1px solid #d8e9fc;padding:3px 10px;border-radius:7px\">15<\u002Fspan>\n            <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:13px;font-weight:600;color:#0a0a0a;background:#f1f7fe;border:1px solid #d8e9fc;padding:3px 10px;border-radius:7px\">20<\u002Fspan>\n            <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:13px;font-weight:600;color:#0a0a0a;background:#f1f7fe;border:1px solid #d8e9fc;padding:3px 10px;border-radius:7px\">30<\u002Fspan>\n            <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:13px;font-weight:600;color:#0a0a0a;background:#f1f7fe;border:1px solid #d8e9fc;padding:3px 10px;border-radius:7px\">45<\u002Fspan>\n            <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:13px;font-weight:600;color:#0a0a0a;background:#f1f7fe;border:1px solid #d8e9fc;padding:3px 10px;border-radius:7px\">60<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"margin-top:14px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px\">\n            <div style=\"background:#fdf4e2;border:1px solid #fcedce;border-radius:10px;padding:11px 13px\"><div style=\"font-size:12px;color:#8b5f04;font-weight:700\">Needs focus<\u002Fdiv><div style=\"font-size:20px;font-weight:800;color:#0a0a0a;margin-top:2px\">4 min<\u002Fdiv><div style=\"font-size:11px;color:#9a7414\">est. per topic check<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#e2effd;border:1px solid #cfe4fc;border-radius:10px;padding:11px 13px\"><div style=\"font-size:12px;color:#1168c3;font-weight:700\">Building<\u002Fdiv><div style=\"font-size:20px;font-weight:800;color:#0a0a0a;margin-top:2px\">3 min<\u002Fdiv><div style=\"font-size:11px;color:#5a89c0\">est. per topic check<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#ecfcda;border:1px solid #d7f3bd;border-radius:10px;padding:11px 13px\"><div style=\"font-size:12px;color:#1d8201;font-weight:700\">Strong<\u002Fdiv><div style=\"font-size:20px;font-weight:800;color:#0a0a0a;margin-top:2px\">2 min<\u002Fdiv><div style=\"font-size:11px;color:#5a9637\">est. per topic check<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#f6f7fb;border:1px solid #e6ebef;border-radius:10px;padding:11px 13px\"><div style=\"font-size:12px;color:#4c5966;font-weight:700\">Other tiles<\u002Fdiv><div style=\"font-size:13px;font-weight:600;color:#2f3e4e;margin-top:4px;line-height:1.35\">quiz ≈ 2/q · summary ≈ 3 · mock exam ≈ 30<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin:12px 0 0;font-size:12.5px;color:#7a838c;line-height:1.5\">A <code style=\"font-family:'SFMono-Regular',Menlo,monospace;background:#f6f7fb;padding:1px 5px;border-radius:4px\">estMinutes<\u002Fcode> on every tile keeps the budget honest across types. Mock exams (~30 min) never fit a review budget — they surface only in the <b>Before Midterm<\u002Fb> prep slot, not Today's Review.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 2. priority -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">2 · Priority score (per candidate)<\u002Fdiv>\n        <div style=\"background:#0f1722;border-radius:14px;padding:18px 20px;overflow-x:auto\">\n          <code style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:13.5px;color:#e6ebef;line-height:1.7;white-space:pre\">priority = <span style=\"color:#f2a708\">0.45<\u002Fspan>·masteryGap  +  <span style=\"color:#9fc6ff\">0.35<\u002Fspan>·examProximity  +  <span style=\"color:#7fe0a8\">0.20<\u002Fspan>·dueness\n\nmasteryGap     →  (100 − coverage%) / 100                  // lower coverage ⇒ higher\nexamProximity  →  examWeight · clamp((21 − daysToExam)/21)  // closer &amp; heavier ⇒ higher\ndueness        →  clamp((7 − daysSinceDue) / 7)            // overdue for spaced review ⇒ higher<\u002Fcode>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px\">\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:12px;padding:13px 15px\"><div style=\"font-size:13px;font-weight:700;color:#0a0a0a\">masteryGap · 0.45<\u002Fdiv><div style=\"font-size:12.5px;color:#7a838c;line-height:1.5;margin-top:4px\">From derived coverage. The biggest lever — weak topics rise.<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:12px;padding:13px 15px\"><div style=\"font-size:13px;font-weight:700;color:#0a0a0a\">examProximity · 0.35<\u002Fdiv><div style=\"font-size:12.5px;color:#7a838c;line-height:1.5;margin-top:4px\">Per-topic <code style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:11.5px\">examWeight<\u002Fcode> (how central to the next exam) × how soon that exam is.<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:12px;padding:13px 15px\"><div style=\"font-size:13px;font-weight:700;color:#0a0a0a\">dueness · 0.20<\u002Fdiv><div style=\"font-size:12.5px;color:#7a838c;line-height:1.5;margin-top:4px\">Spaced-repetition due date. Keeps the loop honest day to day.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:12px 0 0;font-size:12.5px;color:#7a838c;line-height:1.5\">Weights are constants — no ML. <b>Documents and AI artifacts are scored in the same list<\u002Fb>: whatever earns the slot wins it. Ship v1 with these three signals; <b>recency<\u002Fb> (just-uploaded) and <b>community<\u002Fb> (peer study volume) are documented as v2 additions, same shape.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- 3. fill algorithm -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">3 · Fill algorithm<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:6px 20px\">\n          <div style=\"display:flex;gap:13px;padding:13px 0;border-bottom:1px solid #f3f5f8\"><span style=\"flex:none;width:24px;height:24px;border-radius:7px;background:#e2effd;color:#1168c3;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center\">1<\u002Fspan><div style=\"font-size:14px;color:#2f3e4e;line-height:1.5\"><b>Candidates<\u002Fb> = topics due today, minus done / saved-for-tomorrow / skipped.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:13px;padding:13px 0;border-bottom:1px solid #f3f5f8\"><span style=\"flex:none;width:24px;height:24px;border-radius:7px;background:#e2effd;color:#1168c3;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center\">2<\u002Fspan><div style=\"font-size:14px;color:#2f3e4e;line-height:1.5\"><b>Apply band filter<\u002Fb> if any chips are selected (multi-select). Filtering narrows the pool, then the fill re-runs.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:13px;padding:13px 0;border-bottom:1px solid #f3f5f8\"><span style=\"flex:none;width:24px;height:24px;border-radius:7px;background:#e2effd;color:#1168c3;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center\">3<\u002Fspan><div style=\"font-size:14px;color:#2f3e4e;line-height:1.5\"><b>Sort<\u002Fb> by <code style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12px\">priority<\u002Fcode> desc (stable — original order breaks ties).<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:13px;padding:13px 0\"><span style=\"flex:none;width:24px;height:24px;border-radius:7px;background:#e2effd;color:#1168c3;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center\">4<\u002Fspan><div style=\"font-size:14px;color:#2f3e4e;line-height:1.5\"><b>Greedy fill<\u002Fb>: add tiles until the next one would exceed the budget. Always keep at least one. The first selected tile is the live card; the rest queue beneath. As cards are completed, freed budget pulls the next-priority candidate in.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 4. caps + filters -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">4 · Section caps &amp; filters<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:1.1fr 1fr 1.5fr\">\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Section<\u002Fdiv>\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Cap<\u002Fdiv>\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Overflow<\u002Fdiv>\n          <div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13.5px;font-weight:600;color:#0a0a0a\">Today's Review<\u002Fdiv><div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13px;color:#1d8201;font-weight:600\">Time budget (5–60 min)<\u002Fdiv><div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13px;color:#4c5966\">Fills to budget by priority; nothing else shows. Band chips filter the pool, then re-fill.<\u002Fdiv>\n          <div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13.5px;font-weight:600;color:#0a0a0a\">Tomorrow<\u002Fdiv><div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13px;color:#4c5966;font-weight:600\">6 tiles<\u002Fdiv><div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13px;color:#4c5966\">“+N more saved” → Topics<\u002Fdiv>\n          <div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13.5px;font-weight:600;color:#0a0a0a\">Before Midterm<\u002Fdiv><div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13px;color:#4c5966;font-weight:600\">8 tiles (curated mix)<\u002Fdiv><div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13px;color:#4c5966\">Highest-priority exam-prep set<\u002Fdiv>\n          <div style=\"padding:12px 16px;font-size:13.5px;font-weight:600;color:#0a0a0a\">Keep building<\u002Fdiv><div style=\"padding:12px 16px;font-size:13px;color:#4c5966;font-weight:600\">8 tiles (curated mix)<\u002Fdiv><div style=\"padding:12px 16px;font-size:13px;color:#4c5966\">Curated group — no overflow link<\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:12px 0 0;font-size:12.5px;color:#7a838c;line-height:1.5\">Caps apply <b>only on Today<\u002Fb>. <b>Tomorrow<\u002Fb> caps by count and spills into a “+N more saved” link to Topics. <b>Before Midterm<\u002Fb> and <b>Keep building<\u002Fb> are <b>curated groups<\u002Fb> of up to 8 mixed tiles (documents via <code style=\"font-family:'SFMono-Regular',Menlo,monospace;background:#eef1f4;padding:1px 5px;border-radius:4px\">DocTile<\u002Fcode>, every other artifact via <code style=\"font-family:'SFMono-Regular',Menlo,monospace;background:#eef1f4;padding:1px 5px;border-radius:4px\">ArtifactTile<\u002Fcode>) — no overflow link. When the whole session is cleared, an end-of-session CTA offers <b>Jump to Topics<\u002Fb>.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== EVENTS ===== -->\n  <sc-if value=\"{{ isEvents }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto\">\n      <p style=\"margin:0 0 22px;font-size:15px;color:#4c5966;line-height:1.55;max-width:680px\">Events to instrument for the course experience. Names are <code style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;background:#f6f7fb;padding:2px 6px;border-radius:5px\">snake_case<\u002Fcode>; align final taxonomy with the analytics team.<\u002Fp>\n      <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:1.1fr 1.1fr 1.3fr\">\n        <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Event<\u002Fdiv>\n        <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Fires when<\u002Fdiv>\n        <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Properties<\u002Fdiv>\n        <sc-for list=\"{{ events }}\" as=\"ev\" hint-placeholder-count=\"8\">\n          <div style=\"padding:11px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;font-weight:600;color:#2f3e4e;border-bottom:1px solid #f4f5f8\">{{ ev.name }}<\u002Fdiv>\n          <div style=\"padding:11px 16px;font-size:13px;color:#4c5966;border-bottom:1px solid #f4f5f8\">{{ ev.when }}<\u002Fdiv>\n          <div style=\"padding:11px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:11.5px;color:#7a838c;border-bottom:1px solid #f4f5f8;word-break:break-word\">{{ ev.props }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== FEATURE FLAGS & ROLLOUT ===== -->\n  <sc-if value=\"{{ isFlags }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:28px\">\n      <p style=\"margin:0;font-size:15px;color:#4c5966;line-height:1.55;max-width:700px\">Everything ships behind a flag, <b>all OFF by default<\u002Fb> — the base course page (spine, review loop, tabs, artifact viewer) is always on; these gate the in-progress layers on top. Toggle them live from <b>Feature flags<\u002Fb> in the prototype toolbar (top-right) to preview each state.<\u002Fp>\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Flags<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:200px 1fr 84px\">\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Flag<\u002Fdiv>\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">What it gates<\u002Fdiv>\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3;text-align:center\">Default<\u002Fdiv>\n          <sc-for list=\"{{ flagSpec }}\" as=\"f\" hint-placeholder-count=\"3\">\n            <div style=\"padding:13px 16px;border-bottom:1px solid #f4f5f8\">\n              <div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;font-weight:600;color:#2f3e4e\">{{ f.key }}<\u002Fdiv>\n              <div style=\"font-size:13px;color:#7a838c;margin-top:2px\">{{ f.label }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:13px 16px;border-bottom:1px solid #f4f5f8;font-size:13.5px;color:#4c5966;line-height:1.55\">{{ f.desc }}<\u002Fdiv>\n            <div style=\"padding:13px 16px;border-bottom:1px solid #f4f5f8;display:flex;align-items:flex-start;justify-content:center\"><span style=\"display:inline-flex;align-items:center;height:22px;padding:0 10px;border-radius:9999px;background:#f6f7fb;border:1px solid #e6ebef;color:#7a838c;font-size:11px;font-weight:700;letter-spacing:.04em\">OFF<\u002Fspan><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <p style=\"margin:12px 0 0;font-size:12.5px;color:#7a838c;line-height:1.5\">Wire each to your flag service by <code style=\"font-family:'SFMono-Regular',Menlo,monospace;background:#f6f7fb;padding:1px 5px;border-radius:4px\">key<\u002Fcode>. Off must fully hide the surface (no dead entry points) — e.g. <code style=\"font-family:'SFMono-Regular',Menlo,monospace;background:#f6f7fb;padding:1px 5px;border-radius:4px\">addCreate<\u002Fcode> off removes every + Add / uploader; <code style=\"font-family:'SFMono-Regular',Menlo,monospace;background:#f6f7fb;padding:1px 5px;border-radius:4px\">sessionLength<\u002Fcode> off falls back to fixed 10-min sessions (no slider).<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Data-confidence levels<\u002Fdiv>\n        <p style=\"margin:0 0 12px;font-size:13.5px;color:#4c5966;line-height:1.55;max-width:700px\">Course data quality is tiered. <b>L3 is the only tier built and shipping first<\u002Fb> (~1,000 US courses with full topic/exam data); the others are scoped later and gate how much of the spine can be populated.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px\">\n          <sc-for list=\"{{ levels }}\" as=\"l\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:16px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between\">\n                <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:16px;font-weight:800;color:#0a0a0a\">{{ l.label }}<\u002Fspan>\n                <sc-if value=\"{{ l.avail }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display:inline-flex;align-items:center;height:20px;padding:0 9px;border-radius:9999px;background:#ecfcda;color:#1d8201;font-size:10.5px;font-weight:700;letter-spacing:.04em\">BUILT<\u002Fspan><\u002Fsc-if>\n                <sc-if value=\"{{ l.notAvail }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"display:inline-flex;align-items:center;height:20px;padding:0 9px;border-radius:9999px;background:#f6f7fb;border:1px solid #e6ebef;color:#9ea9b5;font-size:10.5px;font-weight:700;letter-spacing:.04em\">LATER<\u002Fspan><\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"font-size:13px;color:#7a838c;margin-top:9px\">{{ l.sub }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== NOTES ===== -->\n  <sc-if value=\"{{ isNotes }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:28px\">\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#8b5f04;margin-bottom:12px\">Open questions<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px\">\n          <sc-for list=\"{{ notesOpen }}\" as=\"n\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fdf4e2;border:1px solid #fcedce;border-radius:14px;padding:16px 18px\">\n              <div style=\"font-size:14.5px;font-weight:700;color:#0a0a0a\">{{ n.q }}<\u002Fdiv>\n              <div style=\"font-size:13.5px;color:#8b5f04;line-height:1.55;margin-top:5px\">{{ n.a }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px\">\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Mocked in the prototype<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n            <sc-for list=\"{{ notesMocked }}\" as=\"m\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;gap:11px;padding:11px 0;border-bottom:1px solid #f4f5f8\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 512 512\" fill=\"#9ea9b5\" style=\"flex:none;margin-top:3px\"><path d=\"M256 512a256 256 0 1 0 0-512 256 256 0 1 0 0 512zM216 336l24 0 0-64-24 0c-13.3 0-24-10.7-24-24s10.7-24 24-24l48 0c13.3 0 24 10.7 24 24l0 88 8 0c13.3 0 24 10.7 24 24s-10.7 24-24 24l-80 0c-13.3 0-24-10.7-24-24s10.7-24 24-24zm40-208a32 32 0 1 1 0 64 32 32 0 1 1 0-64z\"><\u002Fpath><\u002Fsvg><span style=\"font-size:13.5px;color:#4c5966;line-height:1.5\">{{ m }}<\u002Fspan><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Edge cases to handle<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n            <sc-for list=\"{{ notesEdge }}\" as=\"e\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;gap:11px;padding:11px 0;border-bottom:1px solid #f4f5f8\"><span style=\"width:6px;height:6px;border-radius:50%;background:#3092fa;flex:none;margin-top:7px\"><\u002Fspan><span style=\"font-size:13.5px;color:#4c5966;line-height:1.5\">{{ e }}<\u002Fspan><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { page:'cover', flagsOpen:false, flags:{ streaks:false, addCreate:false, sessionLength:false }, dataLevel:'L3', tokQ:'', specMode:false, specActive:null, specRects:{}, specCW:1000 };\n  setTokQ(v){ this.setState({ tokQ:v }); }\n\n  // ---------- FEATURE FLAGS (all OFF by default) ----------\n  FLAG_CATALOG = [\n    { key:'streaks', label:'Streaks', desc:'Daily-streak strip on the Today view. Parked in V0 pending global-streak work.' },\n    { key:'addCreate', label:'Add & create', desc:'The \"+ Add\" create flow + drag-&-drop uploaders (topic builder, document upload). Off hides all add/create entry points.' },\n    { key:'sessionLength', label:'Session-length control', desc:'Shows the \"I have X min\" slider on Today\\'s Review so the student sets their own time budget (5–60 min). Off = fixed 10-min sessions.' },\n  ];\n  // Data confidence levels — only L3 is built/available for now.\n  LEVELS = [\n    { key:'L1', label:'L1', sub:'Generic', avail:false },\n    { key:'L2', label:'L2', sub:'Reverse-eng', avail:false },\n    { key:'L3', label:'L3', sub:'Full data', avail:true },\n    { key:'L4', label:'L4', sub:'Deferred', avail:false },\n  ];\n  toggleFlagsPanel(){ this.setState(s=>({ flagsOpen:!s.flagsOpen })); }\n  closeFlags(){ this.setState({ flagsOpen:false }); }\n  toggleFlag(key){ this.setState(s=>({ flags:{ ...s.flags, [key]: !s.flags[key] } })); }\n  setLevel(key){ const lv=this.LEVELS.find(l=>l.key===key); if(lv && lv.avail) this.setState({ dataLevel:key }); }\n\n  // ===== Spec mode: a handoff-only overlay that measures the LIVE embedded prototype (read-only).\n  //       It never mutates the prototype DOM — it only reads getBoundingClientRect + text to place\n  //       numbered markers, each linking to the relevant component spec page via go(page). =====\n  SPEC_REGIONS = [\n    { id:'header', n:1, label:'Course header',             page:'c-header',       text:'Introduction to Psychology',\n      bullets:['Folder icon, title + course-code chip','Professor and institution line','Share / Follow / Upload actions, top-right'] },\n    { id:'tabs',   n:2, label:'Category tabs',             page:'c-tabs',         sel:'.tabscroll',\n      bullets:['Scrollable strip with numeric counters','Edge-fade chevrons appear on overflow','Today is the live view (no count)'] },\n    { id:'exam',   n:3, label:'Exam strip',                page:'c-exam',         text:'Midterm 1',\n      bullets:['Urgency by days-to-exam (3 tiers)','~2 events shown + a collapsed \"N more\"','Nearest exam uses warning tokens'] },\n    { id:'today',  n:4, label:\"Today's Review card\",        page:'c-topiccard',    text:\"Today's review\",\n      bullets:['Coverage ring = coverage, NOT question progress','A question shows immediately (no start click)','Skip / Come back tomorrow / go deeper'] },\n    { id:'spine',  n:5, label:'Today spine',               page:'c-spine',        text:'Tomorrow',\n      bullets:['Today > Tomorrow > milestone > Keep building','Deferred topics land as Tomorrow tiles','Threaded on one vertical spine line'] },\n    { id:'tiles',  n:6, label:'Artifact & document tiles', page:'c-artifacttile', text:'Keep building',\n      bullets:['DocTile (page thumbnail) + ArtifactTile (icon)','Shared 160x306 proportions so they line up','Whole tile opens the full-bleed surface'] },\n  ];\n  toggleSpec(){ const on=!this.state.specMode; this.setState({ specMode:on, specActive:null }, ()=>{ if(on){ this._specSig=null; this.measureSpec(); } }); }\n  closeSpec(){ this.setState({ specActive:null }); }\n  openSpec(id){ this.setState({ specActive:id }); }\n  setProtoEl(el){ this.protoEl=el; if(el && this.state.specMode){ this._specSig=null; setTimeout(()=>this.measureSpec(), 90); } }\n  findOwnText(root, text){\n    const els = root.querySelectorAll('h1,h2,h3,span,div,button,a');\n    for(let i=0;i<els.length;i++){ const el=els[i]; let own='';\n      for(let j=0;j<el.childNodes.length;j++){ const nd=el.childNodes[j]; if(nd.nodeType===3) own+=nd.nodeValue; }\n      if(own.trim()===text) return el; }\n    return null;\n  }\n  measureSpec(){\n    if(!this.state.specMode) return;\n    const c=this.protoEl;\n    if(!c){ if(Object.keys(this.state.specRects||{}).length) this.setState({ specRects:{} }); return; }\n    const cr=c.getBoundingClientRect();\n    const colEl=c.querySelector('.tabscroll');\n    const colW=colEl ? colEl.getBoundingClientRect().width : 900;\n    const out={};\n    for(let k=0;k<this.SPEC_REGIONS.length;k++){ const r=this.SPEC_REGIONS[k];\n      let el = r.sel ? c.querySelector(r.sel) : this.findOwnText(c, r.text);\n      if(!el) continue;\n      let box=el;\n      if(!r.sel){ let climbs=0; while(box.parentElement && climbs<7){ if(box.getBoundingClientRect().width >= colW*0.6) break; box=box.parentElement; climbs++; } }\n      const b=box.getBoundingClientRect();\n      if(b.width<8 || b.height<8) continue;\n      out[r.id]={ id:r.id, n:r.n, label:r.label, page:r.page, bullets:r.bullets,\n        left:Math.round(b.left-cr.left), top:Math.round(b.top-cr.top), w:Math.round(b.width), h:Math.round(b.height) };\n    }\n    const cw=Math.round(cr.width);\n    const sig=JSON.stringify(out)+'|'+cw;\n    if(this._specSig!==sig){ this._specSig=sig; this.setState({ specRects:out, specCW:cw }); }\n  }\n  componentDidMount(){\n    this._specTimer=setInterval(()=>{ if(this.state.specMode) this.measureSpec(); }, 400);\n    this._onSpecResize=()=>{ if(this.state.specMode) this.measureSpec(); };\n    window.addEventListener('resize', this._onSpecResize);\n  }\n  componentWillUnmount(){ clearInterval(this._specTimer); window.removeEventListener('resize', this._onSpecResize); }\n\n  // ---------- PRD / CONTEXT ----------\n  prdContext = \"The course page is the front door to a course on Studocu. Today it's a passive list of materials. Study OS turns it into an active study surface \\u2014 a personal review loop layered on the community pool \\u2014 so every student lands knowing exactly what to do next.\";\n  prdBets = [\n    { t:'Zero clicks to value', d:'Study starts the instant you land \\u2014 a real question, not a \"start\" button.' },\n    { t:'Next, not everything', d:'The spine prioritizes by mastery gap, exam proximity and dueness, budgeted to the time you have.' },\n    { t:'Community-first, personal on top', d:'Uploads join the shared course pool. The personal layer is today\\u2019s review cards \\u2014 not a private vault.' },\n  ];\n  prdShift = [\n    { b:'Sidebar navigation', a:'Mobile-style tabs, everywhere' },\n    { b:'Browse by material or topic', a:'A prioritized spine: Today \\u2192 Tomorrow \\u2192 milestone' },\n    { b:'A \"start practice\" click', a:'A question the moment you land' },\n    { b:'Static progress bars', a:'One coverage ring \\u2014 how much you know' },\n    { b:'Sessions disappear', a:'Topics persist as navigable artifacts' },\n    { b:'Passive materials list', a:'Community pool + a personal study layer' },\n  ];\n  prdScope = [\n    { k:'Building now', v:'L3', d:'~1,000 US courses with real data', tone:'go' },\n    { k:'Next', v:'L2 \\u2192 L1', d:'Reverse-engineered to add courses', tone:'info' },\n    { k:'Deferred', v:'L4', d:'Revisited at the end', tone:'muted' },\n  ];\n  prdDecisions = [\n    { g:'Layout', items:['No sidebar \\u2014 responsive tabs','Spine view for content','Compact header + collapsing exam strip'] },\n    { g:'Review loop', items:['Question shown on load','Coverage ring (not question progress)','\\u221e go deeper or come back tomorrow','Topic = navigable artifact'] },\n    { g:'Content', items:['Community pool + personal filter','Add = create, via Study AI','SLICE tiles: documents vs artifa
