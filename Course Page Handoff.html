v style=\"padding:11px 14px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12px;color:#4c5966;border-bottom:1px solid #f4f5f8\">{{ r.v }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">DocTile · measurements<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:130px 1fr\">\n            <sc-for list=\"{{ docTileMeasure }}\" as=\"r\" hint-placeholder-count=\"6\">\n              <div style=\"padding:11px 14px;font-size:13px;font-weight:600;color:#2f3e4e;border-bottom:1px solid #f4f5f8\">{{ r.k }}<\u002Fdiv>\n              <div style=\"padding:11px 14px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12px;color:#4c5966;border-bottom:1px solid #f4f5f8\">{{ r.v }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- PROPS -->\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px\">\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">ArtifactTile · props<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 16px\">\n            <sc-for list=\"{{ artTileProps }}\" as=\"p\" hint-placeholder-count=\"4\">\n              <div style=\"padding:11px 0;border-bottom:1px solid #f4f5f8\"><div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;font-weight:600;color:#2f3e4e\">{{ p.name }} <span style=\"color:#1168c3;font-weight:400;font-size:11px\">{{ p.type }}<\u002Fspan><sc-if value=\"{{ p.hasDef }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"margin-left:8px;font-size:10.5px;font-weight:700;color:#7a838c;background:#f1f3f6;border:1px solid #e6ebef;padding:2px 7px;border-radius:9999px;font-family:'DM Sans',sans-serif;white-space:nowrap\">default {{ p.defVal }}<\u002Fspan><\u002Fsc-if><\u002Fdiv><div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:3px\">{{ p.desc }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">DocTile · props<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 16px\">\n            <sc-for list=\"{{ docTileProps }}\" as=\"p\" hint-placeholder-count=\"4\">\n              <div style=\"padding:11px 0;border-bottom:1px solid #f4f5f8\"><div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;font-weight:600;color:#2f3e4e\">{{ p.name }} <span style=\"color:#1168c3;font-weight:400;font-size:11px\">{{ p.type }}<\u002Fspan><sc-if value=\"{{ p.hasDef }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"margin-left:8px;font-size:10.5px;font-weight:700;color:#7a838c;background:#f1f3f6;border:1px solid #e6ebef;padding:2px 7px;border-radius:9999px;font-family:'DM Sans',sans-serif;white-space:nowrap\">default {{ p.defVal }}<\u002Fspan><\u002Fsc-if><\u002Fdiv><div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:3px\">{{ p.desc }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- CODE + RESPONSIVE -->\n      <div style=\"display:grid;grid-template-columns:1.4fr 1fr;gap:20px;align-items:start\">\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Usage<\u002Fdiv>\n          <pre style=\"margin:0;background:#0f1722;color:#d7e2f0;border-radius:12px;padding:16px 18px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;line-height:1.7;overflow-x:auto\">&lt;BaseMaterialTile\n  kind=\"exam\"\n  title=\"Midterm 1 mock exam\"\n  meta={[{ icon: 'list', label: '30 questions' }]}\n  onOpen={openArtifact}\n/&gt;<\u002Fpre>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Responsive<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:14px 16px;font-size:13px;color:#7a838c;line-height:1.6\">Grids use <code style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12px;background:#f6f7fb;padding:1px 5px;border-radius:4px;color:#4c5966\">minmax(160px,1fr)<\u002Fcode> — tiles wrap and reflow. Tile height is fixed at 306px; title clamps to 2 lines so mixed content stays aligned. Below 680px the grid drops to 2 columns.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== DOCUMENTS VIEW ===== -->\n  <sc-if value=\"{{ isDocsP }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:28px\">\n      <p style=\"margin:0;font-size:15px;color:#4c5966;line-height:1.55;max-width:700px\">The Documents tab is a <b style=\"color:#2f3e4e\">community pool with a personal layer on top<\u002Fb>. A SLICE segmented toggle (<code style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;background:#f6f7fb;padding:2px 6px;border-radius:5px;color:#4c5966\">stoggle<\u002Fcode>) switches <b style=\"color:#2f3e4e\">Course<\u002Fb> ⇄ <b style=\"color:#2f3e4e\">My documents<\u002Fb>. Uploads are community by default — no private scope, no lock badge.<\u002Fp>\n\n      <!-- PREVIEW -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Preview · toolbar<\u002Fdiv>\n        <div style=\"background:#f6f7fb;border:1px dashed #d3d9e0;border-radius:16px;padding:24px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap\">\n            <div style=\"display:inline-flex;background:#f6f7fb;border:1px solid #e6ebef;border-radius:9999px;padding:4px;gap:2px\">\n              <span style=\"padding:8px 18px;border-radius:9999px;background:#fff;color:#0a0a0a;font-size:14px;font-weight:700;box-shadow:0 1px 2px 0 rgba(0,0,0,.12)\">Course<\u002Fspan>\n              <span style=\"padding:8px 18px;border-radius:9999px;background:transparent;color:#4c5966;font-size:14px;font-weight:700\">My documents<\u002Fspan>\n            <\u002Fdiv>\n            <span style=\"display:inline-flex;align-items:center;gap:8px;height:40px;padding:0 20px;border-radius:9999px;background:#3092fa;color:#fff;font-size:15px;font-weight:700\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 448 512\" fill=\"currentColor\"><path d=\"M256 64c0-17.7-14.3-32-32-32s-32 14.3-32 32l0 160-160 0c-17.7 0-32 14.3-32 32s14.3 32 32 32l160 0 0 160c0 17.7 14.3 32 32 32s32-14.3 32-32l0-160 160 0c17.7 0 32-14.3 32-32s-14.3-32-32-32l-160 0 0-160z\"><\u002Fpath><\u002Fsvg>Add<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"margin-top:14px;font-size:13px;color:#7a838c\">“My documents” shows a neutral <span style=\"background:#eef1f4;color:#4c5966;font-size:11px;font-weight:700;padding:2px 8px;border-radius:9999px\">Added by you<\u002Fspan> marker — still community-visible.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- BEHAVIOR -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Behavior rules<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">\n          <sc-for list=\"{{ docsBehavior }}\" as=\"b\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:12px;padding:14px 16px\"><div style=\"font-size:14px;font-weight:700;color:#2f3e4e\">{{ b.t }}<\u002Fdiv><div style=\"font-size:13px;color:#7a838c;line-height:1.55;margin-top:4px\">{{ b.d }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- MEASUREMENTS -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Measurements &amp; tokens<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:200px 1fr\">\n          <sc-for list=\"{{ docsMeasure }}\" as=\"r\" hint-placeholder-count=\"6\">\n            <div style=\"padding:11px 16px;font-size:13px;font-weight:600;color:#2f3e4e;border-bottom:1px solid #f4f5f8\">{{ r.k }}<\u002Fdiv>\n            <div style=\"padding:11px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12px;color:#4c5966;border-bottom:1px solid #f4f5f8\">{{ r.v }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- PROPS + CODE -->\n      <div style=\"display:grid;grid-template-columns:1fr 1.1fr;gap:20px;align-items:start\">\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Props<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 16px\">\n            <sc-for list=\"{{ docsProps }}\" as=\"p\" hint-placeholder-count=\"4\">\n              <div style=\"padding:11px 0;border-bottom:1px solid #f4f5f8\"><div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;font-weight:600;color:#2f3e4e\">{{ p.name }} <span style=\"color:#1168c3;font-weight:400;font-size:11px\">{{ p.type }}<\u002Fspan><sc-if value=\"{{ p.hasDef }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"margin-left:8px;font-size:10.5px;font-weight:700;color:#7a838c;background:#f1f3f6;border:1px solid #e6ebef;padding:2px 7px;border-radius:9999px;font-family:'DM Sans',sans-serif;white-space:nowrap\">default {{ p.defVal }}<\u002Fspan><\u002Fsc-if><\u002Fdiv><div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:3px\">{{ p.desc }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Usage<\u002Fdiv>\n          <pre style=\"margin:0;background:#0f1722;color:#d7e2f0;border-radius:12px;padding:16px 18px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;line-height:1.7;overflow-x:auto\">&lt;SegmentedToggle\n  value={scope}\n  options={['course', 'mine']}\n  onChange={setScope}\n/&gt;\n&lt;Button variant=\"primary\" onClick={openAdd}&gt;\n  + Add\n&lt;/Button&gt;<\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== ADD = CREATE ===== -->\n  <sc-if value=\"{{ isCreateP }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:28px\">\n      <p style=\"margin:0;font-size:15px;color:#4c5966;line-height:1.55;max-width:700px\">Uploading is also a <b style=\"color:#2f3e4e\">creation entry point<\u002Fb>. The page owns the entry point, the library and the study layer; the heavy generation is framed as <b style=\"color:#2f3e4e\">Study AI<\u002Fb> (a handoff). The flow runs in six moments:<\u002Fp>\n\n      <!-- STEPS -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">The flow<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <sc-for list=\"{{ createSteps }}\" as=\"s\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex;gap:14px;background:#fff;border:1px solid #e6ebef;border-radius:12px;padding:14px 16px\">\n              <span style=\"width:28px;height:28px;border-radius:9999px;background:#e2effd;color:#1168c3;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none\">{{ s.n }}<\u002Fspan>\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\"><span style=\"font-size:15px;font-weight:700;color:#0a0a0a\">{{ s.t }}<\u002Fspan><span style=\"font-size:11px;font-weight:700;color:#4c5966;background:#f6f7fb;border:1px solid #e6ebef;padding:2px 8px;border-radius:9999px\">{{ s.comp }}<\u002Fspan><\u002Fdiv>\n                <div style=\"font-size:13.5px;color:#7a838c;line-height:1.55;margin-top:4px\">{{ s.d }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- GUARDRAIL -->\n      <div style=\"background:#fdf4e2;border:1px solid #fcedce;border-radius:12px;padding:16px 18px\">\n        <div style=\"font-size:13px;font-weight:700;color:#8b5f04;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px\">Guardrail<\u002Fdiv>\n        <div style=\"font-size:14px;color:#6b4a03;line-height:1.55\">Generation is <b>Study AI’s<\u002Fb> job (handoff). The course page owns the <b>entry point<\u002Fb>, the <b>library<\u002Fb> and the <b>study layer<\u002Fb> — never the heavy generation model. Keep the “created with Study AI” framing on results.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- MEASUREMENTS -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Measurements &amp; tokens<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:200px 1fr\">\n          <sc-for list=\"{{ createMeasure }}\" as=\"r\" hint-placeholder-count=\"6\">\n            <div style=\"padding:11px 16px;font-size:13px;font-weight:600;color:#2f3e4e;border-bottom:1px solid #f4f5f8\">{{ r.k }}<\u002Fdiv>\n            <div style=\"padding:11px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12px;color:#4c5966;border-bottom:1px solid #f4f5f8\">{{ r.v }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- PROPS -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Props · CreateFlow<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n          <sc-for list=\"{{ createProps }}\" as=\"p\" hint-placeholder-count=\"5\">\n            <div style=\"padding:11px 0;border-bottom:1px solid #f4f5f8\"><div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;font-weight:600;color:#2f3e4e\">{{ p.name }} <span style=\"color:#1168c3;font-weight:400;font-size:11px\">{{ p.type }}<\u002Fspan> <span style=\"color:#9ea9b5;font-weight:400;font-size:11px\">= {{ p.def }}<\u002Fspan><\u002Fdiv><div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:3px\">{{ p.desc }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== EMPTY & EDGE STATES ===== -->\n  <sc-if value=\"{{ isEmptyP }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:24px\">\n      <p style=\"margin:0;font-size:15px;color:#4c5966;line-height:1.55;max-width:700px\">Every surface has a defined empty, loading and error state. Each maps to a SLICE status family — the treatment column lists the exact container / border / foreground tokens to use.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n        <sc-for list=\"{{ emptyStates }}\" as=\"e\" hint-placeholder-count=\"8\">\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:flex;flex-direction:column\">\n            <div style=\"padding:16px 18px;background:{{ e.bg }};border-bottom:1px solid {{ e.bd }}\">\n              <div style=\"display:flex;align-items:center;gap:8px\">\n                <span style=\"width:10px;height:10px;border-radius:9999px;background:{{ e.fg }};flex:none\"><\u002Fspan>\n                <span style=\"font-size:14px;font-weight:700;color:#0a0a0a\">{{ e.t }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-size:13.5px;font-style:italic;color:{{ e.fg }};margin-top:8px\">{{ e.copy }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:12px 18px 16px;display:flex;flex-direction:column;gap:8px\">\n              <div><span style=\"font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5\">When<\u002Fspan><div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:2px\">{{ e.when }}<\u002Fdiv><\u002Fdiv>\n              <div><span style=\"font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5\">Treatment<\u002Fspan><div style=\"font-size:13px;color:#4c5966;line-height:1.5;margin-top:2px\">{{ e.treat }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== DATA MODEL ===== -->\n  <sc-if value=\"{{ isData }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto\">\n      <p style=\"margin:0 0 22px;font-size:15px;color:#4c5966;line-height:1.55;max-width:680px\">Entities behind the course experience. Coverage and labels are <b>derived<\u002Fb>, not stored. Field types are indicative — confirm exact column types with the backend team.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:16px\">\n        <sc-for list=\"{{ dataEntities }}\" as=\"e\" hint-placeholder-count=\"6\">\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden\">\n            <div style=\"padding:14px 16px 12px;border-bottom:1px solid #f1f3f6\">\n              <div style=\"font-size:15px;font-weight:700;color:#0a0a0a;font-family:'SFMono-Regular',Menlo,monospace\">{{ e.name }}<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#7a838c;margin-top:3px\">{{ e.desc }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <sc-for list=\"{{ e.fields }}\" as=\"f\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex;align-items:baseline;gap:10px;padding:8px 16px;border-bottom:1px solid #f6f7fa\">\n                  <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;font-weight:600;color:#2f3e4e;width:96px;flex:none\">{{ f.f }}<\u002Fspan>\n                  <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:11.5px;color:#1168c3;flex:1;min-width:0\">{{ f.t }}<\u002Fspan>\n                  <span style=\"font-size:11px;color:#9ea9b5;flex:none\">{{ f.note }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== API ===== -->\n  <sc-if value=\"{{ isApi }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto\">\n      <p style=\"margin:0 0 22px;font-size:15px;color:#4c5966;line-height:1.55;max-width:680px\">Indicative REST surface for the screen. Paths and shapes are a starting point for the backend contract — names and pagination to be finalised together.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:12px\">\n        <sc-for list=\"{{ apiEndpoints }}\" as=\"ep\" hint-placeholder-count=\"6\">\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:15px 18px\">\n            <div style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap\">\n              <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:11px;font-weight:700;color:#fff;background:{{ ep.c }};padding:3px 9px;border-radius:6px;letter-spacing:.03em;flex:none\">{{ ep.m }}<\u002Fspan>\n              <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:14px;font-weight:600;color:#0a0a0a\">{{ ep.path }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:13.5px;color:#4c5966;line-height:1.5;margin-top:9px\">{{ ep.desc }}<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;margin-top:9px\"><span style=\"font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#9ea9b5\">Returns<\u002Fspan><span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12px;color:#1168c3;background:#f1f7fe;padding:2px 8px;border-radius:6px\">{{ ep.res }}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== STATE MACHINE ===== -->\n  <sc-if value=\"{{ isStates }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:28px\">\n      <p style=\"margin:0;font-size:15px;color:#4c5966;line-height:1.55;max-width:680px\">Every topic carries one state per user, stored on <code style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;background:#f6f7fb;padding:2px 6px;border-radius:5px\">TopicProgress.state<\u002Fcode>. The UI surfaces drive transitions; an overnight job re-queues due topics.<\u002Fp>\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">States<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px\">\n          <sc-for list=\"{{ stateNodes }}\" as=\"n\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:16px\">\n              <span style=\"display:inline-flex;align-items:center;height:24px;padding:0 11px;border-radius:9999px;background:{{ n.bg }};color:{{ n.fg }};font-size:12px;font-weight:700;font-family:'SFMono-Regular',Menlo,monospace\">{{ n.label }}<\u002Fspan>\n              <div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:10px\">{{ n.desc }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Transitions<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:1fr 1.4fr 1fr\">\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">From<\u002Fdiv>\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Event<\u002Fdiv>\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">To<\u002Fdiv>\n          <sc-for list=\"{{ stateTransitions }}\" as=\"t\" hint-placeholder-count=\"6\">\n            <div style=\"padding:11px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;color:#2f3e4e;border-bottom:1px solid #f4f5f8\">{{ t.from }}<\u002Fdiv>\n            <div style=\"padding:11px 16px;font-size:13px;color:#4c5966;border-bottom:1px solid #f4f5f8\">{{ t.evt }}<\u002Fdiv>\n            <div style=\"padding:11px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;color:#1168c3;border-bottom:1px solid #f4f5f8\">{{ t.to }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Coverage &amp; scheduling rules<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n          <sc-for list=\"{{ schedRules }}\" as=\"s\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex;gap:11px;padding:11px 0;border-bottom:1px solid #f4f5f8\"><span style=\"width:6px;height:6px;border-radius:50%;background:#3092fa;flex:none;margin-top:7px\"><\u002Fspan><span style=\"font-size:13.5px;color:#4c5966;line-height:1.5\">{{ s }}<\u002Fspan><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== TODAY'S REVIEW RANKING ===== -->\n  <sc-if value=\"{{ isRank }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:28px\">\n      <p style=\"margin:0;font-size:15px;color:#4c5966;line-height:1.55;max-width:720px\"><b>Today's Review<\u002Fb> is the one place we cap content — students have little time, so we surface only what matters most for the minutes they have. Every other tab shows its full list. This page is the complete selection algorithm; implement it server-side and return an ordered, pre-trimmed session.<\u002Fp>\n\n      <!-- 1. time budget -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">1 · Session time budget<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:18px 20px\">\n          <p style=\"margin:0 0 12px;font-size:14px;color:#4c5966;line-height:1.55\">A session-length control sets how long the student has; we fill the session to that budget by descending priority — <b>time, not a topic count<\u002Fb>, is the unit of prioritisation. Default <b>10 min<\u002Fb>. <span style=\"color:#7a838c\">(The “I have X min” slider shows on Today's Review when the <b>Session-length control<\u002Fb> feature flag is on; otherwise sessions are a fixed 10 min.)<\u002Fspan><\u002Fp>\n          <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap\">\n            <span style=\"font-size:12px;color:#7a838c;margin-right:4px\">Slider stops (min):<\u002Fspan>\n            <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:13px;font-weight:600;color:#0a0a0a;background:#f1f7fe;border:1px solid #d8e9fc;padding:3px 10px;border-radius:7px\">5<\u002Fspan>\n            <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:13px;font-weight:700;color:#1168c3;background:#e2effd;border:1px solid #aad2ff;padding:3px 10px;border-radius:7px\">10 · default<\u002Fspan>\n            <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:13px;font-weight:600;color:#0a0a0a;background:#f1f7fe;border:1px solid #d8e9fc;padding:3px 10px;border-radius:7px\">15<\u002Fspan>\n            <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:13px;font-weight:600;color:#0a0a0a;background:#f1f7fe;border:1px solid #d8e9fc;padding:3px 10px;border-radius:7px\">20<\u002Fspan>\n            <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:13px;font-weight:600;color:#0a0a0a;background:#f1f7fe;border:1px solid #d8e9fc;padding:3px 10px;border-radius:7px\">30<\u002Fspan>\n            <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:13px;font-weight:600;color:#0a0a0a;background:#f1f7fe;border:1px solid #d8e9fc;padding:3px 10px;border-radius:7px\">45<\u002Fspan>\n            <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:13px;font-weight:600;color:#0a0a0a;background:#f1f7fe;border:1px solid #d8e9fc;padding:3px 10px;border-radius:7px\">60<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"margin-top:14px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px\">\n            <div style=\"background:#fdf4e2;border:1px solid #fcedce;border-radius:10px;padding:11px 13px\"><div style=\"font-size:12px;color:#8b5f04;font-weight:700\">Needs focus<\u002Fdiv><div style=\"font-size:20px;font-weight:800;color:#0a0a0a;margin-top:2px\">4 min<\u002Fdiv><div style=\"font-size:11px;color:#9a7414\">est. per topic check<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#e2effd;border:1px solid #cfe4fc;border-radius:10px;padding:11px 13px\"><div style=\"font-size:12px;color:#1168c3;font-weight:700\">Building<\u002Fdiv><div style=\"font-size:20px;font-weight:800;color:#0a0a0a;margin-top:2px\">3 min<\u002Fdiv><div style=\"font-size:11px;color:#5a89c0\">est. per topic check<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#ecfcda;border:1px solid #d7f3bd;border-radius:10px;padding:11px 13px\"><div style=\"font-size:12px;color:#1d8201;font-weight:700\">Strong<\u002Fdiv><div style=\"font-size:20px;font-weight:800;color:#0a0a0a;margin-top:2px\">2 min<\u002Fdiv><div style=\"font-size:11px;color:#5a9637\">est. per topic check<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#f6f7fb;border:1px solid #e6ebef;border-radius:10px;padding:11px 13px\"><div style=\"font-size:12px;color:#4c5966;font-weight:700\">Other tiles<\u002Fdiv><div style=\"font-size:13px;font-weight:600;color:#2f3e4e;margin-top:4px;line-height:1.35\">quiz ≈ 2/q · summary ≈ 3 · mock exam ≈ 30<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin:12px 0 0;font-size:12.5px;color:#7a838c;line-height:1.5\">A <code style=\"font-family:'SFMono-Regular',Menlo,monospace;background:#f6f7fb;padding:1px 5px;border-radius:4px\">estMinutes<\u002Fcode> on every tile keeps the budget honest across types. Mock exams (~30 min) never fit a review budget — they surface only in the <b>Before Midterm<\u002Fb> prep slot, not Today's Review.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 2. priority -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">2 · Priority score (per candidate)<\u002Fdiv>\n        <div style=\"background:#0f1722;border-radius:14px;padding:18px 20px;overflow-x:auto\">\n          <code style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:13.5px;color:#e6ebef;line-height:1.7;white-space:pre\">priority = <span style=\"color:#f2a708\">0.45<\u002Fspan>·masteryGap  +  <span style=\"color:#9fc6ff\">0.35<\u002Fspan>·examProximity  +  <span style=\"color:#7fe0a8\">0.20<\u002Fspan>·dueness\n\nmasteryGap     →  (100 − coverage%) / 100                  // lower coverage ⇒ higher\nexamProximity  →  examWeight · clamp((21 − daysToExam)/21)  // closer &amp; heavier ⇒ higher\ndueness        →  clamp((7 − daysSinceDue) / 7)            // overdue for spaced review ⇒ higher<\u002Fcode>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px\">\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:12px;padding:13px 15px\"><div style=\"font-size:13px;font-weight:700;color:#0a0a0a\">masteryGap · 0.45<\u002Fdiv><div style=\"font-size:12.5px;color:#7a838c;line-height:1.5;margin-top:4px\">From derived coverage. The biggest lever — weak topics rise.<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:12px;padding:13px 15px\"><div style=\"font-size:13px;font-weight:700;color:#0a0a0a\">examProximity · 0.35<\u002Fdiv><div style=\"font-size:12.5px;color:#7a838c;line-height:1.5;margin-top:4px\">Per-topic <code style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:11.5px\">examWeight<\u002Fcode> (how central to the next exam) × how soon that exam is.<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:12px;padding:13px 15px\"><div style=\"font-size:13px;font-weight:700;color:#0a0a0a\">dueness · 0.20<\u002Fdiv><div style=\"font-size:12.5px;color:#7a838c;line-height:1.5;margin-top:4px\">Spaced-repetition due date. Keeps the loop honest day to day.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:12px 0 0;font-size:12.5px;color:#7a838c;line-height:1.5\">Weights are constants — no ML. <b>Documents and AI artifacts are scored in the same list<\u002Fb>: whatever earns the slot wins it. Ship v1 with these three signals; <b>recency<\u002Fb> (just-uploaded) and <b>community<\u002Fb> (peer study volume) are documented as v2 additions, same shape.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- 3. fill algorithm -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">3 · Fill algorithm<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:6px 20px\">\n          <div style=\"display:flex;gap:13px;padding:13px 0;border-bottom:1px solid #f3f5f8\"><span style=\"flex:none;width:24px;height:24px;border-radius:7px;background:#e2effd;color:#1168c3;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center\">1<\u002Fspan><div style=\"font-size:14px;color:#2f3e4e;line-height:1.5\"><b>Candidates<\u002Fb> = topics due today, minus done / saved-for-tomorrow / skipped.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:13px;padding:13px 0;border-bottom:1px solid #f3f5f8\"><span style=\"flex:none;width:24px;height:24px;border-radius:7px;background:#e2effd;color:#1168c3;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center\">2<\u002Fspan><div style=\"font-size:14px;color:#2f3e4e;line-height:1.5\"><b>Apply band filter<\u002Fb> if any chips are selected (multi-select). Filtering narrows the pool, then the fill re-runs.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:13px;padding:13px 0;border-bottom:1px solid #f3f5f8\"><span style=\"flex:none;width:24px;height:24px;border-radius:7px;background:#e2effd;color:#1168c3;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center\">3<\u002Fspan><div style=\"font-size:14px;color:#2f3e4e;line-height:1.5\"><b>Sort<\u002Fb> by <code style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12px\">priority<\u002Fcode> desc (stable — original order breaks ties).<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:13px;padding:13px 0\"><span style=\"flex:none;width:24px;height:24px;border-radius:7px;background:#e2effd;color:#1168c3;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center\">4<\u002Fspan><div style=\"font-size:14px;color:#2f3e4e;line-height:1.5\"><b>Greedy fill<\u002Fb>: add tiles until the next one would exceed the budget. Always keep at least one. The first selected tile is the live card; the rest queue beneath. As cards are completed, freed budget pulls the next-priority candidate in.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 4. caps + filters -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">4 · Section caps &amp; filters<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:1.1fr 1fr 1.5fr\">\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Section<\u002Fdiv>\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Cap<\u002Fdiv>\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Overflow<\u002Fdiv>\n          <div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13.5px;font-weight:600;color:#0a0a0a\">Today's Review<\u002Fdiv><div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13px;color:#1d8201;font-weight:600\">Time budget (5–60 min)<\u002Fdiv><div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13px;color:#4c5966\">Fills to budget by priority; nothing else shows. Band chips filter the pool, then re-fill.<\u002Fdiv>\n          <div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13.5px;font-weight:600;color:#0a0a0a\">Tomorrow<\u002Fdiv><div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13px;color:#4c5966;font-weight:600\">6 tiles<\u002Fdiv><div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13px;color:#4c5966\">“+N more saved” → Topics<\u002Fdiv>\n          <div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13.5px;font-weight:600;color:#0a0a0a\">Before Midterm<\u002Fdiv><div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13px;color:#4c5966;font-weight:600\">8 tiles (curated mix)<\u002Fdiv><div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13px;color:#4c5966\">Highest-priority exam-prep set<\u002Fdiv>\n          <div style=\"padding:12px 16px;font-size:13.5px;font-weight:600;color:#0a0a0a\">Keep building<\u002Fdiv><div style=\"padding:12px 16px;font-size:13px;color:#4c5966;font-weight:600\">8 tiles (curated mix)<\u002Fdiv><div style=\"padding:12px 16px;font-size:13px;color:#4c5966\">Curated group — no overflow link<\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:12px 0 0;font-size:12.5px;color:#7a838c;line-height:1.5\">Caps apply <b>only on Today<\u002Fb>. <b>Tomorrow<\u002Fb> caps by count and spills into a “+N more saved” link to Topics. <b>Before Midterm<\u002Fb> and <b>Keep building<\u002Fb> are <b>curated groups<\u002Fb> of up to 8 mixed tiles (documents via <code style=\"font-family:'SFMono-Regular',Menlo,monospace;background:#eef1f4;padding:1px 5px;border-radius:4px\">DocTile<\u002Fcode>, every other artifact via <code style=\"font-family:'SFMono-Regular',Menlo,monospace;background:#eef1f4;padding:1px 5px;border-radius:4px\">ArtifactTile<\u002Fcode>) — no overflow link. When the whole session is cleared, an end-of-session CTA offers <b>Jump to Topics<\u002Fb>.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== EVENTS ===== -->\n  <sc-if value=\"{{ isEvents }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto\">\n      <p style=\"margin:0 0 22px;font-size:15px;color:#4c5966;line-height:1.55;max-width:680px\">Events to instrument for the course experience. Names are <code style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;background:#f6f7fb;padding:2px 6px;border-radius:5px\">snake_case<\u002Fcode>; align final taxonomy with the analytics team.<\u002Fp>\n      <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:1.1fr 1.1fr 1.3fr\">\n        <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Event<\u002Fdiv>\n        <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Fires when<\u002Fdiv>\n        <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Properties<\u002Fdiv>\n        <sc-for list=\"{{ events }}\" as=\"ev\" hint-placeholder-count=\"8\">\n          <div style=\"padding:11px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;font-weight:600;color:#2f3e4e;border-bottom:1px solid #f4f5f8\">{{ ev.name }}<\u002Fdiv>\n          <div style=\"padding:11px 16px;font-size:13px;color:#4c5966;border-bottom:1px solid #f4f5f8\">{{ ev.when }}<\u002Fdiv>\n          <div style=\"padding:11px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:11.5px;color:#7a838c;border-bottom:1px solid #f4f5f8;word-break:break-word\">{{ ev.props }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== CHANGELOG ===== -->\n  <sc-if value=\"{{ isLog }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:24px\">\n      <p style=\"margin:0;font-size:15px;color:#4c5966;line-height:1.55;max-width:720px\">Recent changes to the Study OS course page — across the prototype, this handoff, and the user-testing surface. Newest first. Skim the tag to see which surface each change touched.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column\">\n        <sc-for list=\"{{ changelog }}\" as=\"c\" hint-placeholder-count=\"6\">\n          <div style=\"display:grid;grid-template-columns:112px 1fr;gap:20px;align-items:start;margin-bottom:14px\">\n            <div style=\"display:flex;flex-direction:column;gap:8px;align-items:flex-start;padding-top:3px\">\n              <div style=\"font-size:13.5px;font-weight:700;color:#0a0a0a\">{{ c.date }}<\u002Fdiv>\n              <span style=\"font-size:11px;font-weight:700;padding:3px 10px;border-radius:9999px;background:{{ c.chipBg }};color:{{ c.chipFg }}\">{{ c.area }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"border:1px solid #e6ebef;border-radius:14px;background:#fff;padding:16px 18px\">\n              <div style=\"font-size:15px;font-weight:700;color:#0a0a0a;line-height:1.3\">{{ c.title }}<\u002Fdiv>\n              <div style=\"font-size:13.5px;color:#4c5966;line-height:1.55;margin-top:6px\">{{ c.desc }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:10px;background:#f6f7fb;border:1px solid #e6ebef;border-radius:12px;padding:13px 16px\">\n        <span style=\"flex:none;width:22px;height:22px;border-radius:50%;background:#9ea9b5;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:800\">i<\u002Fspan>\n        <div style=\"font-size:13px;color:#4c5966;line-height:1.5\">This is the team-facing highlight reel. The exhaustive engineering log (every edit, with token-level detail) lives in the project’s <code style=\"font-family:'SFMono-Regular',Menlo,monospace;background:#eef1f4;padding:1px 5px;border-radius:4px\">CLAUDE.md<\u002Fcode>.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== FEATURE FLAGS & ROLLOUT ===== -->\n  <sc-if value=\"{{ isFlags }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:28px\">\n      <p style=\"margin:0;font-size:15px;color:#4c5966;line-height:1.55;max-width:700px\">Everything ships behind a flag, <b>all OFF by default<\u002Fb> — the base course page (spine, review loop, tabs, artifact viewer) is always on; these gate the in-progress layers on top. Toggle them live from <b>Feature flags<\u002Fb> in the prototype toolbar (top-right) to preview each state.<\u002Fp>\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Flags<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:200px 1fr 84px\">\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Flag<\u002Fdiv>\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">What it gates<\u002Fdiv>\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3;text-align:center\">Default<\u002Fdiv>\n          <sc-for list=\"{{ flagSpec }}\" as=\"f\" hint-placeholder-count=\"3\">\n            <div style=\"padding:13px 16px;border-bottom:1px solid #f4f5f8\">\n              <div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;font-weight:600;color:#2f3e4e\">{{ f.key }}<\u002Fdiv>\n              <div style=\"font-size:13px;color:#7a838c;margin-top:2px\">{{ f.label }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:13px 16px;border-bottom:1px solid #f4f5f8;font-size:13.5px;color:#4c5966;line-height:1.55\">{{ f.desc }}<\u002Fdiv>\n            <div style=\"padding:13px 16px;border-bottom:1px solid #f4f5f8;display:flex;align-items:flex-start;justify-content:center\"><span style=\"display:inline-flex;align-items:center;height:22px;padding:0 10px;border-radius:9999px;background:#f6f7fb;border:1px solid #e6ebef;color:#7a838c;font-size:11px;font-weight:700;letter-spacing:.04em\">OFF<\u002Fspan><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <p style=\"margin:12px 0 0;font-size:12.5px;color:#7a838c;line-height:1.5\">Wire each to your flag service by <code style=\"font-family:'SFMono-Regular',Menlo,monospace;background:#f6f7fb;padding:1px 5px;border-radius:4px\">key<\u002Fcode>. Off must fully hide the surface (no dead entry points) — e.g. <code style=\"font-family:'SFMono-Regular',Menlo,monospace;background:#f6f7fb;padding:1px 5px;border-radius:4px\">addCreate<\u002Fcode> off removes every + Add / uploader; <code style=\"font-family:'SFMono-Regular',Menlo,monospace;background:#f6f7fb;padding:1px 5px;border-radius:4px\">sessionLength<\u002Fcode> off falls back to fixed 10-min sessions (no slider).<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Data-confidence levels<\u002Fdiv>\n        <p style=\"margin:0 0 12px;font-size:13.5px;color:#4c5966;line-height:1.55;max-width:700px\">Course data quality is tiered. <b>L3 is the only tier built and shipping first<\u002Fb> (~1,000 US courses with full topic/exam data); the others are scoped later and gate how much of the spine can be populated.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px\">\n          <sc-for list=\"{{ levels }}\" as=\"l\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:16px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between\">\n                <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:16px;font-weight:800;color:#0a0a0a\">{{ l.label }}<\u002Fspan>\n                <sc-if value=\"{{ l.avail }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display:inline-flex;align-items:center;height:20px;padding:0 9px;border-radius:9999px;background:#ecfcda;color:#1d8201;font-size:10.5px;font-weight:700;letter-spacing:.04em\">BUILT<\u002Fspan><\u002Fsc-if>\n                <sc-if value=\"{{ l.notAvail }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"display:inline-flex;align-items:center;height:20px;padding:0 9px;border-radius:9999px;background:#f6f7fb;border:1px solid #e6ebef;color:#9ea9b5;font-size:10.5px;font-weight:700;letter-spacing:.04em\">LATER<\u002Fspan><\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"font-size:13px;color:#7a838c;margin-top:9px\">{{ l.sub }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== NOTES ===== -->\n  <sc-if value=\"{{ isNotes }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:28px\">\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#8b5f04;margin-bottom:12px\">Open questions<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px\">\n          <sc-for list=\"{{ notesOpen }}\" as=\"n\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fdf4e2;border:1px solid #fcedce;border-radius:14px;padding:16px 18px\">\n              <div style=\"font-size:14.5px;font-weight:700;color:#0a0a0a\">{{ n.q }}<\u002Fdiv>\n              <div style=\"font-size:13.5px;color:#8b5f04;line-height:1.55;margin-top:5px\">{{ n.a }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px\">\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Mocked in the prototype<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n            <sc-for list=\"{{ notesMocked }}\" as=\"m\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;gap:11px;padding:11px 0;border-bottom:1px solid #f4f5f8\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 512 512\" fill=\"#9ea9b5\" style=\"flex:none;margin-top:3px\"><path d=\"M256 512a256 256 0 1 0 0-512 256 256 0 1 0 0 512zM216 336l24 0 0-64-24 0c-13.3 0-24-10.7-24-24s10.7-24 24-24l48 0c13.3 0 24 10.7 24 24l0 88 8 0c13.3 0 24 10.7 24 24s-10.7 24-24 24l-80 0c-13.3 0-24-10.7-24-24s10.7-24 24-24zm40-208a32 32 0 1 1 0 64 32 32 0 1 1 0-64z\"><\u002Fpath><\u002Fsvg><span style=\"font-size:13.5px;color:#4c5966;line-height:1.5\">{{ m }}<\u002Fspan><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Edge cases to handle<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n            <sc-for list=\"{{ notesEdge }}\" as=\"e\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;gap:11px;padding:11px 0;border-bottom:1px solid #f4f5f8\"><span style=\"width:6px;height:6px;border-radius:50%;background:#3092fa;flex:none;margin-top:7px\"><\u002Fspan><span style=\"font-size:13.5px;color:#4c5966;line-height:1.5\">{{ e }}<\u002Fspan><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== PREV / NEXT PAGER (every doc page) ===== -->\n  <sc-if value=\"{{ showPager }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:6px 40px 70px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n      <sc-if value=\"{{ hasPrev }}\" hint-placeholder-val=\"{{ false }}\">\n        <button onclick=\"{{ goPrevPage }}\" style=\"display:flex;align-items:center;gap:14px;text-align:left;background:#fff;border:1px solid #e6ebef;border-radius:16px;padding:16px 18px;cursor:pointer;font-family:inherit;transition:border-color .15s,box-shadow .15s\" style-hover=\"border-color:#aad2ff;box-shadow:0 6px 18px rgba(15,23,34,.07)\">\n          <span style=\"flex:none;width:34px;height:34px;border-radius:50%;background:#f6f7fb;color:#4c5966;display:flex;align-items:center;justify-content:center\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 448 512\" fill=\"currentColor\"><path d=\"M9.4 233.4c-12.5 12.5-12.5 32.8 0 45.3l160 160c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L109.2 288 416 288c17.7 0 32-14.3 32-32s-14.3-32-32-32l-306.7 0L214.6 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0l-160 160z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <span style=\"min-width:0\">\n            <span style=\"display:block;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#9ea9b5\">Previous · {{ prevGroup }}<\u002Fspan>\n            <span style=\"display:block;font-size:15px;font-weight:700;color:#0a0a0a;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ prevTitle }}<\u002Fspan>\n          <\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ noPrev }}\" hint-placeholder-val=\"{{ false }}\"><span><\u002Fspan><\u002Fsc-if>\n      <sc-if value=\"{{ hasNext }}\" hint-placeholder-val=\"{{ true }}\">\n        <button onclick=\"{{ goNextPage }}\" style=\"display:flex;align-items:center;justify-content:flex-end;gap:14px;text-align:right;background:#fff;border:1px solid #e6ebef;border-radius:16px;padding:16px 18px;cursor:pointer;font-family:inherit;transition:border-color .15s,box-shadow .15s\" style-hover=\"border-color:#aad2ff;box-shadow:0 6px 18px rgba(15,23,34,.07)\">\n          <span style=\"min-width:0\">\n            <span style=\"display:block;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#9ea9b5\">Next · {{ nextGroup }}<\u002Fspan>\n            <span style=\"display:block;font-size:15px;font-weight:700;color:#0a0a0a;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ nextTitle }}<\u002Fspan>\n          <\u002Fspan>\n          <span style=\"flex:none;width:34px;height:34px;border-radius:50%;background:#e2effd;color:#1168c3;display:flex;align-items:center;justify-content:center\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 448 512\" fill=\"currentColor\"><path d=\"M438.6 278.6c12.5-12.5 12.5-32.8 0-45.3l-160-160c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L338.7 224 32 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l306.7 0L233.4 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l160-160z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ noNext }}\" hint-placeholder-val=\"{{ false }}\"><span><\u002Fspan><\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { page:'cover', flagsOpen:false, flags:{ streaks:false, addCreate:false, sessionLength:false, resultRecs:false, cramMode:false }, dataLevel:'L3', protoVersion:'v2.3', tokQ:'', navQ:'', copiedTok:null, specMode:false, specActive:null, specRects:{}, specCW:1000 };\n  setTokQ(v){ this.setState({ tokQ:v }); }\n  setNavQ(v){ this.setState({ navQ:v }); }\n  copyTok(full){\n    try{\n      if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(full); }\n      else{ const ta=document.createElement('textarea'); ta.value=full; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }\n    }catch(e){}\n    clearTimeout(this._copyT);\n    this.setState({ copiedTok:full });\n    this._copyT=setTimeout(()=>this.setState({ copiedTok:null }), 1500);\n  }\n\n  // ---------- CHANGELOG (team-readable recent-changes log) ----------\n  CHANGELOG = [\n    { date:'Jul 8', area:'Prototype', tone:'proto', title:'Cram mode (feature flag, OFF by default)',\n      desc:'New flag \"cramMode\". When an exam is < 2 days out the course page enters a serious cram takeover; the flag forces that state now for testing. Full takeover of the Today tab: the exam strip collapses to one hard live countdown; Today\\u2019s Review re-weights to a pure highest-yield × biggest-gap triage queue with no time cap and no \"come back tomorrow\"; the ring reframes as exam-readiness toward an 80% target; and a \"Rapid recall\" cheat sheet of the most-likely-tested facts sits between questions. Tomorrow and Keep-building are hidden. Off = the normal spaced daily loop, unchanged. v2.3 only.' },\n    { date:'Jul 8', area:'Prototype', tone:'proto', title:'v2.3 — result screen now uses the grading scale',\n      desc:'When you finish a topic’s questions, the headline is now graded on our coverage → copy scale (\"Let’s begin!\" … \"Well done!\") and the primary button adapts to how you did — \"Strengthen this topic\" when there’s work to do, \"Sharpen this topic\" when you’re close, \"Go deeper\" once you’ve got it. Replaces the old fixed \"Keep practicing\".' },\n    { date:'Jul 7', area:'Prototype', tone:'proto', title:'v3 build started — the \"daily loop\" Today page',\n      desc:'A new v3 course page rebuilds the Today tab around three mixed-type picks (AI Quiz + Recording + Document) with the first quiz question live on load, a goal-gradient \"on track\" signal instead of a streak, a \"Go to next day\" loop, and an opt-in \"Term plan\" arc (month calendar + premium foresight). Switch to it with the version dropdown in Feature flags.' },\n    { date:'Jul 7', area:'Handoff', tone:'handoff', title:'Handoff overhaul — navigation, tokens & spec fixes',\n      desc:'Rebuilt navigation: numbered pages, quick-find in the sidebar, and previous/next paging on every page. Token rows are now click-to-copy, every props table shows defaults, the sticky-header spec was corrected against the build, and duplicate content was removed.' },\n    { date:'Jul 7', area:'Prototype', tone:'proto', title:'Sticky navigation + compressed course header',\n      desc:'Category tabs now pin under the top bar as you scroll, and a slim course bar (green folder + title + actions) slides in above them — so you always know which course and section you’re in. The full header scrolls away, and nothing jumps.' },\n    { date:'Jul 7', area:'Prototype', tone:'proto', title:'Icon-only actions in the collapsed header',\n      desc:'In the pinned bar, Upload · Share · Follow become compact icon buttons. The normal top-of-page header keeps the full blue “Follow” pill.' },\n    { date:'Jul 7', area:'Handoff', tone:'handoff', title:'Dev spec for the sticky header + a 7th Spec-mode marker',\n      desc:'New “Sticky nav & header” page — two-state preview, layer-stack diagram, measurements, behavior rules, implementation code and accessibility. Spec mode gained a marker on the compressed bar.' },\n    { date:'Jul 6', area:'Prototype', tone:'proto', title:'Course icon is now a green folder',\n      desc:'Aligned to the Studocu standard — a green folder is our universal symbol for a course.' },\n    { date:'Jul 3', area:'User testing', tone:'user', title:'Shareable interview links',\n      desc:'The interview setup now travels in the URL, so a link opens the clean prototype with your exact settings — no sign-in, no setup screen for the interviewee.' },\n    { date:'Jul 3', area:'User testing', tone:'user', title:'Interview-ready prototype page',\n      desc:'A page that shows only the prototype, with every admin option tucked behind a Configure button. Set the flags, launch, and the interviewee sees just the prototype.' },\n    { date:'Jul 2', area:'Handoff', tone:'handoff', title:'Feature flags & rollout reference',\n      desc:'Documented the streaks / add-&-create / session-length flags and the L1–L4 data-confidence tiers.' },\n    { date:'Jul 2', area:'Handoff', tone:'handoff', title:'Full SLICE token reference + Spec mode',\n      desc:'A searchable 71-token colour reference, plus a read-only overlay that pins spec markers onto the live prototype.' },\n  ];\n\n  // ---------- FEATURE FLAGS (all OFF by default) ----------\n  FLAG_CATALOG = [\n    { key:'streaks', label:'Streaks', desc:'Daily-streak strip on the Today view. Parked in V0 pending global-streak work.' },\n    { key:'addCreate', label:'Add & create', desc:'The \"+ Add\" create flow + drag-&-drop uploaders (topic builder, document upload). Off hides all add/create entry points.' },\n    { key:'sessionLength', label:'Session-length control', desc:'Shows the \"I have X min\" slider on Today\\'s Review so the student sets their own time budget (5–60 min). Off = fixed 10-min sessions.' },\n    { key:'resultRecs', label:'Keep-going tiles', desc:'Appends up to 3 peer content picks (reading / podcast / explainer video) to the end of each Today\\'s Review result screen, plus an infinite-practice tile that replaces the \"Sharpen this topic\" CTA.' },\n    { key:'cramMode', label:'Cram mode', desc:'Simulates an exam < 2 days out. Full takeover of the Today tab: hard live countdown, re-weighted highest-yield triage queue (no time cap, no defer), exam-readiness-to-target framing, and a rapid-recall cheat sheet. Off = normal spaced daily loop.' },\n  ];\n  // Data confidence levels — only L3 is built/available for now.\n  LEVELS = [\n    { key:'L1', label:'L1', sub:'Generic', avail:false },\n    { key:'L2', label:'L2', sub:'Reverse-eng', avail:false },\n    { key:'L3', label:'L3', sub:'Full data', avail:true },\n    { key:'L4', label:'L4', sub:'Deferred', avail:false },\n  ];\n  // ---------- PROTOTYPE VERSION ----------\n  // Everything built so far is packed under v2.3. v3 is the build starting now.\n  VERSIONS = [\n    { key:'v2.3', label:'v2.3 — Current', tag:'Current', avail:true },\n    { key:'v3',   label:'v3 — In progress', tag:'In progress', avail:true },\n  ];\n  setVersion(v){ if(this.VERSIONS.some(x=>x.key===v)) this.setState({ protoVersion:v }); }\n  toggleFlagsPanel(){ this.setState(s=>({ flagsOpen:!s.flagsOpen })); }\n  closeFlags(){ this.setState({ flagsOpen:false }); }\n  toggleFlag(key){ this.setState(s=>({ flags:{ ...s.flags, [key]: !s.flags[key] } })); }\n  setLevel(key){ const lv=this.LEVELS.find(l=>l.key===key); if(lv && lv.avail) this.setState({ dataLevel:key }); }\n\n  // ===== Spec mode: a handoff-only overlay that measures the LIVE embedded prototype (read-only).\n  //       It never mutates the prototype DOM — it only reads getBoundingClientRect + text to place\n  //       numbered markers, each linking to the relevant component spec page via go(page). =====\n  SPEC_REGIONS = [\n    { id:'header', n:1, label:'Course header',             page:'c-header',       text:'Introduction to Psychology',\n      bullets:['Folder icon, title + course-code chip','Professor and institution line','Share / Follow / Upload actions, top-right'] },\n    { id:'tabs',   n:2, label:'Category tabs',             page:'c-tabs',         sel:'.tabscroll',\n      bullets:['Scrollable strip with numeric counters','Edge-fade chevrons appear on overflow','Today is the live view (no count)'] },\n    { id:'exam',   n:3, label:'Exam strip',                page:'c-exam',         text:'Midterm 1',\n      bullets:['Urgency by days-to-exam (3 tiers)','~2 events shown + a collapsed \"N more\"','Nearest exam uses warning tokens'] },\n    { id:'today',  n:4, label:\"Today's Review card\",        page:'c-topiccard',    text:\"Today's review\",\n      bullets:['Coverage ring = coverage, NOT question progress','A question shows immediately (no start click)','Skip / Come back tomorrow / go deeper'] },\n    { id:'spine',  n:5, label:'Today spine',               page:'c-spine',        text:'Tomorrow',\n      bullets:['Today > Tomorrow > milestone > Keep building','Deferred topics land as Tomorrow tiles','Threaded on one vertical spine line'] },\n    { id:'tiles',  n:6, label:'Artifact & document tiles', page:'c-artifacttile', text:'Keep building',\n      bullets:['DocTile (page thumbnail) + ArtifactTile (icon)','Shared 160x306 proportions so they line up','Whole tile opens the full-bleed surface'] },\n    { id:'stickynav', n:7, label:'Sticky nav & compact course bar', page:'c-stickynav', sel:'.compactbar',\n      bullets:['Tabs pin under the 72px navbar (sticky, z-index 40)','Compressed course bar collapses in on scroll','Best seen scrolled down — folder + title + icon actions'] },\n  ];\n  toggleSpec(){ const on=!this.state.specMode; this.setState({ specMode:on, specActive:null }, ()=>{ if(on){ this._specSig=null; this.measureSpec(); } }); }\n  closeSpec(){ this.setState({ specActive:null }); }\n  openSpec(id){ this.setState({ specActive:id }); }\n  setProtoEl(el){ this.protoEl=el; if(el && this.state.specMode){ this._specSig=null; setTimeout(()=>this.measureSpec(), 90); } }\n  findOwnText(root, text){\n    const els = root.querySelectorAll('h1,h2,h3,span,div,button,a');\n    for(let i=0;i<els.length;i++){ const el=els[i]; let own='';\n      for(let j=0;j<el.childNodes.length;j++){ const nd=el.childNodes[j]; if(nd.nodeType===3) own+=nd.nodeValue; }\n      if(own.trim()===text) return el; }\n    return null;\n  }\n  measureSpec(){\n    if(!this.state.specMode) return;\n    const c=this.protoEl;\n    if(!c){ if(Object.keys(this.state.specRects||{}).length) this.setState({ specRects:{} }); return; }\n    const cr=c.getBoundingClientRect();\n    const colEl=c.querySelector('.tabscroll');\n    const colW=colEl ? colEl.getBoundingClientRect().width : 900;\n    const out={};\n    for(let k=0;k<this.SPEC_REGIONS.length;k++){ const r=this.SPEC_REGIONS[k];\n      let el = r.sel ? c.querySelector(r.sel) : this.findOwnText(c, r.text);\n      if(!el) continue;\n      let box=el;\n      if(!r.sel){ let climbs=0; while(box.parentElement && climbs<7){ if(box.getBoundingClientRect().width >= colW*0.6) break; box=box.parentElement; climbs++; } }\n      const b=box.getBoundingClientRect();\n      if(b.width<8 || b.height<8) continue;\n      out[r.id]={ id:r.id, n:r.n, label:r.label, page:r.page, bullets:r.bullets,\n        left:Math.round(b.left-cr.left), top:Math.round(b.top-cr.top), w:Math.round(b.width), h:Math.round(b.height) };\n    }\n    const cw=Math.round(cr.width);\n    const sig=JSON.stringify(out)+'|'+cw;\n    if(this._specSig!==sig){ this._specSig=sig; this.setState({ specRects:out, specCW:cw }); }\n  }\n  componentDidMount(){\n    this._specTimer=setInterval(()=>{ if(this.state.specMode) this.measureSpec(); }, 400);\n    this._onSpecResize=()=>{ if(this.state.specMode) this.measureSpec(); };\n    window.addEventListener('resize', this._onSpecResize);\n  }\n  componentWillUnmount(){ clearInterval(this._specTimer); window.removeEventListener('resize', this._onSpecResize); }\n\n  // ---------- PRD / CONTEXT ----------\n  prdContext = \"The course page is the front door to a course on Studocu. Today it's a passive list of materials. Study OS turns it into an active study surface \\u2014 a personal review loop layered on the community pool \\u2014 so every student lands knowing exactly what to do next.\";\n  prdBets = [\n    { t:'Zero clicks to value', d:'Study starts the instant you land \\u2014 a real question, not a \"start\" button.' },\n    { t:'Next, not everything', d:'The spine prioritizes by mastery gap, exam proximity and dueness, budgeted to the time you have.' },\n    { t:'Community-first, personal on top', d:'Uploads join the shared course pool. The personal layer is today\\u2019s review cards \\u2014 not a private vault.' },\n  ];\n  prdShift = [\n    { b:'Sidebar navigation', a:'Mobile-style tabs, everywhere' },\n    { b:'Browse by le\\\" style=\\\"flex:1; min-width:0; white-space:nowrap;\\n          overflow:hidden; text-overflow:ellipsis\\\">Introduction to Psychology<\u002Fspan>\\n    <div class=\\\"actions\\\"><!-- icon-only 34px circles: Upload / Share / Follow --><\u002Fdiv>\\n  <\u002Fdiv>\\n\\n  <div class=\\\"tabs\\\" style=\\\"background:#fff; border-bottom:1px solid #e6ebef\\\">...<\u002Fdiv>\\n<\u002Fdiv>\\n\\n// collapse trigger — rAF-throttled window scroll + resize, with hysteresis.\\n// Bound once via the setHeaderEl(el) ref; removed in componentWillUnmount.\\n_onWinScroll = () => {\\n  if (this._raf) return;\\n  this._raf = requestAnimationFrame(() => {\\n    this._raf = null;\\n    const b = this._headerEl.getBoundingClientRect().bottom;\\n    const c = this.state.compact;\\n    let next = c;\\n    if (!c && b <= 72) next = true;      // header under navbar → collapse\\n    else if (c && b > 96) next = false;  // 16px hysteresis → expand\\n    if (next !== c) this.setState({ compact: next });\\n  });\\n};\\n// navTop = compact ? 124 : 72   ·   compactVis = compact ? 1 : 0\\n// compactPE = compact ? 'auto' : 'none'   ·   compactHidden = !compact\";\n  pillsData = [\n    {label:'Strong',bg:'#ecfcda',fg:'#1d8201',dot:'#2cc302'},\n    {label:'Building',bg:'#e2effd',fg:'#1168c3',dot:'#3092fa'},\n    {label:'Needs focus',bg:'#fdf4e2',fg:'#8b5f04',dot:'#f2a708'},\n  ];\n  pillsMeasure = [\n    {k:'Status pill (dot)',v:'h 26, pad 0 11, radius full, 12/700, 7px dot, gap 6'},\n    {k:'Course-code badge',v:'pad 3 9, radius full, 12/700, bg #f6f7fb, border 1px #e6ebef'},\n    {k:'\"Added\" badge',v:'h 24, pad 0 10, bg #0a0a0a, white, 12/700 + check'},\n    {k:'Date chip (warning)',v:'pad 2 9, radius full, bg #fdf4e2, #8b5f04, 12/500'},\n    {k:'Page-count chip',v:'pad 2 8, radius 8, bg #fff, shadow-1, 12/700'},\n  ];\n  tileMeasure = [\n    {k:'Tile size',v:'160px wide × 306px tall, radius 20'},\n    {k:'Border (outlined)',v:'inset 0 0 0 1px #d3d9e0'},\n    {k:'Media area',v:'height 168px, bg #f6f7fb'},\n    {k:'Ring',v:'54×54, stroke 6, r 22'},\n    {k:'Body padding',v:'16px, gap 12'},\n    {k:'Title',v:'16/500, 3-line clamp, line-height 1.35'},\n    {k:'Meta rows',v:'14px #4c5966, 13px icon, gap 6'},\n    {k:'Grid',v:'repeat(auto-fill,160px), gap 14–16'},\n  ];\n  tileProps = [\n    {name:'title',type:'string',def:'—',desc:'Topic / item name (clamped to 3 lines).'},\n    {name:'coveragePct',type:'number',def:'—',desc:'Ring fill + center label.'},\n    {name:'variant',type:\"'topic' | 'exam' | 'quiz' | 'summary' | 'document'\",def:\"'topic'\",desc:'Media glyph + accent.'},\n    {name:'meta',type:'{ icon, text }[]',def:'[]',desc:'Up to 2 meta rows.'},\n    {name:'added',type:'boolean',def:'false',desc:'Shows the \"Added\" badge overlay.'},\n    {name:'onClick',type:'() => void',def:'—',desc:'Opens options sheet / resumes topic.'},\n  ];\n  tileA11y = [\n    {k:'Container',v:'<button> with accessible name = title; whole tile is the target.'},\n    {k:'Options action',v:'Nested ellipsis <button> (aria-label \"More options\", stopPropagation) opens the options sheet; the card body itself resumes the topic into Today.'},\n    {k:'Ring',v:'aria-label \"X% covered\"; status also in meta text.'},\n  ];\n  sheetMeasure = [\n    {k:'Scrim',v:'#0a0a0a99 (main-background-overlay), fade 200ms; centered dialog'},\n    {k:'Card',v:'max-width 420, radius-5 (20), pad space-8-ish (28), shadow-2 (0 0 8px rgba(0,0,0,.14))'},\n    {k:'Title / sub',v:'fs-5 (22) / 700 / #0a0a0a; sub fs-2 (14) / #4c5966'},\n    {k:'Action row',v:'pad 14 15, radius 12, gap 13'},\n    {k:'Action icon',v:'38×38, radius 12 (primary: white 20% tile; add: success #ecfcda/#1d8201; deep: neutral #e6ebef/#4c5966)'},\n    {k:'Primary action',v:'bg #3092fa → hover #0a75e6, white; secondary bg #f6f7fb → #e6ebef'},\n    {k:'Close',v:'bare 15px × icon (no circle), #7a838c → hover #2f3e4e'},\n  ];\n  sheetProps = [\n    {name:'open',type:'boolean',def:'false',desc:'Mounts the sheet + scrim.'},\n    {na en:'0 days left', title:'Midterm 1', sub:'Today · 20% of grade', badge:'Today', badgeBg:'#e62600',\n      bg:'#fff4f2', border:'1px solid #ffd8cc', accent:'#e62600',\n      note:'Countdown holds all day. It must NOT flip yet — the student may be about to sit the exam.' },\n    { phase:'Just done', when:'Day 1 after', title:'Midterm 1 done', sub:'20% of grade · nice work', badge:'Done', badgeBg:'#2cc302',\n      bg:'#ecfcda', border:'1px solid #d7f3bd', accent:'#1d8201',\n      note:'Flips at the end of the exam day (local midnight after). Fresh — full celebratory treatment.' },\n    { phase:'Fading', when:'Day 7 after', title:'Midterm 1 done', sub:'Last celebratory day', badge:'Done', badgeBg:'#7fb84a',\n      bg:'#f2fae9', border:'1px solid #e4f2cf', accent:'#4c7a1e',\n      note:'The 7-day window (one study-cycle) closes tonight. Day 8 retires the card.' },\n    { phase:'Retired', when:'Day 8+', title:'Midterm 1', sub:'Cleared from the strip', badge:'—', badgeBg:'#9ea9b5',\n      bg:'#f6f7fb', border:'1px solid #e6ebef', accent:'#9ea9b5',\n      note:'Removed from the strip. If it was the last exam, the strip rests at the neutral empty state.' },\n  ];\n  examDoneRules = [\n    'An exam date is a day, not a timestamp — we never know when it actually ends.',\n    'Countdown holds through the entire exam day and flips at the END of that day (the local midnight that follows), never at 00:00 on the day itself.',\n    'Celebration window = 7 days after the exam (one study-cycle rhythm). Days 0–7 show the celebratory “done” state; day 8+ retires it — dopamine decays, a 10-day-old “done 🎉” is stale.',\n    'When every exam is past AND still inside a window, the strip shows the celebratory empty state; once all windows close it settles into the neutral “No exams on the horizon” rest state.',\n    'Ordering is unchanged: a celebrating (past) exam sorts below any upcoming exam so the next real deadline always stays on top.',\n  ];\n  examMeasure = [\n    {k:'Strip card',v:'flex 1, pad 12 15, radius 12, gap 12'},\n    {k:'Due now (≤2 days)',v:'bg #fff4f2, border 1px #ffd8cc, num #e62600'},\n    {k:'This week (3–7 days)',v:'bg #fdf4e2, border 1px #fcedce, num #f2a708'},\n    {k:'Upcoming (8+ days)',v:'bg #f6f7fb, no border, num #9ea9b5'},\n    {k:'Countdown number',v:'22px / 700 (tier color)'},\n    {k:'Meta / date line',v:'12px, tier label color'},\n    {k:'Toggle link',v:'12/500 #1168c3, gap 7, chevron 13px'},\n    {k:'Collapse anim',v:'popIn 250ms ease'},\n  ];\n  examProps = [\n    {name:'exams',type:'{ name, date, weight, daysAway }[]',def:'—',desc:'Sorted nearest-first. daysAway drives the urgency tier.'},\n    {name:'tier(daysAway)',type:\"'due' | 'week' | 'upcoming'\",def:'derived',desc:'≤2 → due (danger), 3–7 → week (warning), 8+ → upcoming (neutral).'},\n    {name:'collapsedCount',type:'number',def:'2',desc:'Cards shown before \"N more exam\". Due-now cards never collapse.'},\n    {name:'open',type:'boolean',def:'false',desc:'Expanded to show remaining exams.'},\n    {name:'flipsAt(exam)',type:'Date',def:'derived',desc:'End of the exam day, local — the moment countdown → done. Never 00:00 on the day itself.'},\n    {name:'celebrationDays',type:'number',def:'7',desc:'How long the celebratory \"done\" state persists after an exam before it retires (one study-cycle).'},\n    {name:'allPast',type:'boolean',def:'derived',desc:'Every exam is behind the student → celebratory empty state, then the neutral rest state once all windows close.'},\n  ];\n\n  // ---------- BACKEND DATA ----------\n  dataEntities = [\n    { name:'Course', desc:'The unit a student follows.', fields:[\n      {f:'id',t:'uuid',note:'PK'},{f:'code',t:'string',note:'e.g. \"PSYC 101\"'},{f:'title',t:'string',note:''},\n      {f:'instructor',t:'string',note:''},{f:'institution',t:'string',note:''},{f:'topicCount',t:'int',note:'derived'},\n      {f:'following',t:'boolean',note:'per-user'},\n    ]},\n    { name:'Topic', desc:'A studyable chunk within a course.', field
