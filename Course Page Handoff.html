document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

{ l.label }}<\u002Fspan>\n                  <span style=\"font-size:10px;font-weight:600;opacity:.8;line-height:1.1;white-space:nowrap\">{{ l.sub }}<\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"font-size:11.5px;color:#9ea9b5;margin-top:9px;line-height:1.4\">L1–L2 reverse-engineered later · L4 deferred — these stay locked for now.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <dc-import name=\"Course Page\" features=\"{{ features }}\" hint-size=\"100%,1280px\"><\u002Fdc-import>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== FOUNDATIONS ===== -->\n  <sc-if value=\"{{ isFound }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:34px\">\n\n      <!-- COLOR -->\n      <section>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:3px\">Color<\u002Fdiv>\n        <p style=\"margin:0 0 16px;font-size:14px;color:#7a838c;max-width:640px\">Semantic tokens from <code style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;background:#f6f7fb;padding:2px 6px;border-radius:5px;color:#4c5966\">@studocu/slice<\u002Fcode>. Use the token name in code — never the raw hex.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:22px\">\n          <sc-for list=\"{{ colorGroups }}\" as=\"grp\" hint-placeholder-count=\"4\">\n            <div>\n              <div style=\"font-size:14px;font-weight:700;color:#2f3e4e;margin-bottom:10px\">{{ grp.title }}<\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px\">\n                <sc-for list=\"{{ grp.items }}\" as=\"c\" hint-placeholder-count=\"4\">\n                  <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #e6ebef;border-radius:12px;padding:11px 13px\">\n                    <span style=\"width:42px;height:42px;border-radius:9px;background:{{ c.v }};box-shadow:inset 0 0 0 1px rgba(0,0,0,.08);flex:none\"><\u002Fspan>\n                    <div style=\"min-width:0\">\n                      <div style=\"font-size:13px;font-weight:700;color:#2f3e4e;line-height:1.2\">{{ c.n }}<\u002Fdiv>\n                      <div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12px;color:#7a838c;margin-top:3px\">{{ c.v }}<\u002Fdiv>\n                      <div style=\"font-size:11.5px;color:#9ea9b5;margin-top:2px\">{{ c.u }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- TYPE -->\n      <section>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:3px\">Typography<\u002Fdiv>\n        <p style=\"margin:0 0 16px;font-size:14px;color:#7a838c;max-width:640px\">Primary typeface is <b style=\"color:#4c5966\">DM Sans<\u002Fb>. Weights in use: 400 / 500 / 700 / 900.<\u002Fp>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden\">\n          <sc-for list=\"{{ typeScale }}\" as=\"t\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex;align-items:center;gap:20px;padding:14px 20px;border-bottom:1px solid #f1f3f6\">\n              <div style=\"flex:1;min-width:0;color:#0a0a0a;font-size:{{ t.px }};font-weight:{{ t.w }};line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ t.sample }}<\u002Fdiv>\n              <div style=\"flex:none;text-align:right\">\n                <div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;color:#2f3e4e;font-weight:600\">{{ t.tok }}<\u002Fdiv>\n                <div style=\"font-size:12px;color:#9ea9b5;margin-top:2px\">{{ t.meta }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- SPACING + RADIUS -->\n      <section style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px\">\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Spacing · 4px base<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 16px\">\n            <sc-for list=\"{{ spaceScale }}\" as=\"s\" hint-placeholder-count=\"6\">\n              <div style=\"display:flex;align-items:center;gap:14px;padding:7px 0;border-bottom:1px solid #f4f5f8\">\n                <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12px;color:#4c5966;width:78px;flex:none\">{{ s.tok }}<\u002Fspan>\n                <span style=\"font-size:12px;color:#9ea9b5;width:42px;flex:none\">{{ s.px }}<\u002Fspan>\n                <span style=\"height:14px;border-radius:4px;background:#aad2ff;width:{{ s.px }}\"><\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Radius<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:14px 16px;display:flex;flex-direction:column;gap:12px\">\n            <sc-for list=\"{{ radiusScale }}\" as=\"r\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;align-items:center;gap:14px\">\n                <span style=\"width:46px;height:46px;background:#e2effd;border:1.5px solid #3092fa;border-radius:{{ r.px }};flex:none\"><\u002Fspan>\n                <div><div style=\"font-family:'SFMono-Regular',Menlo,monospac font-size:12px;color:#3092fa;margin-top:3px\">{{ m.v }}<\u002Fdiv>\n                <div style=\"font-size:12px;color:#9ea9b5;margin-top:2px\">{{ m.use }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== HEADER ===== -->\n  <sc-if value=\"{{ isHeader }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:28px\">\n      <p style=\"margin:0;font-size:15px;color:#4c5966;line-height:1.55;max-width:680px\">The course identity bar at the top of the page: folder icon, title with course-code chip, professor · institution line, and the action cluster (Upload, Share, Follow). No \"updated X ago\" line.<\u002Fp>\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Preview<\u002Fdiv>\n        <div style=\"background:#f6f7fb;border:1px dashed #d3d9e0;border-radius:16px;padding:24px\">\n          <div style=\"display:flex;align-items:flex-start;gap:16px;background:#fff;border:1px solid #e6ebef;border-radius:16px;padding:22px 24px\">\n            <div style=\"width:52px;height:52px;border-radius:12px;background:#f1f7fe;color:#3092fa;display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 512 512\" fill=\"currentColor\"><path d=\"M256 141.3l0 309.3 .5-.2C311.1 427.7 369.7 416 428.8 416l19.2 0 0-320-19.2 0c-42.2 0-84.1 8.4-123.1 24.6-16.8 7-33.4 13.9-49.7 20.7zM230.9 61.5L256 72 281.1 61.5C327.9 42 378.1 32 428.8 32L464 32c26.5 0 48 21.5 48 48l0 352c0 26.5-21.5 48-48 48l-35.2 0c-50.7 0-100.9 10-147.7 29.5l-12.8 5.3c-7.9 3.3-16.7 3.3-24.6 0l-12.8-5.3C184.1 490 133.9 480 83.2 480L48 480c-26.5 0-48-21.5-48-48L0 80C0 53.5 21.5 32 48 32l35.2 0c50.7 0 100.9 10 147.7 29.5z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"flex:1;min-width:0\">\n              <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\"><span style=\"font-size:22px;font-weight:700;letter-spacing:-.02em;color:#0a0a0a\">Introduction to Psychology<\u002Fspan><span style=\"font-size:12px;font-weight:700;color:#4c5966;background:#f6f7fb;border:1px solid #e6ebef;padding:3px 9px;border-radius:9999px\">PSYC 101<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:14px;color:#7a838c;margin-top:5px\">Dr. Sarah Chen · Arizona State University<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:10px;flex:none\">\n              <span aria-label=\"Upload\" style=\"width:40px;height:40px;border-radius:50%;background:#fff;color:#4c5966;box-shadow:inset 0 0 0 1px #d3d9e0;display:inline-flex;align-items:center;justify-content:center\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n              <span aria-label=\"Share\" style=\"width:40px;height:40px;border-radius:50%;background:#fff;color:#4c5966;box-shadow:inset 0 0 0 1px #d3d9e0;display:inline-flex;align-items:center;justify-content:center\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 512 512\" fill=\"currentColor\"><path d=\"M307.8 18.4c-12 5-19.8 16.6-19.8 29.6l0 80-112 0c-97.2 0-176 78.8-176 176 0 113.3 81.5 163.9 100.2 174.1 2.5 1.4 5.3 1.9 8.1 1.9 10.9 0 19.7-8.9 19.7-19.7 0-7.5-4.3-14.4-9.8-19.5-9.4-8.8-22.2-26.4-22.2-56.7 0-53 43-96 96-96l96 0 0 80c0 12.9 7.8 24.6 19.8 29.6s25.7 2.2 34.9-6.9l160-160c12.5-12.5 12.5-32.8 0-45.3l-160-160c-9.2-9.2-22.9-11.9-34.9-6.9z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n              <span style=\"display:inline-flex;align-items:center;gap:8px;height:40px;padding:0 20px weight:600\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 512 512\" fill=\"#7a838c\"><path d=\"M0 96C0 60.7 28.7 32 64 32l132.1 0c19.1 0 37.4 7.6 50.9 21.1L289.9 96 448 96c35.3 0 64 28.7 64 64l0 256c0 35.3-28.7 64-64 64L64 480c-35.3 0-64-28.7-64-64L0 96z\"><\u002Fpath><\u002Fsvg>PSYC 101<\u002Fspan>\n                <span style=\"display:inline-flex;align-items:center;gap:7px;height:34px;padding:0 13px;border-radius:9999px;background:#f6f7fb;color:#2f3e4e;font-size:14px;font-weight:600\"><svg width=\"12\" height=\"12\" viewBox=\"0 0 384 512\" fill=\"#7a838c\"><path d=\"M64 0C28.7 0 0 28.7 0 64L0 448c0 35.3 28.7 64 64 64l256 0c35.3 0 64-28.7 64-64l0-288-128 0c-17.7 0-32-14.3-32-32L224 0 64 0zM256 0l0 128 128 0L256 0zM112 256l160 0c8.8 0 16 7.2 16 16s-7.2 16-16 16l-160 0c-8.8 0-16-7.2-16-16s7.2-16 16-16zm0 64l160 0c8.8 0 16 7.2 16 16s-7.2 16-16 16l-160 0c-8.8 0-16-7.2-16-16s7.2-16 16-16z\"><\u002Fpath><\u002Fsvg>New topic<\u002Fspan>\n                <span style=\"margin-left:auto;width:40px;height:40px;border-radius:50%;background:#0a0a0a;color:#fff;display:inline-flex;align-items:center;justify-content:center;flex:none\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 448 512\" fill=\"currentColor\"><path d=\"M438.6 278.6c12.5-12.5 12.5-32.8 0-45.3l-160-160c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L338.7 224 32 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l306.7 0L233.4 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l160-160z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px;margin-top:14px\">\n          <sc-for list=\"{{ dndVariants }}\" as=\"v\" hint-placeholder-count=\"4\">\n            <div style=\"padding:11px 0;border-bottom:1px solid #f4f5f8\"><div style=\"font-size:13.5px;font-weight:700;color:#2f3e4e\">{{ v.h }}<\u002Fdiv><div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:2px\">{{ v.d }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Measurements<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:260px 1fr\">\n          <sc-for list=\"{{ dndMeasure }}\" as=\"r\" hint-placeholder-count=\"6\">\n            <div style=\"padding:11px 16px;font-size:13.5px;font-weight:600;color:#2f3e4e;border-bottom:1px solid #f4f5f8\">{{ r.k }}<\u002Fdiv>\n            <div style=\"padding:11px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;color:#4c5966;border-bottom:1px solid #f4f5f8\">{{ r.v }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.3fr 1fr;gap:20px\">\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Props<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n            <sc-for list=\"{{ dndProps }}\" as=\"p\" hint-placeholder-count=\"4\">\n              <div style=\"padding:11px 0;border-bottom:1px solid #f4f5f8\"><div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;font-weight:600;color:#2f3e4e\">{{ p.name }} <span style=\"color:#1168c3;font-weight:400;font-size:11px\">{{ p.type }}<\u002Fspan><\u002Fdiv><div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:3px\">{{ p.desc }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Accessibility<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n            <sc-for list=\"{{ dndA11y }}\" as=\"a\" hint-placeholder-count=\"3\">\n              <div style=\"padding:11px 0;border-bottom:1px solid #f4f5f8\"><div style=\"font-size:13px;font-weight:700;color:#2f3e4e\">{{ a.k }}<\u002Fdiv><div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:2px\">{{ a.v }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== DATA MODEL ===== -->\n  <sc-if value=\"{{ isData }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto\">\n      <p style=\"margin:0 0 22px;font-size:15px;color:#4c5966;line-height:1.55;max-width:680px\">Entities behind the course experience. Coverage and labels are <b>derived<\u002Fb>, not stored. Field types are indicative — confirm exact column types with the backend team.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:16px\">\n        <sc-for list=\"{{ dataEntities }}\" as=\"e\" hint-placeholder-count=\"6\">\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden\">\n            <div style=\"padding:14px 16px 12px;border-bottom:1px solid #f1f3f6\">\n              <div style=\"font-size:15px;font-weight:700;color:#0a0a0a;font-family:'SFMono-Regular',Menlo,monospace\">{{ e.name }}<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#7a838c;margin-top:3px\">{{ e.desc }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <sc-for list=\"{{ e.fields }}\" as=\"f\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex;align-items:baseline;gap:10px;padding:8px 16px;border-bottom:1px solid #f6f7fa\">\n                  <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;font-weight:600;color:#2f3e4e;width:96px;flex:none\">{{ f.f }}<\u002Fspan>\n                  <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:11.5px;color:#1168c3;flex:1;min-width:0\">{{ f.t }}<\u002Fspan>\n                  <span style=\"font-size:11px;color:#9ea9b5;flex:none\">{{ f.note }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== API ===== -->\n  <sc-if value=\"{{ isApi }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto\">\n      <p style=\"margin:0 0 22px;font-size:15px;color:#4c5966;line-height:1.55;max-width:680px\">Indicative REST surface for the screen. Paths and shapes are a starting point for the backend contract — names and pagination to be finalised together.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:12px\">\n        <sc-for list=\"{{ apiEndpoints }}\" as=\"ep\" hint-placeholder-count=\"6\">\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:15px 18px\">\n            <div style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap\">\n              <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:11px;font-weight:700;color:#fff;background:{{ ep.c }};padding:3px 9px;border-radius:6px;letter-spacing:.03em;flex:none\">{{ ep.m }}<\u002Fspan>\n              <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:14px;font-weight:600;color:#0a0a0a\">{{ ep.path }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:13.5px;color:#4c5966;line-height:1.5;margin-top:9px\">{{ ep.desc }}<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;margin-top:9px\"><span style=\"font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#9ea9b5\">Returns<\u002Fspan><span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12px;color:#1168c3;background:#f1f7fe;padding:2px 8px;border-radius:6px\">{{ ep.res }}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== STATE MACHINE ===== -->\n  <sc-if value=\"{{ isStates }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:28px\">\n      <p style=\"margin:0;font-size:15px;color:#4c5966;line-height:1.55;max-width:680px\">Every topic carries one state per user, stored on <code style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;background:#f6f7fb;padding:2px 6px;border-radius:5px\">TopicProgress.state<\u002Fcode>. The UI surfaces drive transitions; an overnight job re-queues due topics.<\u002Fp>\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">States<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px\">\n          <sc-for list=\"{{ stateNodes }}\" as=\"n\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:16px\">\n              <span style=\"display:inline-flex;align-items:center;height:24px;padding:0 11px;border-radius:9999px;background:{{ n.bg }};color:{{ n.fg }};font-size:12px;font-weight:700;font-family:'SFMono-Regular',Menlo,monospace\">{{ n.label }}<\u002Fspan>\n              <div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:10px\">{{ n.desc }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Transitions<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:1fr 1.4fr 1fr\">\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">From<\u002Fdiv>\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Event<\u002Fdiv>\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">To<\u002Fdiv>\n          <sc-for list=\"{{ stateTransitions }}\" as=\"t\" hint-placeholder-count=\"6\">\n            <div style=\"padding:11px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;color:#2f3e4e;border-bottom:1px solid #f4f5f8\">{{ t.from }}<\u002Fdiv>\n            <div style=\"padding:11px 16px;font-size:13px;color:#4c5966;border-bottom:1px solid #f4f5f8\">{{ t.evt }}<\u002Fdiv>\n            <div style=\"padding:11px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;color:#1168c3;border-bottom:1px solid #f4f5f8\">{{ t.to }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Coverage &amp; scheduling rules<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n          <sc-for list=\"{{ schedRules }}\" as=\"s\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex;gap:11px;padding:11px 0;border-bottom:1px solid #f4f5f8\"><span style=\"width:6px;height:6px;border-radius:50%;background:#3092fa;flex:none;margin-top:7px\"><\u002Fspan><span style=\"font-size:13.5px;color:#4c5966;line-height:1.5\">{{ s }}<\u002Fspan><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== TODAY'S REVIEW RANKING ===== -->\n  <sc-if value=\"{{ isRank }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:28px\">\n      <p style=\"margin:0;font-size:15px;color:#4c5966;line-height:1.55;max-width:720px\"><b>Today's Review<\u002Fb> is the one place we cap content — students have little time, so we surface only what matters most for the minutes they have. Every other tab shows its full list. This page is the complete selection algorithm; implement it server-side and return an ordered, pre-trimmed session.<\u002Fp>\n\n      <!-- 1. time budget -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">1 · Session time budget<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:18px 20px\">\n          <p style=\"margin:0 0 12px;font-size:14px;color:#4c5966;line-height:1.55\">A session-length control sets how long the student has; we fill the session to that budget by descending priority — <b>time, not a topic count<\u002Fb>, is the unit of prioritisation. Default <b>10 min<\u002Fb>. <span style=\"color:#7a838c\">(The “I have X min” slider shows on Today's Review when the <b>Session-length control<\u002Fb> feature flag is on; otherwise sessions are a fixed 10 min.)<\u002Fspan><\u002Fp>\n          <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap\">\n            <span style=\"font-size:12px;color:#7a838c;margin-right:4px\">Slider stops (min):<\u002Fspan>\n            <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:13px;font-weight:600;color:#0a0a0a;background:#f1f7fe;border:1px solid #d8e9fc;padding:3px 10px;border-radius:7px\">5<\u002Fspan>\n            <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:13px;font-weight:700;color:#1168c3;background:#e2effd;border:1px solid #aad2ff;padding:3px 10px;border-radius:7px\">10 · default<\u002Fspan>\n            <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:13px;font-weight:600;color:#0a0a0a;background:#f1f7fe;border:1px solid #d8e9fc;padding:3px 10px;border-radius:7px\">15<\u002Fspan>\n            <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:13px;font-weight:600;color:#0a0a0a;background:#f1f7fe;border:1px solid #d8e9fc;padding:3px 10px;border-radius:7px\">20<\u002Fspan>\n            <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:13px;font-weight:600;color:#0a0a0a;background:#f1f7fe;border:1px solid #d8e9fc;padding:3px 10px;border-radius:7px\">30<\u002Fspan>\n            <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:13px;font-weight:600;color:#0a0a0a;background:#f1f7fe;border:1px solid #d8e9fc;padding:3px 10px;border-radius:7px\">45<\u002Fspan>\n            <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:13px;font-weight:600;color:#0a0a0a;background:#f1f7fe;border:1px solid #d8e9fc;padding:3px 10px;border-radius:7px\">60<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"margin-top:14px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px\">\n            <div style=\"background:#fdf4e2;border:1px solid #fcedce;border-radius:10px;padding:11px 13px\"><div style=\"font-size:12px;color:#8b5f04;font-weight:700\">Needs focus<\u002Fdiv><div style=\"font-size:20px;font-weight:800;color:#0a0a0a;margin-top:2px\">4 min<\u002Fdiv><div style=\"font-size:11px;color:#9a7414\">est. per topic check<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#e2effd;border:1px solid #cfe4fc;border-radius:10px;padding:11px 13px\"><div style=\"font-size:12px;color:#1168c3;font-weight:700\">Building<\u002Fdiv><div style=\"font-size:20px;font-weight:800;color:#0a0a0a;margin-top:2px\">3 min<\u002Fdiv><div style=\"font-size:11px;color:#5a89c0\">est. per topic check<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#ecfcda;border:1px solid #d7f3bd;border-radius:10px;padding:11px 13px\"><div style=\"font-size:12px;color:#1d8201;font-weight:700\">Strong<\u002Fdiv><div style=\"font-size:20px;font-weight:800;color:#0a0a0a;margin-top:2px\">2 min<\u002Fdiv><div style=\"font-size:11px;color:#5a9637\">est. per topic check<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#f6f7fb;border:1px solid #e6ebef;border-radius:10px;padding:11px 13px\"><div style=\"font-size:12px;color:#4c5966;font-weight:700\">Other tiles<\u002Fdiv><div style=\"font-size:13px;font-weight:600;color:#2f3e4e;margin-top:4px;line-height:1.35\">quiz ≈ 2/q · summary ≈ 3 · mock exam ≈ 30<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin:12px 0 0;font-size:12.5px;color:#7a838c;line-height:1.5\">A <code style=\"font-family:'SFMono-Regular',Menlo,monospace;background:#f6f7fb;padding:1px 5px;border-radius:4px\">estMinutes<\u002Fcode> on every tile keeps the budget honest across types. Mock exams (~30 min) never fit a review budget — they surface only in the <b>Before Midterm<\u002Fb> prep slot, not Today's Review.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 2. priority -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">2 · Priority score (per candidate)<\u002Fdiv>\n        <div style=\"background:#0f1722;border-radius:14px;padding:18px 20px;overflow-x:auto\">\n          <code style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:13.5px;color:#e6ebef;line-height:1.7;white-space:pre\">priority = <span style=\"color:#f2a708\">0.45<\u002Fspan>·masteryGap  +  <span style=\"color:#9fc6ff\">0.35<\u002Fspan>·examProximity  +  <span style=\"color:#7fe0a8\">0.20<\u002Fspan>·dueness\n\nmasteryGap     →  (100 − coverage%) / 100                  // lower coverage ⇒ higher\nexamProximity  →  examWeight · clamp((21 − daysToExam)/21)  // closer &amp; heavier ⇒ higher\ndueness        →  clamp((7 − daysSinceDue) / 7)            // overdue for spaced review ⇒ higher<\u002Fcode>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px\">\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:12px;padding:13px 15px\"><div style=\"font-size:13px;font-weight:700;color:#0a0a0a\">masteryGap · 0.45<\u002Fdiv><div style=\"font-size:12.5px;color:#7a838c;line-height:1.5;margin-top:4px\">From derived coverage. The biggest lever — weak topics rise.<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:12px;padding:13px 15px\"><div style=\"font-size:13px;font-weight:700;color:#0a0a0a\">examProximity · 0.35<\u002Fdiv><div style=\"font-size:12.5px;color:#7a838c;line-height:1.5;margin-top:4px\">Per-topic <code style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:11.5px\">examWeight<\u002Fcode> (how central to the next exam) × how soon that exam is.<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:12px;padding:13px 15px\"><div style=\"font-size:13px;font-weight:700;color:#0a0a0a\">dueness · 0.20<\u002Fdiv><div style=\"font-size:12.5px;color:#7a838c;line-height:1.5;margin-top:4px\">Spaced-repetition due date. Keeps the loop honest day to day.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:12px 0 0;font-size:12.5px;color:#7a838c;line-height:1.5\">Weights are constants — no ML. <b>Documents and AI artifacts are scored in the same list<\u002Fb>: whatever earns the slot wins it. Ship v1 with these three signals; <b>recency<\u002Fb> (just-uploaded) and <b>community<\u002Fb> (peer study volume) are documented as v2 additions, same shape.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- 3. fill algorithm -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">3 · Fill algorithm<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:6px 20px\">\n          <div style=\"display:flex;gap:13px;padding:13px 0;border-bottom:1px solid #f3f5f8\"><span style=\"flex:none;width:24px;height:24px;border-radius:7px;background:#e2effd;color:#1168c3;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center\">1<\u002Fspan><div style=\"font-size:14px;color:#2f3e4e;line-height:1.5\"><b>Candidates<\u002Fb> = topics due today, minus done / saved-for-tomorrow / skipped.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:13px;padding:13px 0;border-bottom:1px solid #f3f5f8\"><span style=\"flex:none;width:24px;height:24px;border-radius:7px;background:#e2effd;color:#1168c3;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center\">2<\u002Fspan><div style=\"font-size:14px;color:#2f3e4e;line-height:1.5\"><b>Apply band filter<\u002Fb> if any chips are selected (multi-select). Filtering narrows the pool, then the fill re-runs.<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:13px;padding:13px 0;border-bottom:1px solid #f3f5f8\"><span style=\"flex:none;width:24px;height:24px;border-radius:7px;background:#e2effd;color:#1168c3;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center\">3<\u002Fspan><div style=\"font-size:14px;color:#2f3e4e;line-height:1.5\"><b>Sort<\u002Fb> by <code style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12px\">priority<\u002Fcode> desc (stable — original order breaks ties).<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;gap:13px;padding:13px 0\"><span style=\"flex:none;width:24px;height:24px;border-radius:7px;background:#e2effd;color:#1168c3;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center\">4<\u002Fspan><div style=\"font-size:14px;color:#2f3e4e;line-height:1.5\"><b>Greedy fill<\u002Fb>: add tiles until the next one would exceed the budget. Always keep at least one. The first selected tile is the live card; the rest queue beneath. As cards are completed, freed budget pulls the next-priority candidate in.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 4. caps + filters -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">4 · Section caps &amp; filters<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:1.1fr 1fr 1.5fr\">\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Section<\u002Fdiv>\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Cap<\u002Fdiv>\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Overflow<\u002Fdiv>\n          <div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13.5px;font-weight:600;color:#0a0a0a\">Today's Review<\u002Fdiv><div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13px;color:#1d8201;font-weight:600\">Time budget (5–60 min)<\u002Fdiv><div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13px;color:#4c5966\">Fills to budget by priority; nothing else shows. Band chips filter the pool, then re-fill.<\u002Fdiv>\n          <div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13.5px;font-weight:600;color:#0a0a0a\">Tomorrow<\u002Fdiv><div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13px;color:#4c5966;font-weight:600\">6 tiles<\u002Fdiv><div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13px;color:#4c5966\">“+N more saved” → Topics<\u002Fdiv>\n          <div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13.5px;font-weight:600;color:#0a0a0a\">Before Midterm<\u002Fdiv><div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13px;color:#4c5966;font-weight:600\">8 tiles (curated mix)<\u002Fdiv><div style=\"padding:12px 16px;border-bottom:1px solid #f6f7fa;font-size:13px;color:#4c5966\">Highest-priority exam-prep set<\u002Fdiv>\n          <div style=\"padding:12px 16px;font-size:13.5px;font-weight:600;color:#0a0a0a\">Keep building<\u002Fdiv><div style=\"padding:12px 16px;font-size:13px;color:#4c5966;font-weight:600\">8 tiles (curated mix)<\u002Fdiv><div style=\"padding:12px 16px;font-size:13px;color:#4c5966\">Curated group — no overflow link<\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:12px 0 0;font-size:12.5px;color:#7a838c;line-height:1.5\">Caps apply <b>only on Today<\u002Fb>. <b>Tomorrow<\u002Fb> caps by count and spills into a “+N more saved” link to Topics. <b>Before Midterm<\u002Fb> and <b>Keep building<\u002Fb> are <b>curated groups<\u002Fb> of up to 8 mixed tiles (documents via <code style=\"font-family:'SFMono-Regular',Menlo,monospace;background:#eef1f4;padding:1px 5px;border-radius:4px\">DocTile<\u002Fcode>, every other artifact via <code style=\"font-family:'SFMono-Regular',Menlo,monospace;background:#eef1f4;padding:1px 5px;border-radius:4px\">ArtifactTile<\u002Fcode>) — no overflow link. When the whole session is cleared, an end-of-session CTA offers <b>Jump to Topics<\u002Fb>.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== EVENTS ===== -->\n  <sc-if value=\"{{ isEvents }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto\">\n      <p style=\"margin:0 0 22px;font-size:15px;color:#4c5966;line-height:1.55;max-width:680px\">Events to instrument for the course experience. Names are <code style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;background:#f6f7fb;padding:2px 6px;border-radius:5px\">snake_case<\u002Fcode>; align final taxonomy with the analytics team.<\u002Fp>\n      <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:1.1fr 1.1fr 1.3fr\">\n        <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Event<\u002Fdiv>\n        <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Fires when<\u002Fdiv>\n        <div style=\"padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Properties<\u002Fdiv>\n        <sc-for list=\"{{ events }}\" as=\"ev\" hint-placeholder-count=\"8\">\n          <div style=\"padding:11px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;font-weight:600;color:#2f3e4e;border-bottom:1px solid #f4f5f8\">{{ ev.name }}<\u002Fdiv>\n          <div style=\"padding:11px 16px;font-size:13px;color:#4c5966;border-bottom:1px solid #f4f5f8\">{{ ev.when }}<\u002Fdiv>\n          <div style=\"padding:11px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:11.5px;color:#7a838c;border-bottom:1px solid #f4f5f8;word-break:break-word\">{{ ev.props }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== NOTES ===== -->\n  <sc-if value=\"{{ isNotes }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:28px\">\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#8b5f04;margin-bottom:12px\">Open questions<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px\">\n          <sc-for list=\"{{ notesOpen }}\" as=\"n\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fdf4e2;border:1px solid #fcedce;border-radius:14px;padding:16px 18px\">\n              <div style=\"font-size:14.5px;font-weight:700;color:#0a0a0a\">{{ n.q }}<\u002Fdiv>\n              <div style=\"font-size:13.5px;color:#8b5f04;line-height:1.55;margin-top:5px\">{{ n.a }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px\">\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Mocked in the prototype<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n            <sc-for list=\"{{ notesMocked }}\" as=\"m\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;gap:11px;padding:11px 0;border-bottom:1px solid #f4f5f8\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 512 512\" fill=\"#9ea9b5\" style=\"flex:none;margin-top:3px\"><path d=\"M256 512a256 256 0 1 0 0-512 256 256 0 1 0 0 512zM216 336l24 0 0-64-24 0c-13.3 0-24-10.7-24-24s10.7-24 24-24l48 0c13.3 0 24 10.7 24 24l0 88 8 0c13.3 0 24 10.7 24 24s-10.7 24-24 24l-80 0c-13.3 0-24-10.7-24-24s10.7-24 24-24zm40-208a32 32 0 1 1 0 64 32 32 0 1 1 0-64z\"><\u002Fpath><\u002Fsvg><span style=\"font-size:13.5px;color:#4c5966;line-height:1.5\">{{ m }}<\u002Fspan><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Edge cases to handle<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n            <sc-for list=\"{{ notesEdge }}\" as=\"e\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;gap:11px;padding:11px 0;border-bottom:1px solid #f4f5f8\"><span style=\"width:6px;height:6px;border-radius:50%;background:#3092fa;flex:none;margin-top:7px\"><\u002Fspan><span style=\"font-size:13.5px;color:#4c5966;line-height:1.5\">{{ e }}<\u002Fspan><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { page:'cover', flagsOpen:false, flags:{ streaks:false, addCreate:false, sessionLength:false }, dataLevel:'L3' };\n\n  // ---------- FEATURE FLAGS (all OFF by default) ----------\n  FLAG_CATALOG = [\n    { key:'streaks', label:'Streaks', desc:'Daily-streak strip on the Today view. Parked in V0 pending global-streak work.' },\n    { key:'addCreate', label:'Add & create', desc:'The \"+ Add\" create flow + drag-&-drop uploaders (topic builder, document upload). Off hides all add/create entry points.' },\n    { key:'sessionLength', label:'Session-length control', desc:'Shows the \"I have X min\" slider on Today\\'s Review so the student sets their own time budget (5–60 min). Off = fixed 10-min sessions.' },\n  ];\n  // Data confidence levels — only L3 is built/available for now.\n  LEVELS = [\n    { key:'L1', label:'L1', sub:'Generic', avail:false },\n    { key:'L2', label:'L2', sub:'Reverse-eng', avail:false },\n    { key:'L3', label:'L3', sub:'Full data', avail:true },\n    { key:'L4', label:'L4', sub:'Deferred', avail:false },\n  ];\n  toggleFlagsPanel(){ this.setState(s=>({ flagsOpen:!s.flagsOpen })); }\n  closeFlags(){ this.setState({ flagsOpen:false }); }\n  toggleFlag(key){ this.setState(s=>({ flags:{ ...s.flags, [key]: !s.flags[key] } })); }\n  setLevel(key){ const lv=this.LEVELS.find(l=>l.key===key); if(lv && lv.avail) this.setState({ dataLevel:key }); }\n\n  // ---------- PRD / CONTEXT ----------\n  prdContext = \"The course page is the front door to a course on Studocu. Today it's a passive list of materials. Study OS turns it into an active study surface \\u2014 a personal review loop layered on the community pool \\u2014 so every student lands knowing exactly what to do next.\";\n  prdBets = [\n    { t:'Zero clicks to value', d:'Study starts the instant you land \\u2014 a real question, not a \"start\" button.' },\n    { t:'Next, not everything', d:'The spine prioritizes by mastery gap, exam proximity and dueness, budgeted to the time you have.' },\n    { t:'Community-first, personal on top', d:'Uploads join the shared course pool. The personal layer is today\\u2019s review cards \\u2014 not a private vault.' },\n  ];\n  prdShift = [\n    { b:'Sidebar navigation', a:'Mobile-style tabs, everywhere' },\n    { b:'Browse by material or topic', a:'A prioritized spine: Today \\u2192 Tomorrow \\u2192 milestone' },\n    { b:'A \"start practice\" click', a:'A question the moment you land' },\n    { b:'Static progress bars', a:'One coverage ring \\u2014 how much you know' },\n    { b:'Sessions disappear', a:'Topics persist as navigable artifacts' },\n    { b:'Passive materials list', a:'Community pool + a personal study layer' },\n  ];\n  prdScope = [\n    { k:'Building now', v:'L3', d:'~1,000 US courses with real data', tone:'go' },\n key, label:l.label, sub:l.sub, avail:l.avail,\n        selected: this.state.dataLevel===l.key,\n        unavail: !l.avail,\n        color: this.state.dataLevel===l.key ? '#fff' : (l.avail ? '#2f3e4e' : '#bcc4cc'),\n        bg: this.state.dataLevel===l.key ? '#3092fa' : 'transparent',\n        cursor: l.avail ? 'pointer' : 'not-allowed',\n        onClick: ()=>this.setLevel(l.key),\n      })),\n      showHeader: page!=='cover' && page!=='prototype',\n      pageTitle: this.TITLES[page], pageKicker: this.KICKERS[page],\n      isCover: page==='cover', isProto: page==='prototype', isPrd: page==='prd', isFound: page==='foundations',\n      goPrd: ()=>this.go('prd'),\n      prdContext: this.prdContext, prdBets: this.prdBets, prdShift: this.prdShift,\n      prdScope: this.prdScope.map(s=>({ ...s,\n        chipBg: s.tone==='go'?'#ecfcda':s.tone==='info'?'#e2effd':'#f6f7fb',\n        chipFg: s.tone==='go'?'#1d8201':s.tone==='info'?'#1168c3':'#7a838c' })),\n      prdDecisions: this.prdDecisions, prdSignals: this.prdSignals, prdOpen: this.prdOpen, prdTeam: this.prdTeam, prdTry: this.prdTry.map((t,i)=>({ ...t, n:String(i+1) })),\n      isHeader: page==='c-header', isSpine: page==='c-spine', isExamMock: page==='c-exammock',\n      isTC: page==='c-topiccard', isBtn: page==='c-buttons', isTabs: page==='c-tabs', isPills: page==='c-pills',\n      isTile: page==='c-tile', isSheet: page==='c-sheet', isExamC: page==='c-exam',\n      isDnd: page==='c-dnd',\n      isData: page==='b-data', isApi: page==='b-api', isStates: page==='b-states', isRank: page==='b-rank', isEvents: page==='b-events',\n      isNotes: page==='notes',\n      goProto: ()=>this.go('prototype'), goFound: ()=>this.go('foundations'),\n      coverMeta: this.coverMeta, coverLinks, legend: this.legend,\n      colorGroups: this.colorGroups, typeScale: this.typeScale, spaceScale: this.spaceScale,\n      radiusScale: this.radiusScale, shadowScale: this.shadowScale, motionScale: this.motionScale,\n      tcMeasure:this.tcMeasure, tcProps:this.tcProps, tcA11y:this.tcA11y, tcBehavior:this.tcBehavior,\n      headerMeasure:this.headerMeasure, headerProps:this.headerProps, headerA11y:this.headerA11y,\n      spineMeasure:this.spineMeasure, spineNodes:this.spineNodes, spineProps:this.spineProps, spineA11y:this.spineA11y,\n      examMockMeasure:this.examMockMeasure, examMockProps:this.examMockProps,\n      btnMeasure:this.btnMeasure, btnProps:this.btnProps, btnA11y:this.btnA11y,\n      tabsMeasure:this.tabsMeasure, tabsProps:this.tabsProps, tabsA11y:this.tabsA11y,\n      pillsData:this.pillsData, pillsMeasure:this.pillsMeasure,\n      tileMeasure:this.tileMeasure, tileProps:this.tileProps, tileA11y:this.tileA11y,\n      sheetMeasure:this.sheetMeasure, sheetProps:this.sheetProps, sheetA11y:this.sheetA11y,\n      examMeasure:this.examMeasure, examProps:this.examProps,\n      dndMeasure:this.dndMeasure, dndVariants:this.dndVariants, dndProps:this.dndProps, dndA11y:this.dndA11y,\n      dataEntities:this.dataEntities, apiEndpoints:this.apiEndpoints,\n      stateNodes:this.stateNodes, stateTransitions:this.stateTransitions, schedRules:this.schedRules,\n      events:this.events, notesOpen:this.notesOpen, notesMocked:this.notesMocked, notesEdge:this.notesEdge,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
