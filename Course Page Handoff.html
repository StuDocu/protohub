document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-width:240px;max-width:420px\">\n            <svg width=\"15\" height=\"15\" viewBox=\"0 0 512 512\" fill=\"#9ea9b5\" style=\"position:absolute;left:14px;top:50%;transform:translateY(-50%)\"><path d=\"M416 208c0 45.9-14.9 88.3-40 122.7L502.6 457.4c12.5 12.5 12.5 32.8 0 45.3s-32.8 12.5-45.3 0L330.7 376c-34.4 25.2-76.8 40-122.7 40C93.1 416 0 322.9 0 208S93.1 0 208 0S416 93.1 416 208zM208 352a144 144 0 1 0 0-288 144 144 0 1 0 0 288z\"><\u002Fpath><\u002Fsvg>\n            <input value=\"{{ tokQ }}\" oninput=\"{{ setTokQ }}\" placeholder=\"Search tokens — name, hex or usage…\" style=\"width:100%;height:42px;padding:0 16px 0 38px;border-radius:9999px;border:1px solid #d3d9e0;background:#fff;font-family:'DM Sans',sans-serif;font-size:14px;color:#2f3e4e;outline:none\" style-focus=\"border-color:#3092fa;box-shadow:0 0 0 3px rgba(48,146,250,.15)\">\n          <\u002Fdiv>\n          <span style=\"font-size:12.5px;color:#9ea9b5;font-weight:600\">{{ tokCount }} / {{ tokTotal }} tokens<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:22px\">\n          <sc-for list=\"{{ colorTokenGroups }}\" as=\"grp\" hint-placeholder-count=\"6\">\n            <div>\n              <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:10px\">\n                <span style=\"font-size:13px;font-weight:700;color:#2f3e4e\">{{ grp.grp }}<\u002Fspan>\n                <span style=\"font-size:11px;font-weight:700;color:#7a838c;background:#e9edf1;padding:2px 8px;border-radius:9999px\">{{ grp.count }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:6px\">\n                <sc-for list=\"{{ grp.items }}\" as=\"c\" hint-placeholder-count=\"4\">\n                  <button onclick=\"{{ c.onCopy }}\" title=\"Copy token name\" style=\"display:flex;align-items:center;gap:14px;width:100%;text-align:left;background:#fff;border:1px solid #e6ebef;border-radius:10px;padding:8px 14px;cursor:pointer;font-family:inherit;transition:border-color .15s,background .15s\" style-hover=\"border-color:#aad2ff;background:#fbfdff\">\n                    <span style=\"width:32px;height:32px;border-radius:8px;background:{{ c.v }};box-shadow:inset 0 0 0 1px rgba(0,0,0,.08);flex:none\"><\u002Fspan>\n                    <span style=\"flex:1;min-width:0;display:flex;flex-direction:column;gap:2px\">\n                      <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12px;font-weight:600;color:#1168c3;line-height:1.4;word-break:break-all\">{{ c.full }}<\u002Fspan>\n                      <span style=\"font-size:12px;color:#9ea9b5;line-height:1.4\">{{ c.u }}<\u002Fspan>\n                    <\u002Fspan>\n                    <span style=\"flex:none;width:78px;font-family:'SFMono-Regular',Menlo,monospace;font-size:11.5px;color:#7a838c;text-align:right\">{{ c.v }}<\u002Fspan>\n                    <sc-if value=\"{{ c.copied }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"flex:none;display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#1d8201;background:#ecfcda;padding:3px 9px;border-radius:9999px\"><svg width=\"10\" height=\"10\" viewBox=\"0 0 448 512\" fill=\"currentColor\"><path d=\"M438.6 105.4c12.5 12.5 12.5 32.8 0 45.3l-256 256c-12.5 12.5-32.8 12.5-45.3 0l-128-128c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0L160 338.7 393.4 105.4c12.5-12.5 32.8-12.5 45.3 0z\"><\u002Fpath><\u002Fsvg>Copied<\u002Fspan><\u002Fsc-if>\n                    <sc-if value=\"{{ c.notCopied }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"flex:none;color:#c6cdd4;display:inline-flex\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 512 512\" fill=\"currentColor\"><path d=\"M288 448L64 448l0-224 41.4 0 45.3-45.3c-2.2-1.8-5-2.7-7.9-2.7L64 176c-35.3 0-64 28.7-64 64L0 448c0 35.3 28.7 64 64 64l224 0c35.3 0 64-28.7 64-64l0-11.3-64 0 0 11.3zM224 64l224 0 0 224-224 0 0-224zm-64 0l0 224c0 35.3 28.7 64 64 64l224 0c35.3 0 64-28.7 64-64l0-224c0-35.3-28.7-64-64-64 ius:{{ r.px }};flex:none\"><\u002Fspan>\n                <div><div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;color:#2f3e4e;font-weight:600\">{{ r.tok }}<\u002Fdiv><div style=\"font-size:12px;color:#9ea9b5\">{{ r.px }} · {{ r.use }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ELEVATION + MOTION -->\n      <section style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px\">\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Elevation<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:14px\">\n            <sc-for list=\"{{ shadowScale }}\" as=\"sh\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;align-items:center;gap:16px;background:#fff;border:1px solid #f1f3f6;border-radius:12px;padding:14px 16px\">\n                <span style=\"width:54px;height:40px;border-radius:9px;background:#fff;box-shadow:{{ sh.v }};flex:none\"><\u002Fspan>\n                <div style=\"min-width:0\"><div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;color:#2f3e4e;font-weight:600\">{{ sh.tok }}<\u002Fdiv><div style=\"font-size:12px;color:#9ea9b5;margin-top:2px\">{{ sh.use }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Motion<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:6px 16px\">\n            <sc-for list=\"{{ motionScale }}\" as=\"m\" hint-placeholder-count=\"4\">\n              <div style=\"padding:12px 0;border-bottom:1px solid #f4f5f8\">\n                <div style=\"font-size:13.5px;font-weight: absolute;left:1px;top:4px;width:14px;height:14px;border-radius:50%;background:#fff;border:2px solid {{ n.dot }};box-shadow:0 0 0 4px #f6f7fb\"><\u002Fspan><\u002Fsc-if>\n                <div style=\"font-size:16px;font-weight:700;color:#0a0a0a\">{{ n.label }}<\u002Fdiv>\n                <div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:3px;max-width:560px\">{{ n.desc }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:12px;color:#9ea9b5;margin-top:8px\">The filled dark node marks \"now\". Hollow nodes are upcoming; the faint grey node is the open-ended \"keep building\" tail.<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Measurements<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:260px 1fr\">\n          <sc-for list=\"{{ spineMeasure }}\" as=\"r\" hint-placeholder-count=\"6\">\n            <div style=\"padding:11px 16px;font-size:13.5px;font-weight:600;color:#2f3e4e;border-bottom:1px solid #f4f5f8\">{{ r.k }}<\u002Fdiv>\n            <div style=\"padding:11px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;color:#4c5966;border-bottom:1px solid #f4f5f8\">{{ r.v }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.3fr 1fr;gap:20px\">\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Props<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n            <sc-for list=\"{{ spineProps }}\" as=\"p\" hint-placeholder-count=\"3\">\n              <div style=\"padding:11px 0;border- ge }}<\u002Fspan><\u002Fdiv>\n                    <div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:11px;color:#7a838c;margin-top:3px\">{{ b.tok }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- measurements -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Measurements<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:260px 1fr\">\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Element<\u002Fdiv>\n          <div style=\"padding:11px 16px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Spec<\u002Fdiv>\n          <sc-for list=\"{{ tcMeasure }}\" as=\"r\" hint-placeholder-count=\"6\">\n            <div style=\"padding:11px 16px;font-size:13.5px;font-weight:600;color:#2f3e4e;border-bottom:1px solid #f4f5f8\">{{ r.k }}<\u002Fdiv>\n            <div style=\"padding:11px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;color:#4c5966;border-bottom:1px solid #f4f5f8\">{{ r.v }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- props -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Props<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:1.3fr 1.7fr .6fr 2fr\">\n          <div style=\"padding:11px 14px;font-size:11px;font-weight:700;te           <\u002Fdiv>\n            <p style=\"margin:10px 2px 0;font-size:12.5px;color:#7a838c;line-height:1.5\"><b style=\"color:#2f3e4e\">Collapsed on scroll.<\u002Fb> Folder + title + icon-only Upload / Share / Follow slide in above the pinned tabs. No code chip; Follow is icon-only <i>only here<\u002Fi>.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Layer stack -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Layer stack &amp; offsets<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:8px\">\n          <sc-for list=\"{{ stickyStack }}\" as=\"s\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #e6ebef;border-radius:12px;padding:13px 16px\">\n              <span style=\"flex:none;display:inline-flex;align-items:center;justify-content:center;min-width:44px;height:26px;padding:0 9px;border-radius:8px;background:#0f1722;color:#fff;font-family:'SFMono-Regular',Menlo,monospace;font-size:11.5px;font-weight:700\">{{ s.z }}<\u002Fspan>\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"font-size:14px;font-weight:700;color:#0a0a0a\">{{ s.name }}<\u002Fdiv>\n                <div style=\"font-size:12.5px;color:#7a838c;line-height:1.5;margin-top:2px\">{{ s.note }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"flex:none;font-family:'SFMono-Regular',Menlo,monospace;font-size:11.5px;color:#4c5966;text-align:right;max-width:230px\">{{ s.pos }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Measurements -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Measurements<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:260px 1fr\">\n          <sc-for list=\"{{ stickyMeasure }}\" as=\"r\" hint-placeholder-count=\"6\">\n            <div style=\"padding:11px 16px;font-size:13.5px;font-weight:600;color:#2f3e4e;border-bottom:1px solid #f4f5f8\">{{ r.k }}<\u002Fdiv>\n            <div style=\"padding:11px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;color:#4c5966;border-bottom:1px solid #f4f5f8\">{{ r.v }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Behavior + State -->\n      <div style=\"display:grid;grid-template-columns:1.25fr 1fr;gap:20px\">\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Behavior rules<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n            <sc-for list=\"{{ stickyBehavior }}\" as=\"b\" hint-placeholder-count=\"6\">\n              <div style=\"padding:11px 0;border-bottom:1px solid #f4f5f8\"><div style=\"font-size:13px;font-weight:700;color:#2f3e4e\">{{ b.k }}<\u002Fdiv><div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:2px\">{{ b.v }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">State &amp; refs<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n            <sc-for list=\"{{ stickyProps }}\" as=\"p\" hint-placeholder-count=\"6\">\n              <div style=\"padding:11px 0;border-bottom:1px solid #f4f5f8\"><div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;font-weight:600;color:#2f3e4e\">{{ p.name }} <span style=\"color:#1168c3;font-weight:400;font-size:11px\">{{ p.type }}<\u002Fspan><sc-if value=\"{{ p.hasDef }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"margin-left:8px;font-size:10.5px;font-weight:700;color:#7a838c;background:#f1f3f6;border:1px solid #e6ebef;padding:2px 7px;border-radius:9999px;font-family:'DM Sans',sans-serif;white-space:nowrap\">default {{ p.defVal }}<\u002Fspan><\u002Fsc-if><\u002Fdiv><div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:3px\">{{ p.desc }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Code -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Implementation<\u002Fdiv>\n        <pre style=\"margin:0;background:#0f1722;color:#cdd6e0;border-radius:14px;padding:20px 22px;overflow-x:auto;font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;line-height:1.65;white-space:pre\">{{ stickyCode }}<\u002Fpre>\n      <\u002Fdiv>\n\n      <!-- Accessibility -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Accessibility<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n          <sc-for list=\"{{ stickyA11y }}\" as=\"a\" hint-placeholder-count=\"4\">\n            <div style=\"padding:11px 0;border-bottom:1px solid #f4f5f8\"><div style=\"font-size:13px;font-weight:700;color:#2f3e4e\">{{ a.k }}<\u002Fdiv><div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:2px\">{{ a.v }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;gap:10px;background:#f1f7fe;border:1px solid #d3e6fb;border-radius:12px;padding:13px 16px\">\n        <span style=\"flex:none;width:22px;height:22px;border-radius:50%;background:#3092fa;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:800\">i<\u002Fspan>\n        <div style=\"font-size:13px;color:#2f3e4e;line-height:1.5\">See it live in <b>Spec mode<\u002Fb> on the Prototype page — marker <b>7<\u002Fb> sits on the compressed bar. Scroll the prototype down first so the bar is on screen.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== STATUS & BADGES ===== -->\n  <sc-if value=\"{{ isPills }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:28px\">\n      <p style=\"margin:0;font-size:15px;color:#4c5966;line-height:1.55;max-width:680px\">Pills and badges signal topic mastery, course codes and transient confirmations. Status colour is always paired with a dot or icon — never colour alone.<\u002Fp>\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Variants<\u002Fdiv>\n        <div style=\"background:#f6f7fb;border:1px dashed #d3d9e0;border-radius:16px;padding:26px;display:flex;flex-direction:column;gap:20px\">\n          <div>\n            <div style=\"font-size:12px;font-weight:700;color:#7a838c;margin-bottom:10px\">Status pills<\u002Fdiv>\n            <div style=\"display:flex;gap:10px;flex-wrap:wrap\">\n              <sc-for list=\"{{ pillsData }}\" as=\"p\" hint-placeholder-count=\"3\">\n                <span style=\"display:inline-flex;align-items:center;gap:6px;height:26px;padding:0 11px;border-radius:9999px;background:{{ p.bg }};color:{{ p.fg }};font-size:12px;font-weight:700\"><span style=\"width:7px;height:7px;border-radius:50%;background:{{ p.dot }}\"><\u002Fspan>{{ p.label }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:12px;font-weight:70  style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:260px 1fr\">\n          <sc-for list=\"{{ sheetMeasure }}\" as=\"r\" hint-placeholder-count=\"6\">\n            <div style=\"padding:11px 16px;font-size:13.5px;font-weight:600;color:#2f3e4e;border-bottom:1px solid #f4f5f8\">{{ r.k }}<\u002Fdiv>\n            <div style=\"padding:11px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;color:#4c5966;border-bottom:1px solid #f4f5f8\">{{ r.v }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.3fr 1fr;gap:20px\">\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Props<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n            <sc-for list=\"{{ sheetProps }}\" as=\"p\" hint-placeholder-count=\"4\">\n              <div style=\"padding:11px 0;border-bottom:1px solid #f4f5f8\"><div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;font-weight:600;color:#2f3e4e\">{{ p.name }} <span style=\"color:#1168c3;font-weight:400;font-size:11px\">{{ p.type }}<\u002Fspan><sc-if value=\"{{ p.hasDef }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"margin-left:8px;font-size:10.5px;font-weight:700;color:#7a838c;background:#f1f3f6;border:1px solid #e6ebef;padding:2px 7px;border-radius:9999px;font-family:'DM Sans',sans-serif;white-space:nowrap\">default {{ p.defVal }}<\u002Fspan><\u002Fsc-if><\u002Fdiv><div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:3px\">{{ p.desc }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Accessibility<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n            <sc-for list=\"{{ sheetA11y }}\" as=\"a\" hint-placeholder-count=\"3\">\n              <div style=\"padding:11px 0;border-bottom:1px solid #f4f5f8\"><div style=\"font-size:13px;font-weight:700;color:#2f3e4e\">{{ a.k }}<\u002Fdiv><div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:2px\">{{ a.v }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== EXAM STRIP ===== -->\n  <sc-if value=\"{{ isExamC }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:28px\">\n      <p style=\"margin:0;font-size:15px;color:#4c5966;line-height:1.55;max-width:680px\">A countdown strip under the header. Each exam's treatment escalates as its date approaches — driven purely by <code style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;background:#f6f7fb;padding:2px 6px;border-radius:5px;color:#4c5966\">daysAway<\u002Fcode>: neutral gray when far off, amber within a week, red in the final 48&nbsp;hours. Collapses to two cards with a \"N more exam\" toggle.<\u002Fp>\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Preview<\u002Fdiv>\n        <div style=\"background:#f6f7fb;border:1px dashed #d3d9e0;border-radius:16px;padding:24px\">\n          <div style=\"display:flex;gap:12px\">\n            <div style=\"flex:1;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 15px;border-radius:12px;background:#fdf4e2;border:1px solid #fcedce\">\n              <div><div style=\"font-weight:700;font-size:14px;color:#0a0a0a\">Midterm 1<\u002Fdiv><div style=\"font-size:12px;color:#8b5f04;margin-top:2px\">Apr 8 · 20% of grade<\u002Fdiv><\u002Fdiv>\n              <div style=\"text-align:right\"><div style=\"font-size:22px;font-weight:700;line-height:1;color:#f2a708\">4<\u002Fdiv><div style=\"font-size:12px;color:#8b5f04\">days away<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 15px;border-radius:12px;background:#f6f7fb\">\n              <div><div style=\"font-weight:700;font-size:14px;color:#0a0a0a\">Midterm 2<\u002Fdiv><div style=\"font-size:12px;color:#7a838c;margin-top:2px\">Apr 22 · 20% of grade<\u002Fdiv><\u002Fdiv>\n              <div style=\"text-align:right\"><div style=\"font-size:22px;font-weight:700;line-height:1;color:#9ea9b5\">18<\u002Fdiv><div style=\"font-size:12px;color:#7a838c\">days away<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:inline-flex;align-items:center;gap:7px;margin-top:10px;color:#1168c3;font-size:12px;font-weight:500\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 448 512\" fill=\"currentColor\"><path d=\"M201.4 406.6c12.5 12.5 32.8 12.5 45.3 0l192-192c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L224 338.7 54.6 169.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l192 192z\"><\u002Fpath><\u002Fsvg>1 more exam<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- URGENCY BY TIME-TO-EXAM -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:4px\">Urgency by time-to-exam<\u002Fdiv>\n        <p style=\"margin:0 0 14px;font-size:13.5px;color:#7a838c;max-width:680px\">Three tiers, chosen only from <code style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12px;background:#f6f7fb;padding:1px 6px;border-radius:5px;color:#4c5966\">daysAway<\u002Fcode>. Colors map straight to SLICE status tokens — no bespoke values.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px\">\n          <sc-for list=\"{{ examUrgency }}\" as=\"u\" hint-placeholder-count=\"3\">\n            <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:16px;padding:16px\">\n              <!-- live sample card -->\n              <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 15px;border-radius:12px;background:{{ u.bg }};border:{{ u.border }}\">\n                <div style=\"min-width:0\"><div style=\"font-weight:700;font-size:14px;color:#0a0a0a\">{{ u.name }}<\u002Fdiv><div style=\"font-size:12px;color:{{ u.label }};margin-top:2px\">{{ u.sub }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"text-align:right;flex:none\"><div style=\"font-size:22px;font-weight:700;line-height:1;color:{{ u.num }}\">{{ u.numText }}<\u002Fdiv><div style=\"font-size:12px;color:{{ u.label }}\">{{ u.unit }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <!-- meta -->\n              <div style=\"margin-top:13px\">\n                <div style=\"display:flex;align-items:center;gap:8px\">\n                  <span style=\"font-size:15px;font-weight:700;color:#0a0a0a\">{{ u.tier }}<\u002Fspan>\n                  <span style=\"font-size:11px;font-weight:700;color:{{ u.num }};background:{{ u.bg }};padding:2px 8px;border-radius:9999px\">{{ u.tone }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:12.5px;font-weight:600;color:#4c5966;margin-top:5px\">{{ u.range }}<\u002Fdiv>\n                <div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:11px;color:#9ea9b5;margin-top:4px\">{{ u.tokens }}<\u002Fdiv>\n                <div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:8px\">{{ u.rule }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- COUNTDOWN → DONE (celebratory empty state) -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:4px\">Countdown → done · celebratory empty state<\u002Fdiv>\n        <p style=\"margin:0 0 14px;font-size:13.5px;color:#7a838c;max-width:720px\">What the strip does once exams are behind the student. An exam date is a <b>day, not a timestamp<\u002Fb> — we never know when it ends — so the flip and the celebration window are both defined against whole local days.<\u002Fp>\n\n        <!-- the all-past states -->\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px\">\n          <!-- celebratory -->\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:16px;padding:16px\">\n            <div style=\"display:flex;align-items:center;gap:13px;padding:15px 17px;border-radius:12px;background:#ecfcda;border:1px solid #d7f3bd\">\n              <span style=\"flex:none;display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;background:#2cc302;color:#fff\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 576 512\" fill=\"currentColor\"><path d=\"M400 0L176 0c-26.5 0-48.1 21.8-47.1 48.2c.2 5.3 .4 10.6 .7 15.8L24 64C10.7 64 0 74.7 0 88c0 92.6 33.5 157 78.5 200.7c44.3 43.1 98.3 64.8 138.1 75.8c23.4 6.5 39.4 26 39.4 45.6c0 20.9-17 37.9-37.9 37.9L192 448c-17.7 0-32 14.3-32 32s14.3 32 32 32l192 0c17.7 0 32-14.3 32-32s-14.3-32-32-32l-26.1 0C337 448 320 431 320 410.1c0-19.6 16-39.1 39.4-45.6c39.9-11 93.9-32.7 138.2-75.8C542.5 245 576 180.6 576 88c0-13.3-10.7-24-24-24l-105.6 0c.3-5.2 .5-10.4 .7-15.8C448.1 21.8 426.5 0 400 0zM48.9 112l84.4 0c9.1 90.1 29.2 150.3 51.9 190.6c-24.9-11-50.8-26.5-73.2-48.3c-32-31.1-58-76-63-142.3zM464.1 254.3c-22.4 21.8-48.3 37.3-73.2 48.3c22.7-40.3 42.8-100.5 51.9-190.6l84.4 0c-5 66.3-31 111.2-63 142.3z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n              <div style=\"min-width:0\"><div style=\"font-weight:700;font-size:14px;color:#0a0a0a\">That's every exam done for the term<\u002Fdiv><div style=\"font-size:12px;color:#1d8201;margin-top:2px\">Nice work — take a breath, you earned it.<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;margin-top:13px\"><span style=\"font-size:15px;font-weight:700;color:#0a0a0a\">Celebratory (days 0–7)<\u002Fspan><span style=\"font-size:11px;font-weight:700;color:#1d8201;background:#ecfcda;padding:2px 8px;border-radius:9999px\">Celebrate<\u002Fspan><\u002Fdiv>\n            <div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:11px;color:#9ea9b5;margin-top:4px\">container success / foreground success<\u002Fdiv>\n            <div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:8px\">Shown for one study-cycle (7 days) after the last exam's window opens. Full success treatment.<\u002Fdiv>\n          <\u002Fdiv>\n          <!-- rest -->\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:16px;padding:16px\">\n            <div style=\"display:flex;align-items:center;gap:13px;padding:15px 17px;border-radius:12px;background:#f6f7fb;border:1px solid #e6ebef\">\n              <span style=\"flex:none;display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;background:#e6ebef;color:#9ea9b5\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 448 512\" fill=\"currentColor\"><path d=\"M152 24c0-13.3-10.7-24-24-24s-24 10.7-24 24l0 40L64 64C28.7 64 0 92.7 0 128l0 16 0 48L0 448c0 35.3 28.7 64 64 64l320 0c35.3 0 64-28.7 64-64l0-256 0-48 0-16c0-35.3-28.7-64-64-64l-40 0 0-40c0-13.3-10.7-24-24-24s-24 10.7-24 24l0 40L152 64l0-40zM48 192l352 0 0 256c0 8.8-7.2 16-16 16L64 464c-8.8 0-16-7.2-16-16l0-256z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n              <div style=\"min-width:0\"><div style=\"font-weight:700;font-size:14px;color:#0a0a0a\">No exams on the horizon<\u002Fdiv><div style=\"font-size:12px;color:#7a838c;margin-top:2px\">You're all caught up.<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;margin-top:13px\"><span style=\"font-size:15px;font-weight:700;color:#0a0a0a\">Rest (day 8+)<\u002Fspan><span style=\"font-size:11px;font-weight:700;color:#7a838c;background:#f6f7fb;padding:2px 8px;border-radius:9999px\">Neutral<\u002Fspan><\u002Fdiv>\n            <div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:11px;color:#9ea9b5;margin-top:4px\">background alt / icon xx-subtle<\u002Fdiv>\n            <div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:8px\">Dopamine decays — once the window closes the celebration retires to this quiet resting state.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- per-exam lifecycle -->\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#9ea9b5;margin-bottom:9px\">Per-exam lifecycle<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px\">\n          <sc-for list=\"{{ examLifecycle }}\" as=\"l\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:13px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;padding:11px 13px;border-radius:10px;background:{{ l.bg }};border:{{ l.border }}\">\n                <div style=\"min-width:0\"><div style=\"font-weight:700;font-size:13px;color:#0a0a0a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ l.title }}<\u002Fdiv><div style=\"font-size:11px;color:{{ l.accent }};margin-top:2px\">{{ l.sub }}<\u002Fdiv><\u002Fdiv>\n                <span style=\"flex:none;font-size:11px;font-weight:700;color:#fff;background:{{ l.badgeBg }};padding:3px 9px;border-radius:9999px\">{{ l.badge }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-size:13px;font-weight:700;color:#0a0a0a;margin-top:11px\">{{ l.phase }}<\u002Fdiv>\n              <div style=\"font-size:12px;font-weight:600;color:#4c5966;margin-top:2px\">{{ l.when }}<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#7a838c;line-height:1.5;margin-top:7px\">{{ l.note }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- rules -->\n        <div style=\"background:#fff4f2;border:1px solid #ffd8cc;border-radius:12px;padding:14px 17px;margin-bottom:14px\">\n          <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#e62600;margin-bottom:6px\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 512 512\" fill=\"currentColor\"><path d=\"M256 32c14.2 0 27.3 7.5 34.5 19.8l216 368c7.3 12.4 7.3 27.7 .2 40.1S486.3 480 472 480L40 480c-14.3 0-27.6-7.7-34.7-20.1s-7-27.8 .2-40.1l216-368C228.7 39.5 241.8 32 256 32zm0 128c-13.3 0-24 10.7-24 24l0 112c0 13.3 10.7 24 24 24s24-10.7 24-24l0-112c0-13.3-10.7-24-24-24zm32 224a32 32 0 1 0 -64 0 32 32 0 1 0 64 0z\"><\u002Fpath><\u002Fsvg>Never flip at 00:00 on exam day<\u002Fdiv>\n          <p style=\"margin:0;font-size:13px;color:#8a3a2c;line-height:1.55\">The date is a day, not a timestamp. The countdown <b>holds through the whole exam day<\u002Fb> and flips only at the <b>end<\u002Fb> of it (the local midnight that follows). Flipping at 00:00 <i>on<\u002Fi> exam day would show \"done\" as the student walks into the room — the worst-possible bug.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:12px;padding:8px 18px\">\n          <sc-for list=\"{{ examDoneRules }}\" as=\"r\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;gap:11px;padding:10px 0;border-bottom:1px solid #f4f5f8\"><span style=\"flex:none;color:#2cc302;margin-top:1px\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 512 512\" fill=\"currentColor\"><path d=\"M256 512a256 256 0 1 0 0-512 256 256 0 1 0 0 512zM369 209 241 337c-9.4 9.4-24.6 9.4-33.9 0l-64-64c-9.4-9.4-9.4-24.6 0-33.9s24.6-9.4 33.9 0l47 47L335 175c9.4-9.4 24.6-9.4 33.9 0s9.4 24.6 0 33.9z\"><\u002Fpath><\u002Fsvg><\u002Fspan><span style=\"font-size:13.5px;color:#4c5966;line-height:1.55\">{{ r }}<\u002Fspan><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Measurements<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:260px 1fr\">\n          <sc-for list=\"{{ examMeasure }}\" as=\"r\" hint-placeholder-count=\"6\">\n            <div style=\"padding:11px 16px;font-size:13.5px;font-weight:600;color:#2f3e4e;border-bottom:1px solid #f4f5f8\">{{ r.k }}<\u002Fdiv>\n            <div style=\"padding:11px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;color:#4c5966;border-bottom:1px solid #f4f5f8\">{{ r.v }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Props<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n          <sc-for list=\"{{ examProps }}\" as=\"p\" hint-placeholder-count=\"3\">\n            <div style=\"padding:11px 0;border-bottom:1px solid #f4f5f8\"><div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;font-weight:600;color:#2f3e4e\">{{ p.name }} <span style=\"color:#1168c3;font-weight:400;font-size:11px\">{{ p.type }}<\u002Fspan> <span style=\"color:#7a838c;font-weight:400;font-size:11px\">· default {{ p.def }}<\u002Fspan><\u002Fdiv><div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:3px\">{{ p.desc }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== MOCK EXAM SURFACE ===== -->\n  <sc-if value=\"{{ isExamMock }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:28px\">\n      <p style=\"margin:0;font-size:15px;color:#4c5966;line-height:1.55;max-width:680px\">The artifact viewer on <b>Course Companion<\u002Fb> — opened from any exam / quiz / summary tile. Shows the graded result: a score ring, the answers, and per-question explanations.<\u002Fp>\n      <div style=\"background:#e2effd;border:1px solid #cfe4ff;border-radius:12px;padding:14px 16px;font-size:13.5px;color:#1168c3;line-height:1.55\"><b>Dev note — this is an existing SAI (Study AI) component.<\u002Fb> On Course Companion we do <b>not<\u002Fb> rebuild it. We <b>reuse the SAI surface<\u002Fb> and make two changes only: <b>(1)<\u002Fb> add the CC <b>back button<\u002Fb>, and <b>(2)<\u002Fb> <b>offset the whole surface under the Studocu top bar<\u002Fb> (<code style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12px;background:#f1f7fe;padding:1px 5px;border-radius:5px\">position:fixed; top:72px; z-index:40<\u002Fcode>, below the navbar's z-index 50) so the global nav stays visible and interactive. Everything else is SAI's own component.<\u002Fdiv>\n      <div style=\"background:#fdf4e2;border:1px solid #fcedce;border-radius:12px;padding:13px 16px;font-size:13px;color:#8b5f04;line-height:1.5\">⚠ The body uses <b>SAI's own chrome colours<\u002Fb> (ink #1f2d3d, green #23b14d) rather than SLICE tokens, because it wraps the SAI product. Only the CC additions — the back button + the thumbs feedback — follow SLICE. Treat the results body as a placement reference, not final SAI markup.<\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#309
