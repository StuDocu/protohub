document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rder:1px solid #d3d9e0;background:#fff;font-family:'DM Sans',sans-serif;font-size:14px;color:#2f3e4e;outline:none\" style-focus=\"border-color:#3092fa;box-shadow:0 0 0 3px rgba(48,146,250,.15)\">\n          <\u002Fdiv>\n          <span style=\"font-size:12.5px;color:#9ea9b5;font-weight:600\">{{ tokCount }} / {{ tokTotal }} tokens<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:22px\">\n          <sc-for list=\"{{ colorTokenGroups }}\" as=\"grp\" hint-placeholder-count=\"6\">\n            <div>\n              <div style=\"font-size:13px;font-weight:700;color:#2f3e4e;margin-bottom:10px\">{{ grp.grp }}<\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px\">\n                <sc-for list=\"{{ grp.items }}\" as=\"c\" hint-placeholder-count=\"4\">\n                  <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #e6ebef;border-radius:12px;padding:10px 12px\">\n                    <span style=\"width:40px;height:40px;border-radius:9px;background:{{ c.v }};box-shadow:inset 0 0 0 1px rgba(0,0,0,.08);flex:none\"><\u002Fspan>\n                    <div style=\"min-width:0;flex:1\">\n                      <div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:11px;font-weight:600;color:#1168c3;line-height:1.35;word-break:break-all\">--s-color-main-{{ c.n }}<\u002Fdiv>\n                      <div style=\"display:flex;align-items:center;gap:8px;margin-top:3px\">\n                        <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:11.5px;color:#7a838c\">{{ c.v }}<\u002Fspan>\n                        <span style=\"font-size:11px;color:#9ea9b5;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ c.u }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- TYPE -->\n      <section>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:3px\">Typography<\u002Fdiv>\n        <p style=\"margin:0 0 16px;font-size:14px;color:#7a838c;max-width:640px\">Primary typeface is <b style=\"color:#4c5966\">DM Sans<\u002Fb>. Weights in use: 400 / 500 / 700 / 900.<\u002Fp>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden\">\n          <sc-for list=\"{{ typeScale }}\" as=\"t\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex;align-items:center;gap:20px;padding:14px 20px;border-bottom:1px solid #f1f3f6\">\n              <div style=\"flex:1;min-width:0;color:#0a0a0a;font-size:{{ t.px }};font-weight:{{ t.w }};line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ t.sample }}<\u002Fdiv>\n              <div style=\"flex:none;text-align:right\">\n                <div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;color:#2f3e4e;font-weight:600\">{{ t.tok }}<\u002Fdiv>\n                <div style=\"font-size:12px;color:#9ea9b5;margin-top:2px\">{{ t.meta }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-top:14px\">\n          <sc-for list=\"{{ fontTokens }}\" as=\"f\" hint-placeholder-count=\"3\">\n            <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:12px;padding:11px 13px\">\n              <div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:11.5px;font-weight:600;color:#1168c3;word-break:break-all\">{{ f.tok }}<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#4c5966;margin-top:4px\">{{ f.v }}<\u002Fdiv>\n              <div style=\"fon 2Fdiv>\n            <div style=\"padding:11px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;color:#4c5966;border-bottom:1px solid #f4f5f8\">{{ r.v }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.3fr 1fr;gap:20px\">\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Props<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n            <sc-for list=\"{{ headerProps }}\" as=\"p\" hint-placeholder-count=\"5\">\n              <div style=\"padding:11px 0;border-bottom:1px solid #f4f5f8\"><div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;font-weight:600;color:#2f3e4e\">{{ p.name }} <span style=\"color:#1168c3;font-weight:400;font-size:11px\">{{ p.type }}<\u002Fspan><\u002Fdiv><div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:3px\">{{ p.desc }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Accessibility<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n            <sc-for list=\"{{ headerA11y }}\" as=\"a\" hint-placeholder-count=\"3\">\n              <div style=\"padding:11px 0;border-bottom:1px solid #f4f5f8\"><div style=\"font-size:13px;font-weight:700;color:#2f3e4e\">{{ a.k }}<\u002Fdiv><div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:2px\">{{ a.v }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== TODAY SPINE ===== -->\n  <sc-if value=\"{{ isSpine }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:28px\">\n      <p style=\"margin:0;font-size:15px;color:#4c5966;line-height:1.55;max-width:680px\">The vertical backbone of the Today view. A single gradient line threads four sections — now → future — each marked by a node whose treatment signals where the student is in the course.<\u002Fp>\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Sections &amp; nodes<\u002Fdiv>\n        <div style=\"background:#f6f7fb;border:1px dashed #d3d9e0;border-radius:16px;padding:28px 26px\">\n          <div style=\"position:relative\">\n            <div style=\"position:absolute;left:7px;top:8px;bottom:8px;width:2px;background:linear-gradient(180deg,#9ea9b5 0%,#d3d9e0 45%,#e6ebef 100%)\"><\u002Fdiv>\n            <sc-for list=\"{{ spineNodes }}\" as=\"n\" hint-placeholder-count=\"4\">\n              <div style=\"position:relative;padding-left:36px;margin-bottom:22px\">\n                <sc-if value=\"{{ n.fill }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"position:absolute;left:-1px;top:2px;width:18px;height:18px;border-radius:50%;background:#4c5966;box-shadow:0 0 0 4px #f6f7fb\"><\u002Fspan><\u002Fsc-if>\n                <sc-if value=\"{{ n.notFill }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"position:absolute;left:1px;top:4px;width:14px;height:14px;border-radius:50%;background:#fff;border:2px solid {{ n.dot }};box-shadow:0 0 0 4px #f6f7fb\"><\u002Fspan><\u002Fsc-if>\n                <div style=\"font-size:16px;font-weight:700;color:#0a0a0a\">{{ n.label }}<\u002Fdiv>\n                <div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:3px;max-width:560px\">{{ n.desc }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:12px;color:#9ea9b5;margin-top:8px\">The filled dark node marks \"now\". Hollow nodes are upcoming; the faint grey node is the open-ended \"keep building\" tail.<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Measurements<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:260px 1fr\">\n          <sc-for list=\"{{ spineMeasure }}\" as=\"r\" hint-placeholder-count=\"6\">\n            <div style=\"padding:11px 16px;font-size:13.5px;font-weight:600;color:#2f3e4e;border-bottom:1px solid #f4f5f8\">{{ r.k }}<\u002Fdiv>\n            <div style=\"padding:11px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;color:#4c5966;border-bottom:1px solid #f4f5f8\">{{ r.v }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.3fr 1fr;gap:20px\">\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Props<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n            <sc-for list=\"{{ spineProps }}\" as=\"p\" hint-placeholder-count=\"3\">\n              <div style=\"padding:11px 0;border-bottom:1px solid #f4f5f8\"><div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;font-weight:600;color:#2f3e4e\">{{ p.name }} <span style=\"color:#1168c3;font-weight:400;font-size:11px\">{{ p.type }}<\u002Fspan><\u002Fdiv><div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:3px\">{{ p.desc }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Accessibility<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n            <sc-for list=\"{{ spineA11y }}\" as=\"a\" hint-placeholder-count=\"3\">\n              <div style=\"padding:11px 0;border-bottom:1px solid #f4f5f8\"><div style=\"font-size:13px;font-weight:700;color:#2f3e4e\">{{ a.k }}<\u002Fdiv><div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:2px\">{{ a.v }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== TOPICCARD ===== -->\n  <sc-if value=\"{{ isTC }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:28px\">\n      <p style=\"margin:0;font-size:15px;color:#4c5966;line-height:1.55;max-width:680px\">The core unit of the Today &amp; Topics views. An accordion that holds a one-question-at-a-time quiz and a result screen. It runs in two modes: <b>browse<\u002Fb> (chevron, on the Topics tab) and <b>deck<\u002Fb> (always-open live card on Today). The fully interactive version lives on the <a href=\"#\" onclick=\"{{ goProto }}\" style=\"color:#1168c3;font-weight:600;text-decoration:none\">Prototype<\u002Fa> page.<\u002Fp>\n\n      <!-- states -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Anatomy &amp; states<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:14px;background:#f6f7fb;border:1px dashed #d3d9e0;border-radius:16px;padding:24px\">\n          <!-- collapsed, three statuses -->\n          <div style=\"font-size:12px;font-weight:700;color:#7a838c\">Collapsed header · status drives ring + pill colour<\u002Fdiv>\n          <div style=\"d t-size:12px;font-weight:700\">B<\u002Fspan>Selected · correct<\u002Fspan><svg width=\"18\" height=\"18\" viewBox=\"0 0 512 512\" fill=\"#2cc302\"><path d=\"M256 512a256 256 0 1 1 0-512 256 256 0 1 1 0 512zM374 145.7c-10.7-7.8-25.7-5.4-33.5 5.3L221.1 315.2 169 263.1c-9.4-9.4-24.6-9.4-33.9 0s-9.4 24.6 0 33.9l72 72c5 5 11.8 7.5 18.8 7s13.4-4.1 17.5-9.8L379.3 179.2c7.8-10.7 5.4-25.7-5.3-33.5z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px 10px 11px;border-radius:12px;border:1px solid #e62600;background:#fff4f2;color:#841d15;font-size:14px;font-weight:500\"><span style=\"display:flex;align-items:center;gap:13px\"><span style=\"width:28px;height:28px;border-radius:50%;background:#ffd6cf;color:#b3160b;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700\">C<\u002Fspan>Selected · incorrect<\u002Fspan><svg width=\"18\" height=\"18\" viewBox=\"0 0 512 512\" fill=\"#e62600\"><path d=\"M256 512a256 256 0 1 0 0-512 256 256 0 1 0 0 512zM167 167c9.4-9.4 24.6-9.4 33.9 0l55 55 55-55c9.4-9.4 24.6-9.4 33.9 0s9.4 24.6 0 33.9l-55 55 55 55c9.4 9.4 9.4 24.6 0 33.9s-24.6 9.4-33.9 0l-55-55-55 55c-9.4 9.4-24.6 9.4-33.9 0s-9.4-24.6 0-33.9l55-55-55-55c-9.4-9.4-9.4-24.6 0-33.9z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:13px;padding:10px 14px 10px 11px;border-radius:12px;border:1px solid #d3d9e0;background:#fff;color:#9ea9b5;font-size:14px;font-weight:500\"><span style=\"width:28px;height:28px;border-radius:50%;background:#f6f7fb;color:#bcc4cc;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700\">D<\u002Fspan>Disabled (other, after answer)<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- LOGIC: coverage → copy & band -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:4px\">Logic · coverage → encouragement copy<\u002Fdiv>\n        <p style=\"margin:0 0 12px;font-size:13.5px;color:#7a838c;line-height:1.5;max-width:640px\">The status pill copy is derived from the coverage <code style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12px;background:#f6f7fb;padding:1px 5px;border-radius:4px;color:#4c5966\">%<\u002Fcode> — <code style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12px;background:#f6f7fb;padding:1px 5px;border-radius:4px;color:#4c5966\">scoreCopy(pct, started)<\u002Fcode>. An unstarted topic shows no copy (a play glyph invites the first attempt).<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start\">\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:130px 1fr\">\n            <div style=\"padding:10px 16px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Score<\u002Fdiv>\n            <div style=\"padding:10px 16px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#9ea9b5;background:#f9fafc;border-bottom:1px solid #eef0f3\">Copy<\u002Fdiv>\n            <sc-for list=\"{{ scoreCopyScale }}\" as=\"s\" hint-placeholder-count=\"8\">\n              <div style=\"padding:10px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;font-weight:600;color:#2f3e4e;border-bottom:1px solid #f4f5f8\">{{ s.r }}<\u002Fdiv>\n              <div style=\"padding:10px 16px;font-size:13.5px;color:#4c5966;border-bottom:1px solid #f4f5f8\">{{ s.c }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:12px;font-weight:700;color:#7a838c;margin-bottom:8px\">Band drives the ring + track colour (separate from copy)<\u002Fdiv>\n            <div style=\"display:fl pan><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:13px;padding:14px 15px;border-radius:12px;background:#f6f7fb;color:#2f3e4e\"><span style=\"width:38px;height:38px;border-radius:12px;background:#ecfcda;color:#1d8201;display:inline-flex;align-items:center;justify-content:center;flex:none\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 448 512\" fill=\"currentColor\"><path d=\"M256 80c0-17.7-14.3-32-32-32s-32 14.3-32 32l0 144L48 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l144 0 0 144c0 17.7 14.3 32 32 32s32-14.3 32-32l0-144 144 0c17.7 0 32-14.3 32-32s-14.3-32-32-32l-144 0 0-144z\"><\u002Fpath><\u002Fsvg><\u002Fspan><span style=\"flex:1\"><span style=\"display:block;font-size:14px;font-weight:700\">Add to Today's view<\u002Fspan><span style=\"display:block;font-size:12px;color:#7a838c\">Queue it in your Today deck<\u002Fspan><\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Measurements<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:260px 1fr\">\n          <sc-for list=\"{{ sheetMeasure }}\" as=\"r\" hint-placeholder-count=\"6\">\n            <div style=\"padding:11px 16px;font-size:13.5px;font-weight:600;color:#2f3e4e;border-bottom:1px solid #f4f5f8\">{{ r.k }}<\u002Fdiv>\n            <div style=\"padding:11px 16px;font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;color:#4c5966;border-bottom:1px solid #f4f5f8\">{{ r.v }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1.3fr 1fr;gap:20px\">\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Props<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n            <sc-for list=\"{{ sheetProps }}\" as=\"p\" hint-placeholder-count=\"4\">\n              <div style=\"padding:11px 0;border-bottom:1px solid #f4f5f8\"><div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;font-weight:600;color:#2f3e4e\">{{ p.name }} <span style=\"color:#1168c3;font-weight:400;font-size:11px\">{{ p.type }}<\u002Fspan><\u002Fdiv><div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:3px\">{{ p.desc }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Accessibility<\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:8px 18px\">\n            <sc-for list=\"{{ sheetA11y }}\" as=\"a\" hint-placeholder-count=\"3\">\n              <div style=\"padding:11px 0;border-bottom:1px solid #f4f5f8\"><div style=\"font-size:13px;font-weight:700;color:#2f3e4e\">{{ a.k }}<\u002Fdiv><div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:2px\">{{ a.v }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===== EXAM STRIP ===== -->\n  <sc-if value=\"{{ isExamC }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"padding:26px 40px 80px\">\n    <div style=\"max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:28px\">\n      <p style=\"margin:0;font-size:15px;color:#4c5966;line-height:1.55;max-width:680px\">A countdown strip under the header. Each exam's treatment escalates as its date approaches — driven purely by <code style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12.5px;background:#f6f7fb;padding:2px 6px;border-radius:5px;color:#4c5966\">daysAway<\u002Fcode>: neutral gray when far off, amber within a week, red in the final 48&nbsp;hours. Collapses to two cards with a \"N more exam\" toggle.<\u002Fp>\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:12px\">Preview<\u002Fdiv>\n        <div style=\"background:#f6f7fb;border:1px dashed #d3d9e0;border-radius:16px;padding:24px\">\n          <div style=\"display:flex;gap:12px\">\n            <div style=\"flex:1;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 15px;border-radius:12px;background:#fdf4e2;border:1px solid #fcedce\">\n              <div><div style=\"font-weight:700;font-size:14px;color:#0a0a0a\">Midterm 1<\u002Fdiv><div style=\"font-size:12px;color:#8b5f04;margin-top:2px\">Apr 8 · 20% of grade<\u002Fdiv><\u002Fdiv>\n              <div style=\"text-align:right\"><div style=\"font-size:22px;font-weight:700;line-height:1;color:#f2a708\">4<\u002Fdiv><div style=\"font-size:12px;color:#8b5f04\">days away<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 15px;border-radius:12px;background:#f6f7fb\">\n              <div><div style=\"font-weight:700;font-size:14px;color:#0a0a0a\">Midterm 2<\u002Fdiv><div style=\"font-size:12px;color:#7a838c;margin-top:2px\">Apr 22 · 20% of grade<\u002Fdiv><\u002Fdiv>\n              <div style=\"text-align:right\"><div style=\"font-size:22px;font-weight:700;line-height:1;color:#9ea9b5\">18<\u002Fdiv><div style=\"font-size:12px;color:#7a838c\">days away<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:inline-flex;align-items:center;gap:7px;margin-top:10px;color:#1168c3;font-size:12px;font-weight:500\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 448 512\" fill=\"currentColor\"><path d=\"M201.4 406.6c12.5 12.5 32.8 12.5 45.3 0l192-192c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L224 338.7 54.6 169.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3l192 192z\"><\u002Fpath><\u002Fsvg>1 more exam<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- URGENCY BY TIME-TO-EXAM -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:4px\">Urgency by time-to-exam<\u002Fdiv>\n        <p style=\"margin:0 0 14px;font-size:13.5px;color:#7a838c;max-width:680px\">Three tiers, chosen only from <code style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:12px;background:#f6f7fb;padding:1px 6px;border-radius:5px;color:#4c5966\">daysAway<\u002Fcode>. Colors map straight to SLICE status tokens — no bespoke values.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px\">\n          <sc-for list=\"{{ examUrgency }}\" as=\"u\" hint-placeholder-count=\"3\">\n            <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:16px;padding:16px\">\n              <!-- live sample card -->\n              <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 15px;border-radius:12px;background:{{ u.bg }};border:{{ u.border }}\">\n                <div style=\"min-width:0\"><div style=\"font-weight:700;font-size:14px;color:#0a0a0a\">{{ u.name }}<\u002Fdiv><div style=\"font-size:12px;color:{{ u.label }};margin-top:2px\">{{ u.sub }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"text-align:right;flex:none\"><div style=\"font-size:22px;font-weight:700;line-height:1;color:{{ u.num }}\">{{ u.numText }}<\u002Fdiv><div style=\"font-size:12px;color:{{ u.label }}\">{{ u.unit }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <!-- meta -->\n              <div style=\"margin-top:13px\">\n                <div style=\"display:flex;align-items:center;gap:8px\">\n                  <span style=\"font-size:15px;font-weight:700;color:#0a0a0a\">{{ u.tier }}<\u002Fspan>\n                  <span style=\"font-size:11px;font-weight:700;color:{{ u.num }};background:{{ u.bg }};padding:2px 8px;border-radius:9999px\">{{ u.tone }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:12.5px;font-weight:600;color:#4c5966;margin-top:5px\">{{ u.range }}<\u002Fdiv>\n                <div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:11px;color:#9ea9b5;margin-top:4px\">{{ u.tokens }}<\u002Fdiv>\n                <div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:8px\">{{ u.rule }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- COUNTDOWN → DONE (celebratory empty state) -->\n      <div>\n        <div style=\"font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#3092fa;margin-bottom:4px\">Countdown → done · celebratory empty state<\u002Fdiv>\n        <p style=\"margin:0 0 14px;font-size:13.5px;color:#7a838c;max-width:720px\">What the strip does once exams are behind the student. An exam date is a <b>day, not a timestamp<\u002Fb> — we never know when it ends — so the flip and the celebration window are both defined against whole local days.<\u002Fp>\n\n        <!-- the all-past states -->\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px\">\n          <!-- celebratory -->\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:16px;padding:16px\">\n            <div style=\"display:flex;align-items:center;gap:13px;padding:15px 17px;border-radius:12px;background:#ecfcda;border:1px solid #d7f3bd\">\n              <span style=\"flex:none;display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:50%;background:#2cc302;color:#fff\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 576 512\" fill=\"currentColor\"><path d=\"M400 0L176 0c-26.5 0-48.1 21.8-47.1 48.2c.2 5.3 .4 10.6 .7 15.8L24 64C10.7 64 0 74.7 0 88c0 92.6 33.5 157 78.5 200.7c44.3 43.1 98.3 64.8 138.1 75.8c23.4 6.5 39.4 26 39.4 45.6c0 20.9-17 37.9-37.9 37.9L192 448c-17.7 0-32 14.3-32 32s14.3 32 32 32l192 0c17.7 0 32-14.3 32-32s-14.3-32-32-32l-26.1 0C337 448 320 431 320 410.1c0-19.6 16-39.1 39.4-45.6c39.9-11 93.9-32.7 138.2-75.8C542.5 245 576 180.6 576 88c0-13.3-10.7-24-24-24l-105.6 0c.3-5.2 .5-10.4 .7-15.8C448.1 21.8 426.5 0 400 0zM48.9 112l84.4 0c9.1 90.1 29.2 150.3 51.9 190.6c-24.9-11-50.8-26.5-73.2-48.3c-32-31.1-58-76-63-142.3zM464.1 254.3c-22.4 21.8-48.3 37.3-73.2 48.3c22.7-40.3 42.8-100.5 51.9-190.6l84.4 0c-5 66.3-31 111.2-63 142.3z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n              <div style=\"min-width:0\"><div style=\"font-weight:700;font-size:14px;color:#0a0a0a\">That's every exam done for the term<\u002Fdiv><div style=\"font-size:12px;color:#1d8201;margin-top:2px\">Nice work — take a breath, you earned it.<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;margin-top:13px\"><span style=\"font-size:15px;font-weight:700;color:#0a0a0a\">Celebratory (days 0–7)<\u002Fspan><span style=\"font-size:11px;font-weight:700;color:#1d8201;background:#ecfcda;padding:2px 8px;border-radius:9999px\">Celebrate<\u002Fspan><\u002Fdiv>\n            <div style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:11px;color:#9ea9b5;margin-top:4px\">container success / foreground success<\u002Fdiv>\n            <div style=\"font-size:13px;color:#7a838c;line-height:1.5;margin-top:8px\">Shown for one study-cycle (7 days) after the last exam's window opens. Full success treatment.<\u002Fdiv>\n          <\u002Fdiv>\n          <!-- rest -->\n          <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:16px;padding:16px\">\n            <div style=\"display:flex;align-items:center;gap:13px;padding:15px 17px;border-radius:12px;background:#f6f7 lder-count=\"4\">\n            <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:14px;padding:13px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px;padding:11px 13px;border-radius:10px;background:{{ l.bg }};border:{{ l.border }}\">\n                <div style=\"min-width:0\"><div style=\"font-weight:700;font-size:13px;color:#0a0a0a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ l.title }}<\u002Fdiv><div style=\"font-size:11px;color:{{ l.accent }};margin-top:2px\">{{ l.sub }}<\u002Fdiv><\u002Fdiv>\n                <span style=\"flex:none;font-size:11px;font-weight:700;color:#fff;background:{{ l.badgeBg }};padding:3px 9px;border-radius:9999px\">{{ l.badge }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-size:13px;font-weight:700;color:#0a0a0a;margin-top:11px\">{{ l.phase }}<\u002Fdiv>\n              <div style=\"font-size:12px;font-weight:600;color:#4c5966;margin-top:2px\">{{ l.when }}<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#7a838c;line-height:1.5;margin-top:7px\">{{ l.note }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- rules -->\n        <div style=\"background:#fff4f2;border:1px solid #ffd8cc;border-radius:12px;padding:14px 17px;margin-bottom:14px\">\n          <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#e62600;margin-bottom:6px\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 512 512\" fill=\"currentColor\"><path d=\"M256 32c14.2 0 27.3 7.5 34.5 19.8l216 368c7.3 12.4 7.3 27.7 .2 40.1S486.3 480 472 480L40 480c-14.3 0-27.6-7.7-34.7-20.1s-7-27.8 .2-40.1l216-368C228.7 39.5 241.8 32 256 32zm0 128c-13.3 0-24 10.7-24 24l0 112c0 13.3 10.7 24 24 24s24-10.7 24-24l0-112c0-13.3-10.7-24-24-24zm32 224a32 32 0 1 0 -64 0 32 32 0 1 0 64 0z\"><\u002Fpath><\u002Fsvg>Never flip at 00:00 on exam day<\u002Fdiv>\n          <p style=\"margin:0;font-size:13p
