document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

.4\">\n        The interviewee sees only the prototype. Press <span style=\"font-family:'SFMono-Regular',Menlo,monospace;font-size:11px;font-weight:700;color:#7a838c;background:#f1f3f6;border:1px solid #e6ebef;border-radius:5px;padding:1px 6px\">Esc<\u002Fspan> to return here.\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- the configure launcher (always visible in admin mode) -->\n  <button sc-camel-on-click=\"{{ toggleConfig }}\" style=\"position:fixed;right:20px;bottom:20px;z-index:2147483000;display:inline-flex;align-items:center;gap:10px;height:46px;padding:0 20px 0 17px;border-radius:9999px;background:#0f1722;color:#fff;border:none;font-size:14px;font-weight:700;letter-spacing:-.01em;cursor:pointer;box-shadow:0 10px 30px rgba(10,23,44,.35);transition:transform .15s,background .15s\" style-hover=\"background:#1b2836;transform:translateY(-1px)\">\n    <svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 512 512\" fill=\"currentColor\"><path d=\"M495.9 166.6c3.2 8.7 .5 18.4-6.4 24.6l-43.3 39.4c1.1 8.3 1.7 16.8 1.7 25.4s-.6 17.1-1.7 25.4l43.3 39.4c6.9 6.2 9.6 15.9 6.4 24.6c-4.4 11.9-9.7 23.3-15.8 34.3l-4.7 8.1c-6.6 11-14 21.4-22.1 31.2c-5.9 7.2-15.7 9.6-24.5 6.8l-55.7-17.7c-13.4 10.3-28.2 18.9-44 25.4l-12.5 57.1c-2 9.1-9 16.3-18.2 17.8c-13.8 2.3-28 3.5-42.5 3.5s-28.7-1.2-42.5-3.5c-9.2-1.5-16.2-8.7-18.2-17.8l-12.5-57.1c-15.8-6.5-30.6-15.1-44-25.4L83.1 425.9c-8.8 2.8-18.6 .3-24.5-6.8c-8.1-9.8-15.5-20.2-22.1-31.2l-4.7-8.1c-6.1-11-11.4-22.4-15.8-34.3c-3.2-8.7-.5-18.4 6.4-24.6l43.3-39.4C64.6 273.1 64 264.6 64 256s.6-17.1 1.7-25.4L22.4 191.2c-6.9-6.2-9.6-15.9-6.4-24.6c4.4-11.9 9.7-23.3 15.8-34.3l4.7-8.1c6.6-11 14-21.4 22.1-31.2c5.9-7.2 15.7-9.6 24.5-6.8l55.7 17.7c13.4-10.3 28.2-18.9 44-25.4l12.5-57.1c2-9.1 9-16.3 18.2-17.8C227.3 1.2 241.5 0 256 0s28.7 1.2 42.5 3.5c9.2 1.5 16.2 8.7 18.2 17.8l12.5 57.1c15.8 6.5 30.6 15.1 44 25.4l55.7-17.7c8.8-2.8 18.6-.3 24.5 6.8c8.1 9.8 15.5 20.2 22.1 31.2l4.7 8.1c6.1 11 11.4 22.4 15.8 34.3zM256 336a80 80 0 1 0 0-160 80 80 0 1 0 0 160z\"><\u002Fpath><\u002Fsvg>\n    Configure\n    <sc-if value=\"{{ hasActive }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 6px;border-radius:9999px;background:#3092fa;color:#fff;font-size:11px;font-weight:800\">{{ activeCount }}<\u002Fspan><\u002Fsc-if>\n  <\u002Fbutton>\n<\u002Fsc-if>\n\n<!-- ===== USER LAYER — clean prototype; only a discreet way back for the interviewer ===== -->\n<sc-if value=\"{{ isUser }}\" hint-placeholder-val=\"{{ false }}\">\n  <button sc-camel-on-click=\"{{ exitUser }}\" title=\"Exit to setup (Esc)\" style=\"position:fixed;top:9px;left:9px;z-index:2147483000;width:20px;height:20px;border-radius:9999px;background:rgba(15,23,34,.16);border:none;cursor:pointer;padding:0;opacity:.35;display:flex;align-items:center;justify-content:center;color:#fff;transition:opacity .2s,background .2s\" style-hover=\"opacity:1;background:#0f1722\">\n    <svg width=\"10\" height=\"10\" sc-camel-view-box=\"0 0 448 512\" fill=\"currentColor\"><path d=\"M9.4 233.4c-12.5 12.5-12.5 32.8 0 45.3l160 160c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L109.2 288 416 288c17.7 0 32-14.3 32-32s-14.3-32-32-32l-306.7 0L214.6 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0l-160 160z\"><\u002Fpath><\u002Fsvg>\n  <\u002Fbutton>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  KEY = 'courseCompanion.userProto.v1';\n  state = { mode:'admin', configOpen:false, flags:{ streaks:false, addCreate:false, sessionLength:false, resultRecs:false, cramMode:false, loggedOut:false }, dataLevel:'L3', context:'psyc101', copied:false };\n\n  // Course context — each key maps to a full course pack inside Course Page.dc.html.\n  COURSES = [\n    { key:'psyc101', name:'Introduction to Psychology', code:'PSYC 101', institution:'Arizona State University' },\n    { key:'biol202', name:'Human Anatomy & Physiology I', code:'BIOL 202', institution:'UT Austin' },\n    { key:'econ201', name:'Principles of Microeconomics', code:'ECON 201', institution:'University of Michigan' },\n  ];\n\n  // Same catalog the admin/handoff panel uses — the meaningful flags the prototype consumes.\n  FLAG_CATALOG = [\n    { key:'streaks', label:'Streaks', desc:'Daily-streak strip on the Today view. Parked in V0 pending global-streak work.' },\n    { key:'addCreate', label:'Add & create', desc:'The \"+ Add\" create flow + drag-&-drop uploaders. Off hides all add/create entry points.' },\n    { key:'sessionLength', label:'Session-length control', desc:'Shows the \"I have X min\" slider on Today\\'s Review (5–60 min). Off = fixed 10-min sessions.' },\n    { key:'resultRecs', label:'Keep-going tiles', desc:'Adds up to 3 peer content picks (reading / podcast / video) to each result screen, plus an infinite-practice tile that replaces the \"Sharpen this topic\" CTA.' },\n    { key:'cramMode', label:'Cram mode', desc:'Simulates an exam < 2 days out — full Today-tab takeover: live countdown, highest-yield triage (no time cap, no defer), readiness-to-target, and a rapid-recall cheat sheet.' },\n    { key:'loggedOut', label:'Logged-out (Save your progress)', desc:'Simulates a signed-out visitor: Log in / Sign up in the navbar and a \"Save your progress\" prompt on each result screen. Soft wall — they can keep studying.' },\n  ];\n  // Data confidence levels — only L3 is built/available for now.\n  LEVELS = [\n    { key:'L1', label:'L1', sub:'Generic', avail:false },\n    { key:'L2', label:'L2', sub:'Reverse-eng', avail:false },\n    { key:'L3', label:'L3', sub:'Full data', avail:true },\n    { key:'L4', label:'L4', sub:'Deferred', avail:false },\n  ];\n\n  // Read config off the URL hash: #u=1&streaks=1&addCreate=1&sessionLength=1&level=L3\n  // A shared link is fully deterministic — the URL wins over localStorage, and u=1 boots into user mode.\n  parseHash(){\n    try {\n      const h = (location.hash || '').replace(/^#/, '');\n      if(!h) return null;\n      const p = new URLSearchParams(h);\n      const known = ['u','streaks','addCreate','sessionLength','resultRecs','cramMode','loggedOut','level','course'];\n      if(!known.some(k=>p.has(k))) return null;\n      const lv = p.get('level');\n      const cv = p.get('course');\n      return {\n        user: p.get('u') === '1',\n        flags: { streaks: p.get('streaks')==='1', addCreate: p.get('addCreate')==='1', sessionLength: p.get('sessionLength')==='1', resultRecs: p.get('resultRecs')==='1', cramMode: p.get('cramMode')==='1', loggedOut: p.get('loggedOut')==='1' },\n        level: (lv && this.LEVELS.some(l=>l.key===lv)) ? lv : 'L3',\n        course: (cv && this.COURSES.some(c=>c.key===cv)) ? cv : 'psyc101',\n      };\n    } catch(e){ return null; }\n  }\n  componentDidMount(){\n    const fromUrl = this.parseHash();\n    if(fromUrl){\n      // URL config takes precedence — shared links land the same for everyone, ignoring local storage.\n      this.setState({ flags: { ...fromUrl.flags }, dataLevel: fromUrl.level, context: fromUrl.course, mode: fromUrl.user ? 'user' : 'admin' });\n    } else {\n      try {\n        const raw = localStorage.getItem(this.KEY);\n        if(raw){\n          const s = JSON.parse(raw) || {};\n          this.setState({\n            flags: { ...this.state.flags, ...(s.flags||{}) },\n            dataLevel: s.dataLevel || 'L3',\n            context: (s.context && this.COURSES.some(c=>c.key===s.context)) ? s.context : 'psyc101',\n            mode: s.mode === 'user' ? 'user' : 'admin',\n          });\n        }\n      } catch(e){}\n    }\n    this._onKey = (e)=>{ if(e.key === 'Escape' && this.state.mode === 'user') this.exitUser(); };\n    window.addEventListener('keydown', this._onKey);\n  }\n  componentWillUnmount(){ if(this._onKey) window.removeEventListener('keydown', this._onKey); if(this._cpT) clearTimeout(this._cpT); }\n\n  // Build the shareable link that reproduces the current setup and opens straight into the user view.\n  buildUserLink(){\n    const f = this.state.flags;\n    const parts = ['u=1'];\n    if(f.streaks) parts.push('streaks=1');\n    if(f.addCreate) parts.push('addCreate=1');\n    if(f.sessionLength) parts.push('sessionLength=1');\n    if(f.resultRecs) parts.push('resultRecs=1');\n    if(f.cramMode) parts.push('cramMode=1');\n    if(f.loggedOut) parts.push('loggedOut=1');\n    parts.push('level=' + this.state.dataLevel);\n    parts.push('course=' + this.state.context);\n    const base = (typeof location !== 'undefined') ? location.href.split('#')[0] : '';\n    return base + '#' + parts.join('&');\n  }\n  _flashCopied(){ this.setState({ copied:true }); if(this._cpT) clearTimeout(this._cpT); this._cpT = setTimeout(()=>this.setState({ copied:false }), 1900); }\n  _fallbackCopy(url){\n    try {\n      const ta = document.createElement('textarea');\n      ta.value = url; ta.style.position='fixed'; ta.style.top='0'; ta.style.opacity='0';\n      document.body.appendChild(ta); ta.focus(); ta.select();\n      document.execCommand('copy'); document.body.removeChild(ta);\n      this._flashCopied();\n    } catch(e){}\n  }\n  copyLink(){\n    const url = this.buildUserLink();\n    try {\n      if(navigator.clipboard && navigator.clipboard.writeText){\n        navigator.clipboard.writeText(url).then(()=>this._flashCopied(), ()=>this._fallbackCopy(url));\n      } else { this._fallbackCopy(url); }\n    } catch(e){ this._fallbackCopy(url); }\n  }\n\n  persist(){\n    try {\n      localStorage.setItem(this.KEY, JSON.stringify({\n        flags: this.state.flags, dataLevel: this.state.dataLevel, context: this.state.context, mode: this.state.mode,\n      }));\n    } catch(e){}\n  }\n\n  toggleConfig(){ this.setState(s=>({ configOpen: !s.configOpen })); }\n  closeConfig(){ this.setState({ configOpen:false }); }\n  toggleFlag(k){ this.setState(s=>({ flags:{ ...s.flags, [k]: !s.flags[k] } }), ()=>this.persist()); }\n  setContext(k){ if(this.COURSES.some(c=>c.key===k)) this.setState({ context:k }, ()=>this.persist()); }\n  setLevel(k){ const lv=this.LEVELS.find(l=>l.key===k); if(lv && lv.avail) this.setState({ dataLevel:k }, ()=>this.persist()); }\n  launchUser(){ this.setState({ mode:'user', configOpen:false }, ()=>{ this.persist(); try{ window.scrollTo(0,0); }catch(e){} }); }\n  exitUser(){ this.setState({ mode:'admin' }, ()=>this.persist()); }\n\n  renderVals(){\n    const f = this.state.flags;\n    return {\n      // the exact prop shape the Course Page reads\n      features: { streaks: !!f.streaks, addCreate: !!f.addCreate, sessionLength: !!f.sessionLength, resultRecs: !!f.resultRecs, cramMode: !!f.cramMode, loggedOut: !!f.loggedOut },\n      course: this.state.context,\n      contextList: this.COURSES.map(c=>({ ...c, active: this.state.context===c.key, onClick: ()=>this.setContext(c.key),\n        rowBg: this.state.context===c.key ? '#f1f7fe' : '#ffffff', rowBorder: this.state.context===c.key ? '#aad2ff' : '#e6ebef',\n        iconBg:'#ecfcda', iconColor:'#2cc302' })),\n      isAdmin: this.state.mode === 'admin',\n      isUser: this.state.mode === 'user',\n      configOpen: this.state.configOpen,\n      toggleConfig: ()=>this.toggleConfig(),\n      closeConfig: ()=>this.closeConfig(),\n      launchUser: ()=>this.launchUser(),\n      exitUser: ()=>this.exitUser(),\n      copyLink: ()=>this.copyLink(),\n      copied: this.state.copied,\n      notCopied: !this.state.copied,\n      userLink: this.buildUserLink(),\n      activeCount: this.FLAG_CATALOG.filter(x=>f[x.key]).length,\n      hasActive: this.FLAG_CATALOG.some(x=>f[x.key]),\n      flagList: this.FLAG_CATALOG.map(x=>({\n        key:x.key, label:x.label, desc:x.desc,\n        on: !!f[x.key], off: !f[x.key],\n        onClick: ()=>this.toggleFlag(x.key),\n      })),\n      dataLevel: this.state.dataLevel,\n      levelList: this.LEVELS.map(l=>({\n        label:l.label, sub:l.sub,\n        color: this.state.dataLevel===l.key ? '#fff' : (l.avail ? '#2f3e4e' : '#bcc4cc'),\n        bg: this.state.dataLevel===l.key ? '#3092fa' : 'transparent',\n        cursor: l.avail ? 'pointer' : 'not-allowed',\n        onClick: ()=>this.setLevel(l.key),\n      })),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
