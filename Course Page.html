document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e — placement reference only) -->\n    <div style=\"flex:1;overflow:auto;background:#f6f7fb\">\n      <div class=\"exam-body\" style=\"max-width:720px;margin:0 auto;padding:26px 24px 64px\">\n        <div style=\"display:flex;align-items:center;gap:14px;background:#fff;border:1px solid #e6ebef;border-radius:12px;padding:18px 20px;margin-bottom:18px\">\n          <div style=\"position:relative;width:54px;height:54px;flex:none\">\n            <svg width=\"54\" height=\"54\" viewBox=\"0 0 54 54\"><circle cx=\"27\" cy=\"27\" r=\"22\" fill=\"none\" stroke=\"#ecfcda\" stroke-width=\"6\"><\u002Fcircle><circle cx=\"27\" cy=\"27\" r=\"22\" fill=\"none\" stroke=\"#2cc302\" stroke-width=\"6\" stroke-linecap=\"round\" stroke-dasharray=\"138.2\" stroke-dashoffset=\"29\" transform=\"rotate(-90 27 27)\"><\u002Fcircle><\u002Fsvg>\n            <div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#1d8201\">79%<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;min-width:0\">\n            <div style=\"font-size:18px;font-weight:700;color:#0a0a0a\">You scored 22 / 28<\u002Fdiv>\n            <div style=\"font-size:14px;color:#7a838c;margin-top:2px\">Strong on Research Methods · revisit Biological Psychology<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#9ea9b5;margin:6px 4px 12px\">Answers &amp; explanations<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:12px;padding:20px 22px;margin-bottom:14px\">\n          <div style=\"display:flex;align-items:baseline;gap:9px;margin-bottom:13px\"><span style=\"font-size:12px;font-weight:700;color:#9ea9b5;flex:none\">Q1<\u002Fspan><span style=\"font-size:16px;font-weight:700;color:#0a0a0a;line-height:1.4\">In operant conditioning, negative reinforcement works by:<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:9px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 15px;border-radius:12px;border:1px solid #d3d9e0;color:#9ea9b5;font-size:14px\">Adding an unpleasant stimulus to weaken a behavior<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 15px;border-radius:12px;border:1px solid #2cc302;background:#f5ffeb;color:#1d8201;font-size:14px;font-weight:500\">Removing an unpleasant stimulus to strengthen a behavior<svg width=\"18\" height=\"18\" viewBox=\"0 0 512 512\" fill=\"#2cc302\" style=\"flex:none\"><path d=\"M256 512a256 256 0 1 1 0-512 256 256 0 1 1 0 512zM374 145.7c-10.7-7.8-25.7-5.4-33.5 5.3L221.1 315.2 169 263.1c-9.4-9.4-24.6-9.4-33.9 0s-9.4 24.6 0 33.9l72 72c5 5 11.8 7.5 18.8 7s13.4-4.1 17.5-9.8L379.3 179.2c7.8-10.7 5.4-25.7-5.3-33.5z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:14px;color:#4c5966;line-height:1.55;margin-top:12px;padding-left:14px;border-left:3px solid #e6ebef\">Negative reinforcement removes an aversive stimulus, which increases the likelihood of a behavior — it is not the same as punishment.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #e6ebef;border-radius:12px;padding:20px 22px\">\n          <div style=\"display:flex;align-items:baseline;gap:9px;margin-bottom:13px\"><span style=\"font-size:12px;font-weight:700;color:#9ea9b5;flex:none\">Q2<\u002Fspan><span style=\"font-size:16px;font-weight:700;color:#0a0a0a;line-height:1.4\">Which part of a neuron receives incoming signals from other neurons?<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:9px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 15px;border-radius:12px;border:1px solid #e62600;background:#fff4f2;color:#841d15;font-size:14px;font-weight:500\">Axon<svg width=\"18\" height=\"18\" viewBox=\"0 0 512 512\" fill=\"#e62600\" style=\"flex:none\"><path d=\"M256 512a256 256 0 1 0 0-512 256 256 0 1 0 0 512zM167 167c9.4-9.4 24.6-9.4 33.9 0l55 55 55-55c9.4-9.4 24.6-9.4 33.9 0s9.4 24.6 0 33.9l-55 55 55 55c9.4 9.4 9.4 24.6 0 33.9s-24.6 9.4-33.9 0l-55-55-55 55c-9.4 9.4-24.6 9.4-33.9 0s-9.4-24.6 0-33.9l55-55-55-55c-9.4-9.4-9.4-24.6 0-33.9z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 15px;border-radius:12px;border:1px solid #2cc302;background:#f5ffeb;color:#1d8201;font-size:14px;font-weight:500\">Dendrites<svg width=\"18\" height=\"18\" viewBox=\"0 0 512 512\" fill=\"#2cc302\" style=\"flex:none\"><path d=\"M256 512a256 256 0 1 1 0-512 256 256 0 1 1 0 512zM374 145.7c-10.7-7.8-25.7-5.4-33.5 5.3L221.1 315.2 169 263.1c-9.4-9.4-24.6-9.4-33.9 0s-9.4 24.6 0 33.9l72 72c5 5 11.8 7.5 18.8 7s13.4-4.1 17.5-9.8L379.3 179.2c7.8-10.7 5.4-25.7-5.3-33.5z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:14px;color:#4c5966;line-height:1.55;margin-top:12px;padding-left:14px;border-left:3px solid #e6ebef\">Dendrites receive signals and carry them toward the cell body; the axon carries signals away.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ===== TOPIC OPTIONS SHEET ===== -->\n<sc-if value=\"{{ menuOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div onclick=\"{{ closeMenu }}\" style=\"position:fixed;inset:0;z-index:70;background:rgba(10,10,10,.6);display:flex;align-items:center;justify-content:center;padding:24px;animation:examIn .2s ease\">\n    <div onclick=\"{{ stopMenu }}\" style=\"width:100%;max-width:420px;background:#fff;border-radius:20px;padding:28px;box-shadow:0 0 8px 0 rgba(0,0,0,.14);animation:popIn .22s ease\">\n      <div style=\"display:flex;align-items:flex-start;justify-content:space-between;ga ><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n        <button onclick=\"{{ menuPractice }}\" style=\"display:flex;align-items:center;gap:13px;width:100%;text-align:left;padding:14px 15px;border-radius:12px;background:#f6f7fb;color:#2f3e4e;border:none;cursor:pointer;font-family:inherit;transition:background .15s\" style-hover=\"background:#e6ebef\">\n          <span style=\"display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:12px;background:#e6ebef;color:#4c5966;flex:none\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 512 512\" fill=\"currentColor\"><path d=\"M320 0c-17.7 0-32 14.3-32 32s14.3 32 32 32l82.7 0L201.4 265.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L448 109.3l0 82.7c0 17.7 14.3 32 32 32s32-14.3 32-32l0-160c0-17.7-14.3-32-32-32L320 0zM80 32C35.8 32 0 67.8 0 112L0 432c0 44.2 35.8 80 80 80l320 0c44.2 0 80-35.8 80-80l0-112c0-17.7-14.3-32-32-32s-32 14.3-32 32l0 112c0 8.8-7.2 16-16 16L80 448c-8.8 0-16-7.2-16-16l0-320c0-8.8 7.2-16 16-16l112 0c17.7 0 32-14.3 32-32s-14.3-32-32-32L80 32z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <span style=\"flex:1;min-width:0\"><span style=\"display:block;font-size:14px;font-weight:700\">Deep practice<\u002Fspan><span style=\"display:block;font-size:12px;color:#7a838c;margin-top:1px\">Full practice set on Studocu<\u002Fspan><\u002Fspan>\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 448 512\" fill=\"#9ea9b5\" style=\"flex:none\"><path d=\"M438.6 278.6c12.5-12.5 12.5-32.8 0-45.3l-160-160c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L338.7 224 32 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l306.7 0L233.4 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l160-160z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:960,&quot;height&quot;:1200},&quot;features&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;object&quot;,&quot;default&quot;:{}}}\">\nclass Component extends DCLogic {\n  state = { view:'today', expanded:'operant', picks:{}, deferred:{}, done:{}, examsOpen:false, examOpen:false, examVote:null,\n    menuTopic:null, addedFlash:{}, dismissed:{}, deferred:{ research:true, emotion:true },\n    todayOrder:['operant','memory','research','biological','development','social','sensation','emotion','disorders'], qIndex:{},\n    skipped:{}, sessionMinutes:10, bandFilter:[], topicFilter:[], tabCanL:false, tabCanR:false, pinnedTop:null, cardPhase:'idle', sideExpanded:false,\n    docSeg:'course', docFlash:null, addOpen:false, create:null, postUploadId:null,\n    myDocs:[\n      { id:'md1', kind:'doc', title:'Lecture 7 — operant conditioning (my notes)', type:'Lecture notes', pages:9, generated:'operant' },\n      { id:'md2', kind:'doc', title:'Exam 1 study sheet', type:'Summary', pages:3, generated:null }\n    ] };\n\n  setTabEl = (el) => {\n    if (el === this._tabEl) return;\n    if (this._tabEl) { this._tabEl.removeEventListener('scroll', this._syncTabs); if (this._ro) this._ro.disconnect(); }\n    this._tabEl = el;\n    if (el) {\n      el.addEventListener('scroll', this._syncTabs);\n      if (window.ResizeObserver) { this._ro = new ResizeObserver(this._syncTabs); this._ro.observe(el); }\n      if (!this._tabWinBound) { this._tabWinBound = true; window.addEventListener('resize', this._syncTabs); }\n      requestAnimationFrame(this._syncTabs);\n      setTimeout(this._syncTabs, 300);\n    }\n  };\n  _syncTabs = () => {\n    const el = this._tabEl; if (!el) return;\n    const canL = el.scrollLeft > 4;\n    const canR = el.scrollLeft + el.clientWidth < el.scrollWidth - 4;\n    if (canL !== this.state.tabCanL || canR !== this.state.tabCanR) this.setState({ tabCanL:canL, tabCanR:canR });\n  };\n  scrollTabs = (dir) => { if (this._tabEl) this._tabEl.scrollBy({ left: dir * 240, behavior:'smooth' }); };\n\n  COURSE_DOCS = [\n    { title:'Tutorial recap — exam tips & pitfalls', type:'Lecture notes', pages:5, rate:'92%', ratings:'(41)', premium:false },\n    { title:'Operant vs. classical conditioning — summary', type:'Summary', pages:6, rate:'98%', ratings:'(56)', premium:true },\n    { title:'Midterm 1 practice questions + answer key', type:'Practice', pages:11, rate:'95%', ratings:'(28)', premium:false },\n    { title:'Chapter 6 reading notes — memory & encoding', type:'Lecture notes', pages:14, rate:'90%', ratings:'(17)', premium:false }\n  ];\n\n  // ---- Today's Review prioritization model (documented for devs in the Handoff) ----\n  MINUTES = [5,10,15,20,30,45,60];            // session-length slider stops\n  MIDTERM_DAYS = 4;                            // days until the nearest exam\n  EST_BY_BAND = { 'Needs focus':4, 'Building':3, 'Strong':2 }; // est. minutes for a topic check\n  EXAM_WEIGHT = { operant:1, memory:.9, research:.85, biological:.7, development:.55, social:.45, sensation:.35, emotion:.3, disorders:.25 };\n  DUE_DAYS    = { operant:0, memory:1, research:2, biological:0, development:3, social:4, sensation:2, emotion:5, disorders:1 };\n\n  // ---- universal tiles: community \"Keep building\" pool (docs + AI artifacts in one stream) ----\n  KIND_META = {\n    doc:    { chip:'Document',     chipBg:'#eef1f4', chipColor:'#4c5966' },\n    summary:{ chip:'Summary',      chipBg:'#e2effd', chipColor:'#1168c3' },\n    quiz:   { chip:'Practice quiz',chipBg:'#f0ebfe', chipColor:'#735db4' },\n    exam:   { chip:'Mock exam',    chipBg:'#fde1d2', chipColor:'#c44e0a' },\n    flash:  { chip:'Flashcards',   chipBg:'#fdf4e2', chipColor:'#8b5f04' }\n  };\n  KEEP_BUILDING = [\n    { kind:'doc',     title:'Developmental stages cheat sheet',        pages:6,  ratePct:'98%', ratings:'(124)' },\n    { kind:'quiz',    title:'Quick quiz — Conditioning & memory',      qCount:10, ratePct:'95%', ratings:'(88)' },\n    { kind:'doc',     title:'2024 final exam — solved past paper',     pages:12, ratePct:'99%', ratings:'(203)' },\n    { kind:'summary', title:'Exam-prep summary — all topics',          pages:8,  ratePct:'96%', ratings:'(72)' },\n    { kind:'doc',     title:'Lecture 7 — memory & encoding slides',    pages:24, ratePct:'94%', ratings:'(67)' },\n    { kind:'doc',     title:'Chapter 4 — learning & conditioning notes',pages:18, ratePct:'97%', ratings:'(89)' }\n  ];\n  KB_CAP = 4;        // universal-tile sections show a count cap + \"+N more\"\n  TOMORROW_CAP = 6;\n\n  // meta-row icons for the universal ArtifactTile (file / clock / play)\n  META_ICONS = {\n    file:  { iconVB:'0 0 384 512', iconPath:'M0 64C0 28.7 28.7 0 64 0L224 0l0 128c0 17.7 14.3 32 32 32l128 0 0 288c0 35.3-28.7 64-64 64L64 512c-35.3 0-64-28.7-64-64L0 64zM384 128l-128 0L256 0 384 128z' },\n    clock: { iconVB:'0 0 512 512', iconPath:'M256 0a256 256 0 1 1 0 512A256 256 0 1 1 256 0zM232 120l0 136c0 8 4 15.5 10.7 20l96 64c11 7.4 25.9 4.4 33.3-6.7s4.4-25.9-6.7-33.3L280 243.2 280 120c0-13.3-10.7-24-24-24s-24 10.7-24 24z' },\n    play:  { iconVB:'0 0 384 512', iconPath:'M73 39c-14.8-9.1-33.4-9.4-48.5-.9S0 62.6 0 80L0 432c0 17.4 9.4 33.4 24.5 41.9s33.7 8.1 48.5-.9L361 297c14.3-8.7 23-24.2 23-41s-8.7-32.2-23-41L73 39z' }\n  };\n  // grouped spine content — mix of document tiles (DocTile) + artifact tiles (ArtifactTile)\n  GROUP_CAP = 8;   // each spine group shows at most 8 mixed tiles (content-strategy winners)\n  CATALOG_TOPICS = ['Operant conditioning','Memory & encoding','Research methods','Biological psychology','Developmental stages','Social psychology','Sensation & perception','Emotion & motivation','Psychological disorders'];\n  groupTiles(){\n    const open = ()=>this.openExam();\n    const mi = this.META_ICONS;\n    const artifact = (kind,title,m1,m2)=>({ isDoc:false, isArtifact:true, t:{ kind, title, onOpen:open, meta:[m1,m2] } });\n    const doc = (title,pages,ratePct,ratings)=>({ isDoc:true, isArtifact:false, t:{ title, course:'PSYC 101', pages:pages+' pages', ratePct, ratings, onOpen:open } });\n    const q = (label)=>({ ...mi.file, label });\n    const t = (label)=>({ ...mi.clock, label });\n    const p = (label)=>({ ...mi.play, label });\n    // content-strategy winners for each group — a mix of every kind, capped at GROUP_CAP (8)\n    const bmTiles = [\n      artifact('exam',     'Midterm 1 mock exam',                     q('40 questions'), t('~35 min · all topics')),\n      doc('2024 final exam — solved past paper', 12, '99%', '(203)'),\n      artifact('quiz',     'Quick quiz — Conditioning & memory',      q('10 questions'), t('~8 min')),\n      artifact('summary',  'Exam-prep summary — all topics',          q('8 pages'),      t('6 min read')),\n      artifact('recording','Lecture 7 — operant conditioning recording', p('Lecture recording'), t('48 min')),\n      doc('Developmental stages cheat sheet', 6, '98%', '(124)'),\n      artifact('quiz',     'Quick quiz — Research methods',           q('12 questions'), t('~9 min')),\n      artifact('summary',  'Key theories & theorists summary',        q('5 pages'),      t('4 min read'))\n    ];\n    const kbTiles = [\n      artifact('recording','Lecture 3 — memory & encoding recording', p('Lecture recording'), t('44 min')),\n      doc('Chapter 4 — learning & conditioning notes', 18, '97%', '(89)'),\n      artifact('summary',  'Whole-course summary — all 9 topics',     q('8 pages'),      t('6 min read')),\n      artifact('quiz',     'Quick quiz — Social psychology',          q('9 questions'),  t('~7 min')),\n      doc('Lecture 7 — memory & encoding slides', 24, '94%', '(67)'),\n      artifact('exam',     'Final exam — full mock paper',            q('60 questions'), t('~90 min')),\n      artifact('summary',  'Chapter highlights — textbook',           q('6 pages'),      t('5 min read')),\n      doc('Key theorists reference sheet', 4, '96%', '(51)')\n    ];\n    return { bmTiles: bmTiles.slice(0, this.GROUP_CAP), kbTiles: kbTiles.slice(0, this.GROUP_CAP) };\n  }\n  // per-category tab content — each tab shows only its own kind, sized to its counter\n  catalog(kind){\n    const open = ()=>this.openExam();\n    const mi = this.META_ICONS;\n    const T = this.CATALOG_TOPICS;\n    const mk = (title,m1,m2)=>({ t:{ kind, title, onOpen:open, meta:[m1,m2] } });\n    const q = (label)=>({ ...mi.file, label });\n    const t = (label)=>({ ...mi.clock, label });\n    const p = (label)=>({ ...mi.play, label });\n    if(kind==='exam') return [\n      mk('Midterm 1 mock exam',        q('40 questions'), t('~35 min · all topics')),\n      mk('Midterm 2 mock exam',        q('40 questions'), t('~35 min')),\n      mk('Final exam — full mock paper', q('60 questions'), t('~90 min'))\n    ];\n    if(kind==='quiz') return T.map((n,i)=> mk('Quick quiz — '+n, q((8+i%5)+' questions'), t('~'+(6+i%4)+' min')));\n    if(kind==='summary'){\n      const base = T.map((n,i)=> mk(n+' — summary', q((4+i%5)+' pages'), t((3+i%4)+' min read')));\n      const extra = [\n        ['Whole-course summary — all 9 topics','8 pages','6 min read'],\n        ['Exam-prep summary — all topics','10 pages','8 min read'],\n        ['Key theories & theorists summary','5 pages','4 min read'],\n        ['Lecture notes digest — weeks 1–7','7 pages','5 min read'],\n        ['Chapter highlights — textbook','6 pages','5 min read']\n      ].map(x=> mk(x[0], q(x[1]), t(x[2])));\n      return base.concat(extra);\n    }\n    if(kind==='recording') return Array.from({length:12},(_,i)=> mk('Lecture '+(i+1)+' — '+T[i%T.length]+' recording', p('Lecture recording'), t((38 + (i%3)*6)+' min')));\n    return [];\n  }\n\n\n  clamp(x){ return Math.max(0, Math.min(1, x)); }\n  // weighted priority — one number per candidate; devs implement the same formula server-side\n  priorityOf(v){\n    const masteryGap = (100 - v.coveragePct) / 100;                                  // lower coverage ⇒ higher\n    const examProx   = (this.EXAM_WEIGHT[v.id] || .3) * this.clamp((21 - this.MIDTERM_DAYS) / 21); // closer/heavier exam ⇒ higher\n    const dueness    = this.clamp((7 - (this.DUE_DAYS[v.id] ?? 3)) / 7);             // overdue for spaced review ⇒ higher\n    return 0.45*masteryGap + 0.35*examProx + 0.20*dueness;\n  }\n  estOf(v){ return this.EST_BY_BAND[v.label] || 3; }\n  bandKey(label){ return label==='Strong' ? 'strong' : label==='Building' ? 'building' : 'focus'; }\n  // student-facing encouragement copy — a 7-tier scale over coverage; \"Unstarted\" before any interaction\n  scoreCopy(pct, started){\n    if(!started) return 'Unstarted';\n    if(pct < 20) return \"Let's begin!\";\n    if(pct < 35) return 'Keep going!';\n    if(pct < 50) return 'Building up!';\n    if(pct < 65) return 'Getting there!';\n    if(pct < 80) return 'Looking good!';\n    if(pct < 90) return 'Almost there!';\n    return 'Well done!';\n  }\n  // student-adjustable session length (the slider on Today's Review, gated by the sessionLength flag); defaults to 10\n  sessionMin(){ const m = this.state.sessionMinutes; return (typeof m==='number' && m>0) ? m : 10; }\n  setSession(e){ const idx = e && e.target ? +e.target.value : +e; const i = Math.max(0, Math.min(idx|0, this.MINUTES.length-1)); this.setState({ sessionMinutes:this.MINUTES[i] }, ()=>this.setState({ expanded:this.sessionIds().ids[0]||null })); }\n  // candidates → priority sort → greedy fill to the time budget\n  sessionIds(){\n    const views = this.deck().map(id => this.topicView(this.TOPICS.find(t=>t.id===id)));\n    const f = views.map((v,i)=>({v,i,p:this.priorityOf(v)})).sort((a,b)=> b.p-a.p || a.i-b.i).map(x=>x.v);\n    const budget = this.sessionMin();\n    const out = []; let sum = 0;\n    for(const v of f){ const e = this.estOf(v); if(out.length && sum+e > budget) break; out.push(v); sum += e; }\n    let ids = out.map(v=>v.id);\n    const pin = this.state.pinnedTop;\n    if(pin && this.deck().includes(pin)) ids = [pin, ...ids.filter(id=>id!==pin)];   // a resumed topic is forced to the top\n    return { ids, minutes: sum, eligible: f.length };\n  }\n  toggleTopicFilter(b){ this.setState(s=>{ const c=s.topicFilter.slice(); const i=c.indexOf(b); if(i>=0)c.splice(i,1); else c.push(b); return { topicFilter:c }; }); }\n  clearTopicFilter(){ this.setState({ topicFilter:[] }); }\n  // artifact icon tiles (docs keep thumbnails; non-doc artifacts show an icon, no thumbnail)\n  iconFor(kind){\n    switch(kind){\n      case 'summary': return { vb:'0 0 384 512', path:'M64 0C28.7 0 0 28.7 0 64L0 448c0 35.3 28.7 64 64 64l256 0c35.3 0 64-28.7 64-64l0-288-128 0c-17.7 0-32-14.3-32-32L224 0 64 0zM256 0l0 128 128 0L256 0zM112 256l160 0c8.8 0 16 7.2 16 16s-7.2 16-16 16l-160 0c-8.8 0-16-7.2-16-16s7.2-16 16-16zm0 64l160 0c8.8 0 16 7.2 16 16s-7.2 16-16 16l-160 0c-8.8 0-16-7.2-16-16s7.2-16 16-16z', bg:'#f6f7fb', color:'#2f3e4e' };\n      case 'quiz':    return { vb:'0 0 512 512', path:'M256 512A256 256 0 1 0 256 0a256 256 0 1 0 0 512zM169.8 165.3c7.9-22.3 29.1-37.3 52.8-37.3l58.3 0c34.9 0 63.1 28.3 63.1 63.1 0 22.6-12.1 43.5-31.7 54.8L280 264.4c-.2 13-10.9 23.6-24 23.6-13.3 0-24-10.7-24-24l0-13.5c0-8.6 4.6-16.5 12.1-20.8l44.3-25.4c4.7-2.7 7.6-7.7 7.6-13.1 0-8.4-6.8-15.1-15.1-15.1l-58.3 0c-3.4 0-6.4 2.1-7.5 5.3l-.4 1.2c-4.4 12.5-18.2 19-30.6 14.6s-19-18.2-14.6-30.6l.4-1.2zM224 352a32 32 0 1 1 64 0 32 32 0 1 1 -64 0z', bg:'#f6f7fb', color:'#2f3e4e' };\n      case 'exam':    return { vb:'0 0 384 512', path:'M192 0c-41.8 0-77.4 26.7-90.5 64L64 64C28.7 64 0 92.7 0 128L0 448c0 35.3 28.7 64 64 64l256 0c35.3 0 64-28.7 64-64l0-320c0-35.3-28.7-64-64-64l-37.5 0C269.4 26.7 233.8 0 192 0zm0 64a32 32 0 1 1 0 64 32 32 0 1 1 0-64zM72 272a24 24 0 1 1 48 0 24 24 0 1 1 -48 0zm104-16l128 0c8.8 0 16 7.2 16 16s-7.2 16-16 16l-128 0c-8.8 0-16-7.2-16-16s7.2-16 16-16zM72 368a24 24 0 1 1 48 0 24 24 0 1 1 -48 0zm104-16l128 0c8.8 0 16 7.2 16 16s-7.2 16-16 16l-128 0c-8.8 0-16-7.2-16-16s7.2-16 16-16z', bg:'#f6f7fb', color:'#2f3e4e' };\n      case 'flash':   return { vb:'0 0 512 512', path:'M64 464l224 0c8.8 0 16-7.2 16-16l0-64 48 0 0 64c0 35.3-28.7 64-64 64L64 512c-35.3 0-64-28.7-64-64L0 224c0-35.3 28.7-64 64-64l64 0 0 48-64 0c-8.8 0-16 7.2-16 16l0 224c0 8.8 7.2 16 16 16zM224 0L448 0c35.3 0 64 28.7 64 64l0 224c0 35.3-28.7 64-64 64l-224 0c-35.3 0-64-28.7-64-64l0-224c0-35.3 28.7-64 64-64z', bg:'#f6f7fb', color:'#2f3e4e' };\n      default:        return null;\n    }\n  }\n\n  setDocs(){ this.setView('docs'); }\n  setDocSeg(s){ this.setState({ docSeg:s }); }\n  uploadDoc(){\n    const id='u'+Date.now();\n    const doc={ id, kind:'doc', title:'Chapter 4 notes.pdf', type:'Uploaded', pages:7, generated:null };\n    this.setState(s=>({ myDocs:[doc,...s.myDocs], view:'docs', docSeg:'mine', docFlash:id, postUploadId:id, addOpen:false }), ()=>this.toTop());\n    setTimeout(()=>{ this.setState(s=>({ docFlash: s.docFlash===id ? null : s.docFlash })); }, 2400);\n  }\n  openGenerated(id){ this.setState(s=>{ const order=s.todayOrder.slice(); const i=order.indexOf(id); if(i>=0){ order.splice(i,1); order.unshift(id); } return { view:'today', expanded:id, todayOrder:order, deferred:{...s.deferred,[id]:false}, done:{...s.done,[id]:false} }; }, ()=>this.toTop()); }\n\n  // ---- add / create (SAI artifact creation, mounted on the course page) ----\n  ARTIFACTS = { summary:{label:'Summary', chipBg:'#e2effd', chipColor:'#1168c3'},\n                quiz:{label:'Practice quiz', chipBg:'#f0ebfe', chipColor:'#735db4'},\n                exam:{label:'Mock exam', chipBg:'#fde1d2', chipColor:'#c44e0a'} };\n  allSources(){\n    const course=this.COURSE_DOCS.map((d,i)=>({ id:'c'+i, title:d.title, type:d.type, pages:d.pages, owner:'Course' }));\n    const mine=this.state.myDocs.filter(d=>d.kind==='doc').map(d=>({ id:d.id, title:d.title, type:d.type, pages:d.pages, owner:'You' }));\n    return mine.concat(course);\n  }\n  openAdd(){ this.setState({ addOpen:true }); }\n  closeAdd(){ this.setState({ addOpen:false }); }\n  startCreate(type, seedId){ const sourceIds={}; if(seedId) sourceIds[seedId]=true; this.setState({ addOpen:false, postUploadId:null, create:{ type, sourceIds, whole:true, from:1, to:12, step:'config' } }); }\n  toggleSource(id){ this.setState(s=>{ const m={...s.create.sourceIds}; m[id]=!m[id]; return { create:{...s.create, sourceIds:m} }; }); }\n  setWhole(v){ this.setState(s=>({ create:{...s.create, whole:v} })); }\n  setFrom(v){ this.setState(s=>({ create:{...s.create, from:Math.max(1, Math.min(v, s.create.to)) } })); }\n  setTo(v){ this.setState(s=>({ create:{...s.create, to:Math.max(s.create.from, v) } })); }\n  closeCreate(){ this.setState({ create:null }); }\n  dismissPostUpload(){ this.setState({ postUploadId:null }); }\n  generate(){ this.setState(s=>({ create:{...s.create, step:'generating'} })); setTimeout(()=>this.finishGenerate(), 1700); }\n  finishGenerate(){\n    const c=this.state.create; if(!c) return;\n    const meta=this.ARTIFACTS[c.type];\n    const nSrc=Object.values(c.sourceIds).filter(Boolean).length || 1;\n    const id='a'+Date.now();\n    const titleBase = nSrc>1 ? ('PSYC 101 — '+meta.label.toLowerCase()) : (this.firstSourceTitle(c.sourceIds)+' — '+meta.label.toLowerCase());\n    const doc={ id, kind:c.type, title:titleBase, type:meta.label,\n      pages: c.type==='summary'?4:0, qCount: c.type==='quiz'?12:(c.type==='exam'?30:0),\n      generated:null, feedsToday: c.type!=='summary', sourceCount:nSrc };\n    this.setState(s=>({ create:null, myDocs:[doc,...s.myDocs], view:'docs', docSeg:'mine', docFlash:id }), ()=>this.toTop());\n    setTimeout(()=>{ this.setState(s=>({ docFlash: s.docFlash===id ? null : s.docFlash })); }, 2600);\n  }\n  firstSourceTitle(map){ const id=Object.keys(map).find(k=>map[k]); const s=this.allSources().find(x=>x.id===id); if(!s) return 'PSYC 101'; return s.title.split(' — ')[0].split(',')[0].slice(0,32); }\n\n  deck(){ const {todayOrder,done,deferred,dismissed,skipped}=this.state; return todayOrder.filter(id=>!done[id] && !deferred[id] && !dismissed[id] && !skipped[id]); }\n\n  TOPICS = [\n    { id:'operant', title:'Operant Conditioning', base:52, questions:[\n      { q:'In operant conditioning, negative reinforcement works by:', opts:['Adding an unpleasant stimulus to weaken a behavior','Removing an unpleasant stimulus to strengthen a behavior','Adding a pleasant stimulus to strengthen a behavior','Removing a pleasant stimulus to weaken a behavior'], correct:1, explain:'Negative reinforcement removes an aversive stimulus, which increases the likelihood of a behavior — it is not the same as punishment.' },\n      { q:'A teacher gives a sticker each time a student finishes their homework. This is an example of:', opts:['Positive reinforcement','Negative reinforcement','Positive punishment','Negative punishment'], correct:0, explain:'Adding a pleasant stimulus (the sticker) to increase a behavior is positive reinforcement.' },\n      { q:'Which reinforcement schedule produces the highest, steadiest rate of responding?', opts:['Fixed-ratio','Variable-ratio','Fixed-interval','Variable-interval'], correct:1, explain:'Variable-ratio schedules (like slot machines) reward after an unpredictable number of responses, driving high, steady rates that resist extinction.' },\n      { q:'In Thorndike’s law of effect, behaviours followed by satisfying consequences are:', opts:['Weakened over time','More likely to recur','Unaffected','Replaced by reflexes'], correct:1, explain:'The law of effect states that responses producing a satisfying effect become more likely in that situation.' },\n      { q:'Gradually reinforcing closer approximations of a target behaviour is called:', opts:['Shaping','Chaining','Extinction','Generalization'], correct:0, explain:'Shaping reinforces successive approximations until the full target behaviour is achieved.' }\n    ]},\n    { id:'memory', title:'Memory & Encoding', base:64, questions:[\n      { q:'According to Miller, the capacity of short-term memory is about:', opts:['3 ± 1 items','5 ± 1 items','7 ± 2 items','Effectively unlimited'], correct:2, explain:\"Miller's “magical number seven, plus or minus two” describes the limited capacity of short-term memory.\" },\n      { q:'The brief sensory store that holds visual information is called:', opts:['Echoic memory','Iconic memory','Working memory','Flashbulb memory'], correct:1, explain:'Iconic memory is the visual sensory store, lasting roughly half a second.' },\n      { q:'Grouping individual items into larger meaningful units to aid recall is known as:', opts:['Chunking','Rehearsal','Priming','Encoding specificity'], correct:0, explain:'Chunking organizes items into familiar units, expanding effective short-term capacity.' },\n      { q:'The tendency to remember the first items in a list especially well is the:', opts:['Recency effect','Primacy effect','Von Restorff effect','Spacing effect'], correct:1, explain:'The primacy effect reflects better recall of early list items, attributed to more rehearsal into long-term memory.' },\n      { q:'Memory for how to ride a bike is an example of which type of long-term memory?', opts:['Episodic','Semantic','Procedural','Prospective'], correct:2, explain:'Procedural memory stores skills and actions and is a form of implicit (non-declarative) memory.' }\n    ]},\n    { id:'research', title:'Research Methods', base:73, questions:[\n      { q:'The variable an experimenter deliberately manipulates is the:', opts:['Dependent variable','Independent variable','Confounding variable','Control variable'], correct:1, explain:'The independent variable is manipulated to observe its effect on the dependent variable.' },\n      { q:'A study where neither participants nor researchers know group assignment is:', opts:['Single-blind','Double-blind','Correlational','Naturalistic'], correct:1, explain:'A double-blind design controls for both participant and experimenter bias.' },\n      { q:'A correlation coefficient of -0.85 indicates:', opts:['A weak negative relationship','A strong negative relationship','No relationship','A strong positive relationship'], correct:1, explain:'The sign shows direction (negative) and the magnitude near 1 shows a strong relationship.' },\n      { q:'Random assignment of participants to conditions primarily helps to:', opts:['Increase the sample size','Equalize groups on confounding variables','Guarantee a significant result','Eliminate the need for a control group'], correct:1, explain:'Random assignment distributes confounds evenly across conditions, supporting causal inference.' },\n      { q:'The extent to which a study’s results generalize beyond the lab is its:', opts:['Internal validity','External validity','Reliability','Statistical power'], correct:1, explain:'External validity concerns how well findings apply to other people, settings and times.' }\n    ]},\n    { id:'biological', title:'Biological Psychology', base:34, questions:[\n      { q:'Which part of a neuron receives incoming signals from other neurons?', opts:['Axon','Dendrites','Myelin sheath','Axon terminal'], correct:1, explain:'Dendrites receive signals and carry them toward the cell body; the axon carries signals away.' },\n      { q:'The gap across which neurotransmitters travel between neurons is the:', opts:['Node of Ranvier','Synaptic cleft','Soma','Axon hillock'], correct:1, explain:'Neurotransmitters cross the synaptic cleft from the axon terminal to the next neuron’s dendrites.' },\n      { q:'Which brain structure is most associated with forming new long-term memories?', opts:['Amygdala','Hippocampus','Cerebellum','Hypothalamus'], correct:1, explain:'The hippocampus is critical for consolidating new explicit memories; damage impairs forming new ones.' },\n      { q:'The neurotransmitter most directly involved in muscle movement is:', opts:['Serotonin','Dopamine','Acetylcholine','GABA'], correct:2, explain:'Acetylcholine is released at neuromuscular junctions to trigger muscle contraction.' },\n      { q:'The division of the nervous system that calms the body after stress is the:', opts:['Sympathetic','Parasympathetic','Somatic','Central'], correct:1, explain:'The parasympathetic division restores the body to rest-and-digest after sympathetic arousal.' }\n    ]},\n    { id:'development', title:'Developmental Psychology', base:45, questions:[\n      { q:\"In Piaget's theory, object permanence is acquired during the:\", opts:['Sensorimotor stage','Preoperational stage','Concrete operational stage','Formal operational stage'], correct:0, explain:'Object permanence — knowing objects still exist when out of sight — develops in the sensorimotor stage (0–2 years).' },\n      { q:'The Piagetian stage where abstract and hypothetical reasoning emerges is the:', opts:['Sensorimotor stage','Preoperational stage','Concrete operational stage','Formal operational stage'], correct:3, explain:'Formal operational thought (about 12+) enables abstract, hypothetical and deductive reasoning.' },\n      { q:'In Erikson’s theory, the central conflict of adolescence is:', opts:['Trust vs. mistrust','Identity vs. role confusion','Intimacy vs. isolation','Autonomy vs. shame'], correct:1, explain:'Adolescents work to form a coherent sense of self — identity vs. role confusion.' },\n      { q:'Vygotsky’s “zone of proximal development” refers to tasks a child can do:', opts:['Alone with ease','Only as an adult','With guidance from a more skilled person','Never, regardless of help'], correct:2, explain:'The ZPD is the gap between independent ability and what is achievable with support (scaffolding).' },\n      { q:'The style of attachment marked by distress at separation and comfort on reunion is:', opts:['Avoidant','Secure','Ambivalent','Disorganized'], correct:1, explain:'Securely attached infants are upset when a caregiver leaves but are readily soothed upon return.' }\n    ]},\n    { id:'social', title:'Social Psychology', base:58, questions:[\n      { q:'Attributing others’ behaviour to their character while ignoring the situation is the:', opts:['Self-serving bias','Fundamental attribution error','Halo effect','Just-world bias'], correct:1, explain:'The fundamental attribution error overweights dispositional causes and underweights situational ones.' },\n      { q:'In Asch’s experiments, participants conformed mainly due to:', opts:['Obedience to authority','Group pressure on a perceptual task','Monetary reward','Diffusion of responsibility'], correct:1, explain:'Asch showed people conform to a unanimous majority even on clear perceptual judgments.' },\n      { q:'Reduced individual effort in a group is called:', opts:['Social facilitation','Social loafing','Groupthink','Deindividuation'], correct:1, explain:'Social loafing is the tendency to exert less effort when working collectively than alone.' },\n      { q:'Festinger’s theory of cognitive dissonance concerns discomfort from:', opts:['Conflicting attitudes or behaviours','Crowded environments','Unmet biological needs','Ambiguous authority'], correct:0, explain:'Dissonance arises when attitudes and behaviour conflict, motivating attitude change to reduce it.' },\n      { q:'The bystander effect predicts that helping becomes less likely as:', opts:['The victim’s distress rises','The number of bystanders rises','Lighting improves','Group familiarity rises'], correct:1, explain:'More bystanders diffuse responsibility, lowering any single person’s likelihood of helping.' }\n    ]},\n    { id:'sensation', title:'Sensation & Perception', base:41, questions:[\n      { q:'The minimum stimulus intensity detectable 50% of the time is the:', opts:['Difference threshold','Absolute threshold','Just-noticeable difference','Sensory adaptation point'], correct:1, explain:'The absolute threshold is the smallest detectable level of a stimulus, defined at 50% detection.' },\n      { q:'Transduction in vision occurs at the:', opts:['Cornea','Lens','Retina','Optic chiasm'], correct:2, explain:'Photoreceptors in the retina convert light into neural signals — that conversion is transduction.' },\n      { q:'The tendency to perceive a whole rather than parts reflects:', opts:['Gestalt princi
